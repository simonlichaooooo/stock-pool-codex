<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股池管理</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --panel-2: #f7f9fb;
      --text: #101828;
      --muted: #667085;
      --line: #d9e1ea;
      --soft: #edf1f5;
      --brand: #0f5f55;
      --brand-strong: #0b4f47;
      --brand-soft: #e6f1ef;
      --accent: #2f5f98;
      --gain: #b42318;
      --loss: #067647;
      --warn: #9a6700;
      --shadow: 0 12px 28px rgba(16, 24, 40, 0.06);
      --shadow-soft: 0 4px 14px rgba(16, 24, 40, 0.045);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 32px;
      padding: 0 11px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    button:hover { border-color: #98a6b8; background: #f8fafc; }
    button:active { transform: translateY(1px); }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    button.primary:hover { background: var(--brand-strong); }
    button.icon { width: 32px; padding: 0; }
    button.danger { color: #b42318; }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 9px;
      background: white;
      color: var(--text);
      outline: none;
      min-height: 34px;
      font-size: 13px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(15, 95, 85, 0.12);
    }
    textarea { min-height: 76px; resize: vertical; }

    .shell { min-height: 100vh; }
    .topbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }
    .brand span { color: var(--muted); font-size: 12px; }
    .userbar { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; flex-wrap: wrap; justify-content: flex-end; }

    .workspace {
      width: min(1500px, calc(100vw - 48px));
      margin: 18px auto 44px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) repeat(6, auto);
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      box-shadow: var(--shadow-soft);
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px;
      width: fit-content;
      box-shadow: var(--shadow-soft);
    }
    .nav-tabs button {
      border: 0;
      background: transparent;
      min-width: 72px;
      min-height: 30px;
      font-weight: 700;
    }
    .nav-tabs button.active {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
      box-shadow: none;
    }
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      background: var(--panel);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
      min-width: 58px;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active {
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-weight: 700;
    }

    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1320px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 11px;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
      white-space: nowrap;
    }
    th {
      background: var(--panel-2);
      color: #344054;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--brand); }
    tbody tr:hover { background: #f8fbfb; }
    .stock-name { font-weight: 760; }
    .stock-code { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 6px;
      border-radius: 4px;
      background: var(--soft);
      color: #344054;
      font-size: 12px;
      font-weight: 650;
    }
    .gain { color: var(--gain); font-weight: 700; }
    .loss { color: var(--loss); font-weight: 700; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 5px; align-items: center; }
    .tax-header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tax-header label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .tax-header input {
      width: 14px;
      height: 14px;
      padding: 0;
      box-shadow: none;
      order: 2;
    }
    .empty {
      padding: 42px 22px;
      text-align: center;
      color: var(--muted);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }
    .login-panel {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .login-panel h1 { margin: 0 0 7px; font-size: 22px; }
    .login-panel p { margin: 0 0 18px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .login-actions { display: grid; gap: 10px; }
    .oauth-button {
      width: 100%;
      min-height: 38px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 2px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; color: #344054; font-weight: 700; }
    .form-row { display: grid; grid-template-columns: 1fr 104px; gap: 8px; align-items: end; }
    .notice {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 5px;
      line-height: 1.55;
      font-size: 13px;
    }
    .share-banner {
      margin-bottom: 12px;
      padding: 11px 12px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .update-banner {
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid #f1d28a;
      background: #fff8e5;
      color: #7a4b00;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .publisher-panel {
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      box-shadow: var(--shadow-soft);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .publisher-panel h2 {
      margin: 0 0 6px;
      font-size: 16px;
    }
    .publisher-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }
    .share-settings {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .share-settings select { width: 112px; }
    .share-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .share-state, .source-cell {
      display: grid;
      gap: 4px;
    }
    .share-state strong, .source-cell strong { font-size: 13px; }
    .source-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .badge.soft { font-weight: 500; color: var(--muted); background: #f4f6fa; }
    .badge.warn { background: #fff4cc; color: #805400; }
    .publish-box {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcff;
    }
    .publish-box label {
      display: block;
      font-weight: 700;
      color: #344054;
      margin-bottom: 7px;
      font-size: 13px;
    }
    .publish-box textarea { min-height: 84px; }
    .publish-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .publish-actions button {
      min-width: 112px;
      border-color: #c2410c;
      background: #c2410c;
      color: white;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(194, 65, 12, 0.16);
    }
    .publish-actions button:hover:not(:disabled) {
      border-color: #9a3412;
      background: #9a3412;
    }
    .form-error {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #f6c0b7;
      background: #fff3f0;
      color: #912018;
      border-radius: 6px;
      line-height: 1.5;
      text-align: left;
      font-size: 13px;
    }
    .readonly-note {
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid #d7e3f8;
      background: #f2f6ff;
      color: #24436f;
      border-radius: 6px;
      line-height: 1.5;
      font-size: 13px;
    }
    .disclaimer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .square-card, .admin-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }
    .square-card h3, .admin-card h3 { margin: 0; font-size: 16px; }
    .mini-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .mini-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--soft);
      padding-top: 7px;
    }
    .admin-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .admin-list {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .admin-user-row {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      min-height: 62px;
      text-align: left;
      padding: 10px;
      display: grid;
      gap: 4px;
    }
    .admin-user-row.active { background: #e9f0fb; }
    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .admin-actions input { width: min(360px, 100%); }
    .private-row { background: #fffdf6; }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.36);
      display: none;
      z-index: 20;
    }
    .drawer.open { display: block; }
    .drawer-panel {
      width: min(1220px, 100vw);
      height: 100%;
      margin-left: auto;
      background: var(--panel);
      box-shadow: -12px 0 34px rgba(15, 23, 42, 0.16);
      display: flex;
      flex-direction: column;
    }
    .drawer-head {
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .drawer-head h2 { margin: 0; font-size: 17px; }
    .drawer-body {
      padding: 14px 20px 20px;
      overflow: auto;
      background: #f6f8fa;
    }
    .drawer-foot {
      padding: 10px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-start;
      gap: 10px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 5px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-title {
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .section-body { padding: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .valuation-layout {
      display: grid;
      grid-template-columns: minmax(780px, 1fr) minmax(340px, 380px);
      gap: 16px;
      align-items: start;
    }
    .valuation-form {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px 14px 16px;
      box-shadow: var(--shadow-soft);
    }
    .drawer input,
    .drawer select {
      min-height: 34px;
      padding: 6px 9px;
      font-size: 13px;
      line-height: 1.35;
      border-radius: 4px;
    }
    .drawer textarea {
      min-height: 72px;
      padding: 8px 9px;
      font-size: 13px;
      line-height: 1.55;
      border-radius: 4px;
    }
    .compact-row {
      display: grid;
      grid-template-columns: 106px minmax(0, 1fr) 70px;
      gap: 8px 10px;
      align-items: center;
      min-height: 34px;
      margin-bottom: 8px;
    }
    .compact-row.two {
      grid-template-columns: 106px 260px 118px 260px;
      column-gap: 12px;
      row-gap: 10px;
    }
    .compact-row.stock-search-row,
    .compact-row.currency-row {
      grid-template-columns: 106px 420px minmax(0, 1fr);
    }
    .compact-row.market-cap-row {
      grid-template-columns: 106px minmax(160px, 260px) minmax(0, 1fr);
    }
    .compact-row.amount-row {
      grid-template-columns: 106px 260px minmax(0, 1fr);
    }
    .compact-row label,
    .inline-label {
      font-weight: 700;
      color: #344054;
      font-size: 13px;
      line-height: 1.35;
      align-self: center;
    }
    .market-cap-value {
      color: #111827;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 500;
    }
    .amount-field {
      position: relative;
    }
    .amount-field input {
      padding-right: 62px;
    }
    .amount-suffix {
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .form-divider {
      margin: 12px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #d6deea;
      font-weight: 700;
      color: #172033;
      font-size: 13px;
    }
    .result-panel {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      position: sticky;
      top: 72px;
    }
    .result-panel h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 13px;
    }
    .result-grid strong {
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
      color: #344054;
    }
    .search-results {
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      display: none;
    }
    .search-results.show { display: block; }
    .result-item {
      width: 100%;
      min-height: 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      padding: 9px 10px;
    }
    .result-item:last-child { border-bottom: 0; }
    .result-item strong { display: block; }
    .result-item span { color: var(--muted); font-size: 13px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .result-panel .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric {
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 9px;
      background: #f8fafc;
      min-height: 64px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 5px; font-size: 16px; line-height: 1.3; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; }

    @media (max-width: 860px) {
      .topbar { padding: 10px 12px; height: auto; min-height: 56px; flex-wrap: wrap; align-items: flex-start; }
      .brand { width: 100%; justify-content: space-between; }
      .brand span { display: none; }
      .userbar { width: 100%; justify-content: flex-start; }
      .workspace { width: calc(100vw - 20px); margin-top: 12px; }
      .nav-tabs { width: 100%; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .nav-tabs button { min-width: 0; }
      .toolbar { grid-template-columns: 1fr; padding: 8px; }
      .segmented { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); }
      .segmented button { min-width: 0; border-right: 0; border-bottom: 1px solid var(--line); }
      .segmented button:nth-last-child(-n+4) { border-bottom: 0; }
      .share-settings { justify-content: space-between; }
      .share-settings select { width: 160px; }
      .admin-layout { grid-template-columns: 1fr; }
      .share-banner, .publisher-panel, .update-banner { align-items: flex-start; flex-direction: column; }
      .form-row, .grid-2, .grid-3, .summary { grid-template-columns: 1fr; }
      .valuation-layout { grid-template-columns: 1fr; }
      .valuation-form { padding: 12px; }
      .result-panel { position: static; }
      .compact-row,
      .compact-row.two,
      .compact-row.stock-search-row,
      .compact-row.currency-row,
      .compact-row.market-cap-row,
      .compact-row.amount-row { grid-template-columns: 1fr; }
      .amount-field input { padding-right: 62px; }
      .drawer-panel { width: 100vw; }
      .drawer-head, .drawer-body, .drawer-foot { padding-left: 12px; padding-right: 12px; }
      .drawer-foot { justify-content: stretch; }
      .drawer-foot button { flex: 1; }
      .card-grid { grid-template-columns: 1fr; }
      .table-panel { background: transparent; border: 0; box-shadow: none; overflow: visible; }
      .table-scroll { overflow: visible; }
      table, thead, tbody, tr, th, td { display: block; width: 100%; min-width: 0; }
      table { border-collapse: separate; }
      thead { display: none; }
      tbody { display: grid; gap: 12px; }
      tr {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }
      td {
        display: grid;
        grid-template-columns: minmax(92px, 34%) minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border-bottom: 1px solid var(--soft);
        white-space: normal;
        padding: 9px 10px;
      }
      td:last-child { border-bottom: 0; }
      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      td[data-label="标的"]::before { content: ""; display: none; }

      try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(decodeURIComponent(Array.from(atob(payload)).map((char) => `%${char.charCodeAt(0).toString(16).padStart(2, "0")}`).join("")));

        return {};

      if (!location.hash.includes("access_token=")) return null;
      const params = new URLSearchParams(location.hash.slice(1));
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");
      const expiresAt = Number(params.get("expires_at")) || Math.floor(Date.now() / 1000) + Number(params.get("expires_in") || 3600);
      if (!accessToken) return null;
      const claims = decodeJwt(accessToken);
      const session = {
        access_token: accessToken,
        refresh_token: refreshToken,
        expires_at: expiresAt,
        user: {
          id: claims.sub,
          email: claims.email || claims.user_metadata?.email || "",
          user_metadata: claims.user_metadata || {},
          app_metadata: claims.app_metadata || {}
        },
        claims
      };
      writeJson(AUTH_STORAGE_KEY, session);
      history.replaceState(null, "", AUTH_REDIRECT_URL);
      return session;
    }

    function currentSession() {
      const hashSession = sessionFromHash();
      if (hashSession) return hashSession;

      if (!saved?.access_token) return null;
      const claims = decodeJwt(saved.access_token);
      saved.claims = saved.claims || claims;

        user_metadata: saved.user?.user_metadata || claims.user_metadata || {},

    function persistSession(session) {

    function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { signal: controller.signal }).finally(() => window.clearTimeout(timeout));
    }

    function jsonp(url, callbackParam = "cb") {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("JSONP 请求超时"));
        }, 8000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP 请求失败"));
        };
        script.src = `${url}${separator}${callbackParam}=${callbackName}`;
        document.head.appendChild(script);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          script.remove();
          reject(new Error("脚本请求超时"));
        }, 8000);
        script.onload = () => {
          window.clearTimeout(timeout);
          script.remove();
          resolve();
        };
        script.onerror = () => {
          window.clearTimeout(timeout);
          script.remove();
          reject(new Error("脚本请求失败"));
        };
        script.src = url;
        document.head.appendChild(script);
      });
    }

    async function fetchTencentQuote(stock) {
      const symbol = tencentSymbol(stock);
      if (!symbol) throw new Error("无法识别腾讯行情代码");
      const variableName = `v_${symbol}`;
      delete window[variableName];
      await loadScript(`https://qt.gtimg.cn/q=${symbol}`);

      const sourceCurrency = marketCurrency(stock.market);
      return {

        latestMarketCapCny: marketCapYi * (currencies[sourceCurrency]?.rateToCny || 1),
        marketCapSourceCurrency: sourceCurrency,
        marketCapUpdatedAt: todayString()

    function calc(stock) {
      const latest = Number(stock.latestMarketCapCny) || 0;
      const profit = Number(stock.expectedProfitCny) || 0;
      const pe = Number(stock.expectedPE) || 0;
      const cash = Number(stock.netCashCny) || 0;
      const discount = Number(stock.netCashDiscountRate) || 0;
      const shareholder = Number(stock.expectedShareholderReturnCny) || 0;
      const expectedMarketCapCny = profit * pe + cash * discount;
      return {
        expectedMarketCapCny,
        upside: latest ? expectedMarketCapCny / latest - 1 : null,
        forwardPE: profit ? (latest - cash * discount) / profit : null,
        shareholderReturnRate: latest ? shareholder / latest : null
      };

    function userStocks() {
      const query = state.query.trim().toLowerCase();
      const viewingOwn = state.viewPublisherId === "own";
      let rows = viewingOwn ? [...state.stocks] : [...state.publisherStocks];
      if (state.filter !== "ALL") rows = rows.filter((item) => item.market === state.filter);
      if (viewingOwn && state.shareFilter === "SHARED") rows = rows.filter((item) => item.isShared);
      if (query) {
        rows = rows.filter((item) => `${item.name} ${item.code}`.toLowerCase().includes(query));
      }
      rows.sort((a, b) => {
        const groupWeight = (item) => item.pin === "top" ? 0 : item.pin === "bottom" ? 2 : 1;
        const groupDiff = groupWeight(a) - groupWeight(b);
        if (groupDiff) return groupDiff;
        if (state.sort.key === "manual") return (a.manualOrder || 0) - (b.manualOrder || 0);
        const ca = calc(a);
        const cb = calc(b);
        const va = state.sort.key === "shareholderReturnRate"
          ? shareholderReturnRateForList(a, ca) ?? -Infinity
          : ca[state.sort.key] ?? -Infinity;
        const vb = state.sort.key === "shareholderReturnRate"
          ? shareholderReturnRateForList(b, cb) ?? -Infinity
          : cb[state.sort.key] ?? -Infinity;
        return state.sort.dir === "asc" ? va - vb : vb - va;
      });
      return rows;
    }

    function renderTable() {
      const rows = userStocks();
      const viewingOwn = state.viewPublisherId === "own";
      if (!rows.length) {
        const text = viewingOwn ? "还没有股票。点击“新增股票”，从搜索匹配开始建立你的股池。" : "这个分享股池目前没有已发布股票。";

      return `
        <section class="table-panel">
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>标的</th>
                  <th>最新市值<br><span class="stock-code">CNY 亿</span></th>
                  ${sortTh("upside", "upside")}
                  ${sortTh("forwardPE", "Forward PE")}
                  ${sortTh("shareholderReturnRate", `<div class="tax-header"><span>前瞻股东回报率</span><label><span>20%股息税后</span><input type="checkbox" data-input="stockConnectTax" ${state.stockConnectDividendTax ? "checked" : ""}></label></div>`)}

                  <th>操作</th>

            </table>

      `;
    }

    function sortTh(key, label) {
      const active = state.sort.key === key;
      const arrow = active ? (state.sort.dir === "asc" ? " ↑" : " ↓") : "";
      return `<th class="sortable" data-sort="${key}">${label}${arrow}</th>`;
    }

    function renderRow(stock, viewingOwn) {
      const c = calc(stock);
      const shareholderRate = shareholderReturnRateForList(stock, c);
      return `
        <tr>
          <td data-label="标的">
            <div class="stock-name">${escapeHtml(stock.name || "--")}</div>
            <div class="stock-code">${escapeHtml(stock.code || "--")}</div>

          <td data-label="Forward PE">${c.forwardPE ? trimNumber(c.forwardPE) + "x" : "--"}</td>
          <td data-label="前瞻股东回报率" class="${Number(shareholderRate) >= 0 ? "gain" : "loss"}">${percent(shareholderRate)}</td>
          <td data-label="前瞻市值">${moneyYiCny(c.expectedMarketCapCny)}</td>
          <td data-label="前瞻利润">${moneyYiCny(stock.expectedProfitCny)}</td>
          <td data-label="前瞻 PE">${stock.expectedPE ? trimNumber(stock.expectedPE) + "x" : "--"}</td>
          <td data-label="净现金">${moneyYiCny(stock.netCashCny)}</td>

          ${viewingOwn ? `

                    <input data-field="netCashScope" value="${escapeHtml(form.netCashScope || "")}" placeholder="请输入" ${locked}>
                    <label class="inline-label">净现金打折系数:</label>
                    <input type="number" min="0" max="1" step="0.01" data-field="netCashDiscountRate" value="${escapeHtml(form.netCashDiscountRate)}" placeholder="输入0-1之间数字" ${locked}>
                  </div>

                  <div class="form-divider">我的备注</div>
                  <textarea data-field="myNote" placeholder="记录你自己的观察，这部分不会影响发布者原始数据。">${escapeHtml(form.myNote || "")}</textarea>

                  <input type="hidden" data-field="name" value="${escapeHtml(form.name)}">
                  <input type="hidden" data-field="code" value="${escapeHtml(form.code)}">
                  <input type="hidden" data-field="market" value="${escapeHtml(form.market)}">
                  <input type="hidden" data-field="exchange" value="${escapeHtml(form.exchange)}">
                  <input type="hidden" data-field="marketCapUpdatedAt" value="${escapeHtml(form.marketCapUpdatedAt)}">
                  ${state.drawerError ? `<div class="form-error">${escapeHtml(state.drawerError)}</div>` : ""}
                </div>
                <div class="result-panel">
                  <h3>测算结果:</h3>
                  <div class="result-grid summary">
                    ${resultItem("前瞻市值", `${money(c.expectedMarketCapCny, currency)}`)}
                    ${resultItem("upside", percent(c.upside))}
                    ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
                    ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
                  </div>
                  <div class="hint" style="margin-top:14px">股票匹配优先使用公开行情接口；市值会按所选货币实时换算，可手动调整估值假设。</div>
                  <div class="publish-box">
                    <label>发布变更说明</label>
                    <textarea data-field="publishNote" placeholder="记录这次为什么发布或更新观点，例如盈利假设变化、估值口径变化等。">${escapeHtml(form.publishNote || "")}</textarea>
                    <div class="hint">发布会先保存当前内容，再进入分享股池并记录版本。未发布内容仅自己可见。</div>
                    <div class="publish-actions">
                      <button data-action="publishStock" ${isSubscribed ? "disabled" : ""}>发布</button>
                    </div>
                    <div class="disclaimer">内容为用户个人记录，不构成投资建议。</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="drawer-foot">
              <button data-action="closeDrawer">取消</button>
              <button class="primary" data-action="saveStock">保存</button>
            </div>
          </div>
        </aside>
      `;
    }

    function field(label, key, value, type = "text") {
      return `<div class="field"><label>${label}</label><input type="${type}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function numberField(label, key, value, min = "", max = "", step = "any") {
      return `<div class="field"><label>${label}</label><input type="number" min="${min}" max="${max}" step="${step}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function amountField(label, key, cny, currency) {
      return `<div class="field"><label>${label}（${currencies[currency].unit}）</label><input type="number" step="any" data-amount="${key}" value="${escapeHtml(toDisplay(cny, currency))}"></div>`;
    }

    function selectField(label, key, value, options) {
      return `
        <div class="field">
          <label>${label}</label>
          <select data-field="${key}">
            ${options.map(([optionValue, optionLabel]) => `<option value="${optionValue}" ${value === optionValue ? "selected" : ""}>${optionLabel}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function textareaField(label, key, value) {
      return `<div class="field"><label>${label}</label><textarea data-field="${key}">${escapeHtml(value)}</textarea></div>`;
    }

    function metric(label, value, cls = "") {
      return `<div class="metric"><span>${label}</span><strong class="${cls}">${value}</strong></div>`;
    }

    function resultItem(label, value) {
      return `<div><strong>${label}:</strong> ${value}</div>`;
    }

    function forecastYearSelect(value, attrs = "") {
      const years = [];
      for (let year = 2025; year <= 2035; year += 1) years.push(`${year}E`);
      return `
        <select data-field="forecastYear" ${attrs}>
          ${years.map((year) => `<option value="${year}" ${value === year ? "selected" : ""}>${year}</option>`).join("")}
        </select>
      `;
    }

    function bindEvents() {
      document.getElementById("app").onclick = (event) => {
        const actionEl = event.target.closest("[data-action]");
        if (actionEl) onAction({ currentTarget: actionEl });
      };
      document.querySelectorAll("[data-filter]").forEach((el) => {
        el.addEventListener("click", () => { state.filter = el.dataset.filter; render(); });
      });
      document.querySelectorAll("[data-sort]").forEach((el) => {
        el.addEventListener("click", () => toggleSort(el.dataset.sort));
      });
      const stockConnectTax = document.querySelector("[data-input='stockConnectTax']");
      if (stockConnectTax) {
        stockConnectTax.addEventListener("click", (event) => event.stopPropagation());
        stockConnectTax.addEventListener("change", (event) => {
          state.stockConnectDividendTax = event.target.checked;
          render();
        });
      }
      document.querySelectorAll("[data-field]").forEach((el) => {
        el.addEventListener("input", () => updateFormField(el.dataset.field, el.value));
        el.addEventListener("change", () => updateFormField(el.dataset.field, el.value));
      });
      document.querySelectorAll("[data-amount]").forEach((el) => {
        el.addEventListener("input", () => updateAmountField(el.dataset.amount, el.value));
      });
      const loginForm = document.querySelector("[data-form='login']");
      if (loginForm) loginForm.addEventListener("submit", onLogin);
      const profileForm = document.querySelector("[data-form='profile']");
      if (profileForm) profileForm.addEventListener("submit", onProfileSubmit);
      const listSearch = document.querySelector("[data-input='searchList']");
      if (listSearch) listSearch.addEventListener("input", (event) => { state.query = event.target.value; render(); });
      const viewPublisher = document.querySelector("[data-input='viewPublisher']");
      if (viewPublisher) viewPublisher.addEventListener("change", async (event) => {
        state.viewPublisherId = event.target.value;
        state.query = "";
        if (state.viewPublisherId !== "own") await loadPublisherStocks(state.viewPublisherId);
        render();
      });
      const shareVisibility = document.querySelector("[data-input='shareVisibility']");
      if (shareVisibility) shareVisibility.addEventListener("change", (event) => updateShareVisibility(event.target.value));
      const squareSort = document.querySelector("[data-input='squareSort']");
      if (squareSort) squareSort.addEventListener("change", (event) => { state.squareSort = event.target.value; render(); });
      const stockSearch = document.querySelector("[data-input='stockSearch']");
      if (stockSearch) stockSearch.addEventListener("input", onStockSearch);
    }

    async function onAction(event) {
      const action = event.currentTarget.dataset.action;
      const stockId = event.currentTarget.dataset.id;
      if (action === "logout") {
        writeJson(AUTH_STORAGE_KEY, null);
        state.session = null;
        state.profile = null;
        state.profileRequired = false;
        state.stocks = [];
        state.publisherStocks = [];
        state.publisherProfile = null;
        state.followedPublishers = [];
        render();
      }
      if (action === "githubLogin") loginWithGithub();
      if (action === "switchMainView") switchMainView(event.currentTarget.dataset.view);
      if (action === "newStock") openDrawer();
      if (action === "closeDrawer") closeDrawer();
      if (action === "saveStock") saveStock();
      if (action === "publishStock") publishStock();
      if (action === "toggleSharedFilter") {
        state.shareFilter = state.shareFilter === "SHARED" ? "ALL" : "SHARED";
        render();
      }
      if (action === "copyShareLink") copyShareLink();
      if (action === "followPublisher") followPublisher(stockId);
      if (action === "copySharedStock") copySharedStock(stockId, "copied");
      if (action === "subscribeStock") copySharedStock(stockId, "subscribed");
      if (action === "unsubscribeStock") unsubscribeStock(stockId);
      if (action === "convertToOwn") convertToOwnStock(stockId);
      if (action === "markSourceUpdatesRead") markSourceUpdatesRead();
      if (action === "openPublisherFromSquare") openPublisherFromSquare(stockId);
      if (action === "selectAdminUser") selectAdminUser(stockId);
      if (action === "adminToggleSquare") adminToggleUser(stockId, "square_hidden");
      if (action === "adminToggleShareBan") adminToggleUser(stockId, "share_banned");
      if (action === "adminSaveNote") adminSaveNote(stockId);
      if (action === "adminToggleStockHidden") adminToggleStockHidden(stockId);
      if (action === "edit") openDrawer(stockId);
      if (action === "pinTop") updatePin(stockId, "top");
      if (action === "pinBottom") updatePin(stockId, "bottom");
      if (action === "delete") deleteStock(stockId);
    }

    async function switchMainView(view) {
      state.mainView = view || "pool";
      state.query = "";
      if (state.mainView === "square") await loadSquare();
      if (state.mainView === "admin" && state.isAdmin) await loadAdmin();
      render();
    }

    async function onLogin(event) {
      event.preventDefault();
      const email = new FormData(event.currentTarget).get("email").trim().toLowerCase();
      if (!email) return;
      state.lastError = "";
      state.loginNotice = "正在发送登录邮件...";
      renderLogin();
      try {
        await sendMagicLink(email);
        state.loginNotice = `登录链接已发送到 ${email}，请在邮箱中点击链接完成登录。`;
      } catch (error) {
        state.lastError = error.message || String(error);
        state.loginNotice = "";
      }
      renderLogin();
    }

    async function onProfileSubmit(event) {
      event.preventDefault();
      const nickname = new FormData(event.currentTarget).get("nickname").trim();
      if (!nickname) return;
      state.nicknameNotice = "正在创建昵称...";
      renderProfileSetup();
      try {
        const rows = await supabaseRequest("/rest/v1/profiles?select=id,email,nickname,share_visibility,created_at", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            id: state.session.user.id,
            email: state.session.user.email,
            nickname,
            share_visibility: "private"
          })
        });
        state.profile = rows?.[0] || { id: state.session.user.id, email: state.session.user.email, nickname, share_visibility: "private" };
        state.profileRequired = false;
        state.nicknameNotice = "";
        await afterProfileReady();
      } catch (error) {
        state.nicknameNotice = String(error.message || error).includes("duplicate")
          ? "这个昵称已经被占用，请换一个。"
          : `昵称保存失败：${error.message || String(error)}`;
      }
      render();
    }

    function openDrawer(stockId = null) {
      const stock = state.stocks.find((item) => item.id === stockId);
      state.editingId = stockId;
      state.form = stock ? { ...stock } : emptyForm();
      state.drawerError = "";
      state.drawerOpen = true;
      render();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      state.editingId = null;
      state.form = null;
      state.drawerError = "";
      render();
    }

    function updateFormField(key, value) {
      if (!state.form) return;
      if (["expectedPE", "netCashDiscountRate"].includes(key)) state.form[key] = Number(value);
      else state.form[key] = value;
      if (key === "market") {
        state.form.displayCurrency = defaultCurrencyFor(state.form);
        render();
        return;
      }
      if (key === "displayCurrency") {
        render();
        return;
      }
      if (["expectedPE", "netCashDiscountRate", "expectedPERemark", "shareholderReturnRemark", "forecastYear"].includes(key)) refreshSummary();
    }

    function updateAmountField(key, value) {
      if (!state.form) return;
      state.form[key] = toCny(value, state.form.displayCurrency);
      refreshSummary();
    }

    function refreshSummary() {
      const summary = document.querySelector(".summary");
      if (!summary || !state.form) return;
      const currency = state.form.displayCurrency || "CNY";
      const c = calc(state.form);
      summary.innerHTML = `
        ${resultItem("前瞻市值", money(c.expectedMarketCapCny, currency))}
        ${resultItem("upside", percent(c.upside))}
        ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
        ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
      `;
    }

    async function onStockSearch(event) {
      const query = event.target.value.trim().toLowerCase();
      const box = document.getElementById("searchResults");
      if (!query) {
        box.className = "search-results";
        box.innerHTML = "";
        return;
      }
      box.className = "search-results show";
      box.innerHTML = `<div class="empty" style="padding:18px">正在匹配股票...</div>`;
      const results = await searchStocks(query);
      box.className = `search-results ${results.length ? "show" : "show"}`;
      box.innerHTML = results.length
        ? results.map((stock, index) => `
          <button class="result-item" data-catalog="${index}">
            <span><strong>${escapeHtml(stock.name)}</strong><span>${escapeHtml(stock.code)} · ${marketLabel(stock.market)} · ${escapeHtml(stock.exchange)}</span></span>
            <span>${stock.quoteId ? "点击获取市值" : money(stock.marketCapCny, defaultCurrencyFor(stock))}</span>
          </button>
        `).join("")
        : `<div class="empty" style="padding:18px">没有匹配结果，可以继续手动录入。</div>`;
      box.querySelectorAll("[data-catalog]").forEach((button) => {
        button.addEventListener("click", async () => {
          button.disabled = true;
          button.innerHTML = "正在获取最新市值...";
          const quote = await fetchQuote(results[Number(button.dataset.catalog)]);
          applyCatalog(quote);
        });
      });
    }

    function applyCatalog(stock) {
      if (!state.form || !stock) return;
      state.form.name = stock.name;
      state.form.code = stock.code;
      state.form.market = stock.market;
      state.form.exchange = stock.exchange;
      state.form.displayCurrency = defaultCurrencyFor(stock);
      state.form.quoteId = stock.quoteId || "";
      state.form.marketCapSourceCurrency = stock.marketCapSourceCurrency || stock.currency || marketCurrency(stock.market);
      state.form.latestMarketCapCny = stock.latestMarketCapCny || stock.marketCapCny || 0;
      state.form.marketCapUpdatedAt = stock.marketCapUpdatedAt || stock.updatedAt || todayString();
      state.form.forecastYear = state.form.forecastYear || "2025E";
      render();
    }

    async function saveStock({ keepOpen = false } = {}) {
      if (!state.form.name.trim() || !state.form.code.trim()) {
        state.drawerError = "请填写股票名称和代码。";
        render();
        return null;
      }
      state.drawerError = "";
      const now = new Date().toISOString();
      const payload = {
        ...state.form,
        publishNote: "",
        updatedAt: now,
        manualOrder: state.form.manualOrder ?? Date.now()
      };
      const rowPatch = {
        payload,
        updated_at: now,
        source_user_id: payload.sourceUserId || null,
        source_stock_id: payload.sourceStockId || null,
        source_nickname: payload.sourceNickname || null,
        source_type: payload.sourceType || "self",
        last_source_updated_at: payload.lastSourceUpdatedAt || null,
        source_seen_published_at: payload.sourceSeenPublishedAt || null,
        is_shared: Boolean(payload.isShared),
        last_published_at: payload.lastPublishedAt || null
      };
      if (payload.id) {
        try {
          await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(payload.id)}`, {
            method: "PATCH",
            body: JSON.stringify(rowPatch)
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          render();
          return null;
        }
        state.stocks = state.stocks.map((item) => item.id === payload.id ? payload : item);
      } else {
        payload.createdAt = now;
        payload.pin = "normal";
        let data;
        try {
          data = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
            method: "POST",
            prefer: "return=representation",
            body: JSON.stringify({
              user_id: state.session.user.id,
              ...rowPatch
            })
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          render();
          return null;
        }
        payload.id = data?.[0]?.id;
        state.stocks.push(payload);
      }
      state.form = { ...payload };
      if (!keepOpen) closeDrawer();
      return payload;
    }

    async function publishStock() {
      if (state.form?.sourceType === "subscribed") {
        state.drawerError = "订阅来的股票不能发布。如需发布自己的观点，请先转为我的股票。";
        render();
        return;
      }
      if (state.profile?.share_banned) {
        state.drawerError = "你的分享能力当前已被管理员禁用，暂时不能发布。";
        render();
        return;
      }
      const note = state.form?.publishNote?.trim() || "";
      const stock = await saveStock({ keepOpen: true });
      if (!stock?.id) return;
      const now = new Date().toISOString();
      const payload = {
        ...stock,
        isShared: true,
        lastPublishedAt: now,
        updatedAt: now,
        publishNote: ""
      };
      try {
        const latest = await supabaseRequest(`/rest/v1/stock_publications?stock_id=eq.${encodeURIComponent(stock.id)}&select=version_number&order=version_number.desc&limit=1`);
        const versionNumber = Number(latest?.[0]?.version_number || 0) + 1;
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stock.id)}`, {
          method: "PATCH",
          body: JSON.stringify({
            payload,
            updated_at: now,
            is_shared: true,
            last_published_at: now
          })
        });
        await supabaseRequest("/rest/v1/stock_publications", {
          method: "POST",
          body: JSON.stringify({
            stock_id: stock.id,
            publisher_id: state.session.user.id,
            version_number: versionNumber,
            change_note: note,
            payload
          })
        });
      } catch (error) {
        state.drawerError = `发布失败：${error.message || String(error)}`;
        render();
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stock.id ? payload : item);
      state.form = { ...payload };
      closeDrawer();
    }

    async function updatePin(stockId, pin) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock) return;
      const payload = { ...stock, pin, updatedAt: new Date().toISOString() };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({ payload, updated_at: payload.updatedAt })
        });
      } catch (error) {
        alert(`更新失败：${error.message || String(error)}`);
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stockId ? payload : item);
      render();
    }

    async function deleteStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || !confirm(`删除 ${stock.name}？`)) return;
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "DELETE"
        });
      } catch (error) {
        alert(`删除失败：${error.message || String(error)}`);
        return;
      }
      state.stocks = state.stocks.filter((item) => item.id !== stockId);
      render();
    }

    function toggleSort(key) {
      if (state.sort.key !== key) state.sort = { key, dir: "desc" };
      else if (state.sort.dir === "desc") state.sort.dir = "asc";
      else state.sort = { key: "manual", dir: "asc" };
      render();
    }

    async function loadStocks() {
      let data;
      try {
        data = await supabaseRequest("/rest/v1/stock_records?select=id,payload,source_user_id,source_stock_id,source_nickname,source_type,last_source_updated_at,source_seen_published_at,is_shared,last_published_at,created_at,updated_at&order=created_at.asc");
      } catch (error) {
        state.lastError = error.message || String(error);
        state.stocks = [];
        return;
      }
      state.stocks = (data || []).map((row) => normalizeStockRow(row));
      await mergeLatestSourceStocks();
    }

    function normalizeStockRow(row) {
      return {
        ...row.payload,
        id: row.id,
        userId: row.user_id || row.payload?.userId || "",
        sourceUserId: row.source_user_id || row.payload?.sourceUserId || "",
        sourceStockId: row.source_stock_id || row.payload?.sourceStockId || "",
        sourceNickname: row.source_nickname || row.payload?.sourceNickname || "",
        sourceType: row.source_type || row.payload?.sourceType || (row.source_stock_id || row.payload?.sourceStockId ? "copied" : "self"),
        lastSourceUpdatedAt: row.last_source_updated_at || row.payload?.lastSourceUpdatedAt || "",
        sourceSeenPublishedAt: row.source_seen_published_at || row.payload?.sourceSeenPublishedAt || "",
        isShared: Boolean(row.is_shared || row.payload?.isShared),
        lastPublishedAt: row.last_published_at || row.payload?.lastPublishedAt || "",
        adminHidden: Boolean(row.admin_hidden || row.payload?.adminHidden),
        sourceStopped: Boolean(row.payload?.sourceStopped),
        hasSourceUpdate: Boolean(row.payload?.hasSourceUpdate),
        myNote: row.payload?.myNote || ""
      };
    }

    async function mergeLatestSourceStocks() {
      state.sourceUpdateCount = 0;
      const sourceIds = [...new Set(state.stocks.filter((stock) => stock.sourceType === "subscribed").map((stock) => stock.sourceStockId).filter(Boolean))];
      if (!sourceIds.length) return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?id=in.(${sourceIds.map(encodeURIComponent).join(",")})&is_shared=eq.true&select=id,payload,source_nickname,last_published_at,updated_at`);
        const sourceMap = new Map((rows || []).map((row) => [row.id, normalizeStockRow(row)]));
        state.stocks = state.stocks.map((stock) => {
          const source = sourceMap.get(stock.sourceStockId);
          if (!source) return { ...stock, sourceStopped: true, hasSourceUpdate: false };
          const sourcePublishedAt = source.lastPublishedAt || source.updatedAt || "";
          const hasSourceUpdate = Boolean(sourcePublishedAt && stock.sourceSeenPublishedAt && sourcePublishedAt > stock.sourceSeenPublishedAt);
          if (hasSourceUpdate) state.sourceUpdateCount += 1;
          return {
            ...source,
            id: stock.id,
            createdAt: stock.createdAt,
            manualOrder: stock.manualOrder,
            pin: stock.pin,
            isShared: stock.isShared,
            lastPublishedAt: stock.lastPublishedAt,
            sourceUserId: stock.sourceUserId,
            sourceStockId: stock.sourceStockId,
            sourceNickname: stock.sourceNickname,
            sourceType: stock.sourceType,
            sourceSeenPublishedAt: stock.sourceSeenPublishedAt,
            lastSourceUpdatedAt: sourcePublishedAt || stock.lastSourceUpdatedAt,
            updatedAt: source.updatedAt || stock.updatedAt,
            sourceStopped: false,
            hasSourceUpdate,
            myNote: stock.myNote || ""
          };
        });
      } catch (error) {
        console.warn("同步来源股池失败。", error);
      }
    }

    async function loadPublisherStocks(publisherId) {
      state.publisherStocks = [];
      state.publisherProfile = null;
      if (!publisherId || publisherId === "own") return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?user_id=eq.${encodeURIComponent(publisherId)}&is_shared=eq.true&admin_hidden=eq.false&select=id,user_id,payload,is_shared,last_published_at,updated_at&order=last_published_at.desc`);
        const profile = state.followedPublishers.find((item) => item.id === publisherId) || state.shareInviteProfile || state.publisherProfile;
        state.publisherProfile = profile || null;
        state.publisherStocks = (rows || []).map((row) => ({
          ...normalizeStockRow(row),
          publisherId: row.user_id,
          publisherNickname: profile?.nickname || row.user_id
        }));
      } catch (error) {
        alert(`读取分享股池失败：${error.message || String(error)}`);
      }
    }

    async function loadSquare() {
      try {
        const profiles = await supabaseRequest("/rest/v1/profiles?share_visibility=eq.public&square_hidden=eq.false&share_banned=eq.false&select=id,email,nickname,share_visibility,created_at");
        const rows = await supabaseRequest("/rest/v1/stock_records?is_shared=eq.true&admin_hidden=eq.false&select=id,user_id,payload,last_published_at,updated_at&order=last_published_at.desc");
        const byUser = new Map();
        (rows || []).forEach((row) => {
          const stock = normalizeStockRow(row);
          const list = byUser.get(row.user_id) || [];
          list.push({ ...stock, userId: row.user_id });
          byUser.set(row.user_id, list);
        });
        state.squareProfiles = (profiles || [])
          .map((profile) => {
            const stocks = byUser.get(profile.id) || [];
            const latestPublishedAt = stocks.map((stock) => stock.lastPublishedAt).filter(Boolean).sort().at(-1);
            return { ...profile, stocks, stockCount: stocks.length, latestPublishedAt };
          })
          .filter((profile) => profile.stockCount > 0);
      } catch (error) {
        alert(`读取广场失败：${error.message || String(error)}`);
      }
    }

    async function loadAdmin() {
      if (!state.isAdmin) return;
      try {
        state.adminUsers = await supabaseRequest("/rest/v1/profiles?select=id,email,nickname,share_visibility,square_hidden,share_banned,admin_note,created_at&order=created_at.desc") || [];
        state.adminStocks = (await supabaseRequest("/rest/v1/stock_records?select=id,user_id,payload,is_shared,last_published_at,admin_hidden,created_at,updated_at&order=created_at.desc") || []).map((row) => normalizeStockRow(row));
        if (!state.adminSelectedUserId && state.adminUsers[0]) state.adminSelectedUserId = state.adminUsers[0].id;
      } catch (error) {
        alert(`读取管理后台失败：${error.message || String(error)}`);
      }
    }

    async function openPublisherFromSquare(publisherId) {
      const profile = state.squareProfiles.find((item) => item.id === publisherId);
      if (!profile) return;
      state.mainView = "pool";
      state.viewPublisherId = publisherId;
      state.publisherProfile = profile;
      await loadPublisherStocks(publisherId);
      render();
    }

    async function selectAdminUser(userId) {
      state.adminSelectedUserId = userId;
      render();
    }

    async function adminToggleUser(userId, key) {
      const user = state.adminUsers.find((item) => item.id === userId);
      if (!user || !state.isAdmin) return;
      const next = !Boolean(user[key]);
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(userId)}`, {
          method: "PATCH",
          body: JSON.stringify({ [key]: next, updated_at: new Date().toISOString() })
        });
        await logModeration(key === "square_hidden" ? (next ? "hide_from_square" : "restore_to_square") : (next ? "ban_share" : "restore_share"), userId, null);
        state.adminUsers = state.adminUsers.map((item) => item.id === userId ? { ...item, [key]: next } : item);
      } catch (error) {
        alert(`管理操作失败：${error.message || String(error)}`);
      }
      render();
    }

    async function adminSaveNote(userId) {
      const input = document.querySelector("[data-input='adminNote']");
      const note = input?.value || "";
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(userId)}`, {
          method: "PATCH",
          body: JSON.stringify({ admin_note: note, updated_at: new Date().toISOString() })
        });
        await logModeration("admin_note", userId, null, note);
        state.adminUsers = state.adminUsers.map((item) => item.id === userId ? { ...item, admin_note: note } : item);
      } catch (error) {
        alert(`保存管理员备注失败：${error.message || String(error)}`);
      }
      render();
    }

    async function adminToggleStockHidden(stockId) {
      const stock = state.adminStocks.find((item) => item.id === stockId);
      if (!stock || !state.isAdmin) return;
      const next = !stock.adminHidden;
      const payload = { ...stock, adminHidden: next };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({ payload, admin_hidden: next, updated_at: new Date().toISOString() })
        });
        await logModeration(next ? "hide_stock" : "restore_stock", stock.userId || null, stockId);
        state.adminStocks = state.adminStocks.map((item) => item.id === stockId ? { ...item, adminHidden: next } : item);
      } catch (error) {
        alert(`股票隐藏操作失败：${error.message || String(error)}`);
      }
      render();
    }

    async function logModeration(actionType, userId, stockId, reason = "") {
      const username = state.session.user.user_metadata?.user_name || state.session.user.user_metadata?.preferred_username || state.session.user.user_metadata?.name || "admin";
      try {
        await supabaseRequest("/rest/v1/moderation_actions", {
          method: "POST",
          body: JSON.stringify({
            admin_github_username: username,
            action_type: actionType,
            target_user_id: userId,
            target_stock_id: stockId,
            reason
          })
        });
      } catch (error) {
        console.warn("管理员操作日志记录失败。", error);
      }
    }

    async function loadProfile() {
      const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(state.session.user.id)}&select=id,email,nickname,share_visibility,square_hidden,share_banned,admin_note,created_at&limit=1`);
      state.profile = rows?.[0] || null;
      state.profileRequired = !state.profile;
    }

    async function loadAdminMarker() {
      state.isAdmin = false;
      try {
        const rows = await supabaseRequest("/rest/v1/admin_users?select=github_username&limit=1");
        state.isAdmin = Boolean(rows?.length);
      } catch {
        state.isAdmin = false;
      }
    }

    async function loadFollowedPublishers() {
      const follows = await supabaseRequest(`/rest/v1/follows?follower_id=eq.${encodeURIComponent(state.session.user.id)}&select=publisher_id,created_at`);
      const ids = (follows || []).map((row) => row.publisher_id);
      if (!ids.length) {
        state.followedPublishers = [];
        return;
      }
      const profiles = await supabaseRequest(`/rest/v1/profiles?id=in.(${ids.map(encodeURIComponent).join(",")})&select=id,nickname,email,share_visibility`);
      state.followedPublishers = profiles || [];
    }

    async function loadShareInvite() {
      rememberPendingShareFromUrl();
      const publisherId = localStorage.getItem(PENDING_SHARE_KEY);
      if (!publisherId || publisherId === state.session.user.id) {
        state.shareInviteProfile = null;
        return;
      }
      try {
        const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(publisherId)}&select=id,nickname,email,share_visibility&limit=1`);
        state.shareInviteProfile = rows?.[0] || null;
      } catch (error) {
        state.shareInviteProfile = null;
      }
    }

    async function afterProfileReady() {
      await loadAdminMarker();
      await loadFollowedPublishers();
      await loadShareInvite();
      await loadStocks();
    }

    async function followPublisher(publisherId) {
      if (!publisherId) return;
      try {
        await supabaseRequest("/rest/v1/follows", {
          method: "POST",
          body: JSON.stringify({
            follower_id: state.session.user.id,
            publisher_id: publisherId
          })
        });
        localStorage.removeItem(PENDING_SHARE_KEY);
        await loadFollowedPublishers();
        state.viewPublisherId = publisherId;
        await loadPublisherStocks(publisherId);
      } catch (error) {
        if (!String(error.message || error).includes("duplicate")) {
          alert(`关注失败：${error.message || String(error)}`);
          return;
        }
        localStorage.removeItem(PENDING_SHARE_KEY);
        await loadFollowedPublishers();
        state.viewPublisherId = publisherId;
        await loadPublisherStocks(publisherId);
      }
      render();
    }

    async function updateShareVisibility(value) {
      const next = value === "public" ? "public" : "private";
      const previous = state.profile?.share_visibility || "private";
      state.profile = { ...state.profile, share_visibility: next };
      render();
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(state.session.user.id)}`, {
          method: "PATCH",
          body: JSON.stringify({ share_visibility: next, updated_at: new Date().toISOString() })
        });
      } catch (error) {
        state.profile = { ...state.profile, share_visibility: previous };
        alert(`分享方式保存失败：${error.message || String(error)}`);
        render();
      }
    }

    async function copyShareLink() {
      const shareUrl = `${AUTH_REDIRECT_URL}?share=${encodeURIComponent(state.profile.id)}`;
      try {
        await navigator.clipboard.writeText(shareUrl);
        alert("分享链接已复制。");
      } catch {
        prompt("复制你的分享链接：", shareUrl);
      }
    }

    async function copySharedStock(stockId, mode = "copied") {
      const source = state.publisherStocks.find((stock) => stock.id === stockId);
      if (!source) return;
      const sourceType = mode === "subscribed" ? "subscribed" : "copied";
      if (sourceType === "subscribed" && state.stocks.some((stock) => stock.sourceType === "subscribed" && stock.sourceStockId === source.id)) {
        alert("你已经订阅过这只股票。");
        return;
      }
      const now = new Date().toISOString();
      const payload = {
        ...source,
        id: null,
        isShared: false,
        lastPublishedAt: "",
        sourceUserId: source.publisherId,
        sourceStockId: source.id,
        sourceNickname: source.publisherNickname,
        sourceType,
        sourceSeenPublishedAt: source.lastPublishedAt || source.updatedAt || now,
        lastSourceUpdatedAt: source.lastPublishedAt || source.updatedAt || now,
        sourceStopped: false,
        hasSourceUpdate: false,
        myNote: "",
        createdAt: now,
        updatedAt: now,
        pin: "normal",
        manualOrder: Date.now()
      };
      try {
        const rows = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            user_id: state.session.user.id,
            payload,
            source_user_id: payload.sourceUserId,
            source_stock_id: payload.sourceStockId,
            source_nickname: payload.sourceNickname,
            source_type: payload.sourceType,
            last_source_updated_at: payload.lastSourceUpdatedAt,
            source_seen_published_at: payload.sourceSeenPublishedAt,
            is_shared: false
          })
        });
        payload.id = rows?.[0]?.id;
        if (sourceType === "subscribed") {
          await supabaseRequest("/rest/v1/stock_subscriptions", {
            method: "POST",
            body: JSON.stringify({
              subscriber_id: state.session.user.id,
              publisher_id: payload.sourceUserId,
              source_stock_id: payload.sourceStockId,
              target_stock_id: payload.id,
              last_seen_published_at: payload.sourceSeenPublishedAt
            })
          });
        }
        state.stocks.push(payload);
        alert(sourceType === "subscribed" ? "已订阅到你的股池。" : "已复制到你的股池。");
      } catch (error) {
        alert(`${sourceType === "subscribed" ? "订阅" : "复制"}失败：${error.message || String(error)}`);
      }
    }

    async function unsubscribeStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || stock.sourceType !== "subscribed") return;
      if (!confirm(`取消订阅 ${stock.name}？取消后可删除或转为你的股票。`)) return;
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        await supabaseRequest(`/rest/v1/stock_subscriptions?target_stock_id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        state.stocks = state.stocks.filter((item) => item.id !== stockId);
        await mergeLatestSourceStocks();
      } catch (error) {
        alert(`取消订阅失败：${error.message || String(error)}`);
      }
      render();
    }

    async function convertToOwnStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || !stock.sourceStockId) return;
      const now = new Date().toISOString();
      const payload = {
        ...stock,
        sourceUserId: "",
        sourceStockId: "",
        sourceNickname: "",
        sourceType: "self",
        sourceSeenPublishedAt: "",
        lastSourceUpdatedAt: "",
        sourceStopped: false,
        hasSourceUpdate: false,
        updatedAt: now
      };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({
            payload,
            updated_at: now,
            source_user_id: null,
            source_stock_id: null,
            source_nickname: null,
            source_type: "self",
            last_source_updated_at: null,
            source_seen_published_at: null
          })
        });
        await supabaseRequest(`/rest/v1/stock_subscriptions?target_stock_id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        state.stocks = state.stocks.map((item) => item.id === stockId ? payload : item);
      } catch (error) {
        alert(`转为我的股票失败：${error.message || String(error)}`);
      }
      render();
    }

    async function markSourceUpdatesRead() {
      const updated = state.stocks.filter((stock) => stock.sourceType === "subscribed" && stock.hasSourceUpdate);
      if (!updated.length) return;
      try {
        await Promise.all(updated.map((stock) => {
          const seenAt = stock.lastSourceUpdatedAt || new Date().toISOString();
          const payload = { ...stock, sourceSeenPublishedAt: seenAt, hasSourceUpdate: false };
          return supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stock.id)}`, {
            method: "PATCH",
            body: JSON.stringify({
              payload,
              source_seen_published_at: seenAt,
              last_source_updated_at: stock.lastSourceUpdatedAt || null
            })
          });
        }));
        await loadStocks();
      } catch (error) {
        alert(`标记已读失败：${error.message || String(error)}`);
      }
      render();
    }

    async function init() {
      rememberPendingShareFromUrl();
      state.session = currentSession();
      if (state.session) {
        try {
          await loadProfile();
          if (!state.profileRequired) await afterProfileReady();
        } catch (error) {
          state.lastError = error.message || String(error);
        }
      }
      state.loading = false;
      render();
      fetchExchangeRates().then(() => {
        if (!state.drawerOpen) render();
      });
    }

    init();
  </script>
</body>
</html>
