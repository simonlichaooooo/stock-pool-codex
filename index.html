<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股池管理</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --soft: #eef2f7;
      --brand: #2454a6;
      --brand-strong: #173f82;
      --gain: #c83232;
      --loss: #16835b;
      --warn: #9a6700;
      --shadow: 0 10px 30px rgba(24, 36, 66, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { border-color: #aab5c8; }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    button.primary:hover { background: var(--brand-strong); }
    button.icon { width: 36px; padding: 0; }
    button.danger { color: #b42318; }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: white;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(36, 84, 166, 0.12);
    }
    textarea { min-height: 84px; resize: vertical; }

    .shell { min-height: 100vh; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
    }
    .brand span { color: var(--muted); font-size: 13px; }
    .userbar { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }

    .workspace {
      width: min(1480px, calc(100vw - 40px));
      margin: 24px auto 48px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
      min-width: 58px;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active {
      background: #e9f0fb;
      color: var(--brand-strong);
      font-weight: 700;
    }

    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1320px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 11px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      color: #344054;
      font-weight: 700;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--brand); }
    tbody tr:hover { background: #fbfcff; }
    .stock-name { font-weight: 700; }
    .stock-code { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }
    .gain { color: var(--gain); font-weight: 700; }
    .loss { color: var(--loss); font-weight: 700; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 6px; align-items: center; }
    .empty {
      padding: 54px 24px;
      text-align: center;
      color: var(--muted);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-panel {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .login-panel h1 { margin: 0 0 8px; font-size: 24px; }
    .login-panel p { margin: 0 0 22px; color: var(--muted); line-height: 1.6; }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 13px; color: #344054; font-weight: 700; }
    .form-row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; align-items: end; }
    .notice {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 6px;
      line-height: 1.6;
      font-size: 14px;
    }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.34);
      display: none;
      z-index: 20;
    }
    .drawer.open { display: block; }
    .drawer-panel {
      width: min(1120px, 100vw);
      height: 100%;
      margin-left: auto;
      background: var(--panel);
      box-shadow: -20px 0 50px rgba(15, 23, 42, 0.2);
      display: flex;
      flex-direction: column;
    }
    .drawer-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .drawer-head h2 { margin: 0; font-size: 18px; }
    .drawer-body {
      padding: 18px 22px 24px;
      overflow: auto;
    }
    .drawer-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 14px;
      background: #f8fafc;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .section-body { padding: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .valuation-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 20px;
      align-items: start;
    }
    .valuation-form {
      padding-right: 18px;
      border-right: 2px solid #2b2f38;
    }
    .compact-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .compact-row.two {
      grid-template-columns: 110px minmax(0, 1fr) 90px minmax(0, 1fr);
    }
    .compact-row label,
    .inline-label {
      font-weight: 700;
      color: #1f2937;
    }
    .amount-suffix {
      color: #111827;
      white-space: nowrap;
    }
    .form-divider {
      margin: 18px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #2b2f38;
      font-weight: 700;
    }
    .result-panel {
      padding: 4px 0 0;
    }
    .result-panel h3 {
      margin: 0 0 22px;
      font-size: 16px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px 28px;
      font-size: 16px;
    }
    .result-grid strong {
      font-weight: 700;
    }
    .search-results {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
      display: none;
    }
    .search-results.show { display: block; }
    .result-item {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      padding: 10px 12px;
    }
    .result-item:last-child { border-bottom: 0; }
    .result-item strong { display: block; }
    .result-item span { color: var(--muted); font-size: 13px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcff;
      min-height: 78px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 8px; font-size: 18px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; }

    @media (max-width: 860px) {
      .topbar { padding: 0 16px; height: auto; min-height: 64px; flex-wrap: wrap; }
      .workspace { width: calc(100vw - 24px); margin-top: 16px; }
      .toolbar { grid-template-columns: 1fr; }
      .form-row, .grid-2, .grid-3, .summary { grid-template-columns: 1fr; }
      .valuation-layout { grid-template-columns: 1fr; }
      .valuation-form { padding-right: 0; border-right: 0; }
      .compact-row,
      .compact-row.two { grid-template-columns: 1fr; }
      .brand span { display: none; }
      .drawer-panel { width: 100vw; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://woywnriyagjlfphezlnx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndveXducml5YWdqbGZwaGV6bG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjA0MDAsImV4cCI6MjA5NDQzNjQwMH0.fQRfiZBOYjxSGKANEMD0HZKg7jKJGwGtR-vUx5ULt2s";

    let currencies = {

      USD: { label: "美元", unit: "亿美元", rateToCny: 7.12 }
    };
    const exchangeRateState = {
      updatedAt: "固定备用汇率",
      source: "fallback"
    };

    const stockCatalog = [
      { name: "美团-W", aliases: "美团 meituan mt", code: "3690.HK", quoteId: "116.03690", market: "HK", exchange: "HKEX", currency: "HKD", marketCapCny: 4800, updatedAt: "2026-05-16" },
      { name: "腾讯控股", aliases: "腾讯 tengxun tencent", code: "0700.HK", quoteId: "116.00700", market: "HK", exchange: "HKEX", currency: "HKD", marketCapCny: 35800, updatedAt: "2026-05-15" },
      { name: "阿里巴巴-W", aliases: "阿里 alibaba baba", code: "9988.HK", quoteId: "116.09988", market: "HK", exchange: "HKEX", currency: "HKD", marketCapCny: 16500, updatedAt: "2026-05-15" },
      { name: "贵州茅台", aliases: "茅台 guizhoumaotai maotai", code: "600519.SH", quoteId: "1.600519", market: "CN", exchange: "SSE", currency: "CNY", marketCapCny: 19300, updatedAt: "2026-05-15" },
      { name: "宁德时代", aliases: "宁德时代 catl ningdeshidai", code: "300750.SZ", quoteId: "0.300750", market: "CN", exchange: "SZSE", currency: "CNY", marketCapCny: 9100, updatedAt: "2026-05-15" },
      { name: "苹果", aliases: "apple pingguo aapl", code: "AAPL", quoteId: "105.AAPL", market: "US", exchange: "NASDAQ", currency: "USD", marketCapCny: 225000, updatedAt: "2026-05-15" },
      { name: "微软", aliases: "microsoft weiruan msft", code: "MSFT", quoteId: "105.MSFT", market: "US", exchange: "NASDAQ", currency: "USD", marketCapCny: 258000, updatedAt: "2026-05-15" },
      { name: "英伟达", aliases: "nvidia yingweida nvda", code: "NVDA", quoteId: "105.NVDA", market: "US", exchange: "NASDAQ", currency: "USD", marketCapCny: 232000, updatedAt: "2026-05-15" }
    ];

    const state = {
      loading: true,
      session: null,
      stocks: [],
      route: location.hash || "#/",
      filter: "ALL",
      query: "",
      sort: { key: "manual", dir: "asc" },
      drawerOpen: false,
      editingId: null,
      form: null,
      loginNotice: "",
      lastError: ""
    };

    window.addEventListener("hashchange", () => {
      state.route = location.hash || "#/";
      render();
    });

    function id(prefix) {
      return prefix + "-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function defaultCurrencyFor(stock) {
      if (!stock) return "CNY";
      if (stock.market === "CN" || stock.market === "HK") return "CNY";
      if (stock.market === "US") return "USD";
      return stock.currency || "CNY";
    }

    function toDisplay(cny, currency) {
      const rate = currencies[currency]?.rateToCny || 1;
      return Number(cny || 0) / rate;
    }

    function toCny(value, currency) {
      const rate = currencies[currency]?.rateToCny || 1;
      return Number(value || 0) * rate;
    }

    function money(cny, currency) {
      if (cny === null || cny === undefined || Number.isNaN(Number(cny))) return "--";
      const value = toDisplay(cny, currency);
      return `${trimNumber(value)} ${currency}`;
    }

    function trimNumber(value) {
      const abs = Math.abs(Number(value));
      const digits = abs >= 100 ? 0 : abs >= 10 ? 1 : 2;
      return Number(value).toLocaleString("zh-CN", { maximumFractionDigits: digits, minimumFractionDigits: 0 });
    }

    function percent(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "--";
      return `${(Number(value) * 100).toFixed(1)}%`;
    }

    function marketLabel(market) {
      return ({ CN: "A股", HK: "H股", US: "美股" })[market] || market || "--";
    }

    function todayString() {
      return new Date().toISOString().slice(0, 10);
    }

    function marketCurrency(market) {
      return ({ CN: "CNY", HK: "HKD", US: "USD" })[market] || "CNY";
    }

    function normalizeCode(code, market) {
      if (market === "HK") return `${String(code).padStart(5, "0")}.HK`;
      if (market === "CN") {
        const suffix = String(code).startsWith("6") ? ".SH" : ".SZ";
        return `${code}${suffix}`;
      }
      return code;
    }

    function normalizeSearchItem(item) {
      const quoteId = item.QuoteID || `${item.MktNum}.${item.Code}`;
      const classify = item.Classify;
      const securityType = String(item.SecurityType || "");
      const securityName = item.SecurityTypeName || "";
      let market = "";
      let exchange = item.JYS || "";
      if (classify === "AStock") {
        market = "CN";
        exchange = item.MktNum === "1" ? "SSE" : "SZSE";
      } else if (classify === "HK" && securityType === "19") {
        market = "HK";
        exchange = "HKEX";
      } else if (classify === "UsStock" && securityType === "20") {
        market = "US";
      } else {
        return null;
      }
      return {
        name: item.Name,
        code: normalizeCode(item.Code, market),
        rawCode: item.Code,
        quoteId,
        market,
        exchange,
        currency: marketCurrency(market),
        securityName
      };
    }

    async function fetchExchangeRates() {
      try {
        const response = await fetchWithTimeout("https://open.er-api.com/v6/latest/CNY", 3000);
        if (!response.ok) throw new Error(`汇率接口 HTTP ${response.status}`);
        const json = await response.json();
        if (json.result !== "success" || !json.rates) throw new Error("汇率接口返回异常");
        currencies = {
          CNY: { label: "人民币", unit: "亿人民币", rateToCny: 1 },
          HKD: { label: "港币", unit: "亿港币", rateToCny: 1 / Number(json.rates.HKD) },
          USD: { label: "美元", unit: "亿美元", rateToCny: 1 / Number(json.rates.USD) }
        };
        exchangeRateState.updatedAt = json.time_last_update_utc || todayString();
        exchangeRateState.source = "open.er-api.com";
      } catch (error) {
        console.warn("汇率接口不可用，使用固定备用汇率。", error);
      }
    }

    function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { signal: controller.signal }).finally(() => window.clearTimeout(timeout));
    }

    function jsonp(url, callbackParam = "cb") {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("JSONP 请求超时"));
        }, 8000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP 请求失败"));
        };
        script.src = `${url}${separator}${callbackParam}=${callbackName}`;
        document.head.appendChild(script);
      });
    }

    async function searchStocks(query) {
      const url = `https://searchapi.eastmoney.com/api/suggest/get?input=${encodeURIComponent(query)}&type=14&token=D43BF722C8E33BD95256D2E364145C90&count=8`;
      try {
        const json = await jsonp(url);
        const rows = json?.QuotationCodeTable?.Data || [];
        const normalized = rows.map(normalizeSearchItem).filter(Boolean);
        return normalized.length ? normalized : fallbackStockSearch(query);
      } catch (error) {
        console.warn("股票搜索接口不可用，使用内置备用样例。", error);
        return fallbackStockSearch(query);
      }
    }

    function fallbackStockSearch(query) {
      const lower = query.toLowerCase();
      return stockCatalog
        .filter((stock) => `${stock.name} ${stock.code} ${stock.aliases}`.toLowerCase().includes(lower))
        .slice(0, 6);
    }

    async function fetchQuote(stock) {
      if (!stock.quoteId) return stock;
      const fields = "f57,f58,f116";
      const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${encodeURIComponent(stock.quoteId)}&fields=${fields}`;
      try {
        const json = await jsonp(url);
        const data = json?.data;
        const marketCap = Number(data?.f116);
        if (!marketCap || Number.isNaN(marketCap)) throw new Error("行情接口没有返回总市值");
        const sourceCurrency = marketCurrency(stock.market);
        const marketCapCny = marketCap * (currencies[sourceCurrency]?.rateToCny || 1) / 100000000;
        return {
          ...stock,
          name: data.f58 || stock.name,
          rawCode: data.f57 || stock.rawCode,
          latestMarketCapCny: marketCapCny,
          marketCapSourceCurrency: sourceCurrency,
          marketCapUpdatedAt: todayString()
        };
      } catch (error) {
        console.warn("行情接口不可用，使用备用市值。", error);
        return {
          ...stock,
          latestMarketCapCny: stock.marketCapCny || 0,
          marketCapSourceCurrency: stock.currency || marketCurrency(stock.market),
          marketCapUpdatedAt: stock.updatedAt || todayString()
        };
      }
    }

    function calc(stock) {
      const latest = Number(stock.latestMarketCapCny) || 0;
      const profit = Number(stock.expectedProfitCny) || 0;
      const pe = Number(stock.expectedPE) || 0;
      const cash = Number(stock.netCashCny) || 0;
      const discount = Number(stock.netCashDiscountRate) || 0;
      const shareholder = Number(stock.expectedShareholderReturnCny) || 0;
      const expectedMarketCapCny = profit * pe + cash * discount;
      return {
        expectedMarketCapCny,
        upside: latest ? expectedMarketCapCny / latest - 1 : null,
        forwardPE: profit ? (latest - cash * discount) / profit : null,
        shareholderReturnRate: latest ? shareholder / latest : null
      };
    }

    function ensureAuth() {
      if (state.loading) {
        renderLoading();
        return false;
      }
      if (!state.session) {
        renderLogin();
        return false;
      }
      return true;
    }

    function renderLoading() {
      document.getElementById("app").innerHTML = `
        <main class="login-wrap">
          <section class="login-panel">
            <h1>股池管理</h1>
            <p>正在连接登录状态和股池数据...</p>
          </section>
        </main>
      `;
    }

    function render() {
      if (!ensureAuth()) return;
      document.getElementById("app").innerHTML = `
        <div class="shell">
          <header class="topbar">
            <div class="brand">
              <h1>股池管理</h1>
              <span>股票匹配、估值假设与预期回报管理</span>
            </div>
            <div class="userbar">
              <span>${escapeHtml(state.session.user.email)}</span>
              <button class="ghost" data-action="logout">退出</button>

          <main class="workspace">
            ${renderToolbar()}
            ${renderTable()}
          </main>
          ${renderDrawer()}
        </div>
      `;
      bindEvents();
    }

    function renderLogin() {
      document.getElementById("app").innerHTML = `
        <main class="login-wrap">
          <section class="login-panel">
            <h1>股池管理</h1>
            <p>输入邮箱后发送 Magic Link 登录。登录成功后，你的股池会保存到云端数据库。</p>
            <form class="form-row" data-form="login">
              <div class="field">
                <label for="email">邮箱</label>
                <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>
              </div>
              <button class="primary" type="submit">发送链接</button>
            </form>
            ${state.loginNotice ? `
              <div class="notice">
                ${escapeHtml(state.loginNotice)}
              </div>` : ""}
            ${state.lastError ? `<div class="notice" style="border-color:#f6c0b7;background:#fff3f0;color:#912018">${escapeHtml(state.lastError)}</div>` : ""}

    function renderToolbar() {
      return `
        <div class="toolbar">
          <input data-input="searchList" placeholder="搜索股票名称或代码" value="${escapeHtml(state.query)}">
          <div class="segmented" aria-label="市场筛选">
            ${["ALL", "CN", "HK", "US"].map((key) => `
              <button class="${state.filter === key ? "active" : ""}" data-filter="${key}">
                ${key === "ALL" ? "全部" : marketLabel(key)}
              </button>
            `).join("")}
          </div>
          <button class="primary" data-action="newStock">新增股票</button>
        </div>
      `;
    }

    function userStocks() {
      const query = state.query.trim().toLowerCase();
      let rows = [...state.stocks];
      if (state.filter !== "ALL") rows = rows.filter((item) => item.market === state.filter);
      if (query) {
        rows = rows.filter((item) => `${item.name} ${item.code}`.toLowerCase().includes(query));
      }
      rows.sort((a, b) => {
        const groupWeight = (item) => item.pin === "top" ? 0 : item.pin === "bottom" ? 2 : 1;
        const groupDiff = groupWeight(a) - groupWeight(b);
        if (groupDiff) return groupDiff;
        if (state.sort.key === "manual") return (a.manualOrder || 0) - (b.manualOrder || 0);
        const ca = calc(a);
        const cb = calc(b);
        const va = ca[state.sort.key] ?? -Infinity;
        const vb = cb[state.sort.key] ?? -Infinity;
        return state.sort.dir === "asc" ? va - vb : vb - va;
      });
      return rows;
    }

    function renderTable() {
      const rows = userStocks();
      if (!rows.length) {
        return `<section class="table-panel"><div class="empty">还没有股票。点击“新增股票”，从搜索匹配开始建立你的股池。</div></section>`;
      }
      return `
        <section class="table-panel">
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>标的</th>
                  <th>市场</th>
                  <th>金额单位</th>
                  <th>最新市值</th>
                  ${sortTh("upside", "upside")}
                  ${sortTh("forwardPE", "Forward PE")}
                  ${sortTh("shareholderReturnRate", "前瞻股东回报率")}
                  <th>前瞻市值</th>
                  <th>前瞻利润</th>
                  <th>前瞻 PE</th>
                  <th>净现金</th>
                  <th>现金折扣</th>
                  <th>前瞻股东回报</th>
                  <th>更新</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(renderRow).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function sortTh(key, label) {
      const active = state.sort.key === key;
      const arrow = active ? (state.sort.dir === "asc" ? " ↑" : " ↓") : "";
      return `<th class="sortable" data-sort="${key}">${label}${arrow}</th>`;
    }

    function renderRow(stock) {
      const c = calc(stock);
      const currency = stock.displayCurrency || "CNY";
      return `
        <tr>
          <td>
            <div class="stock-name">${escapeHtml(stock.name || "--")}</div>
            <div class="stock-code">${escapeHtml(stock.code || "--")}</div>
          </td>
          <td><span class="badge">${marketLabel(stock.market)}</span></td>
          <td>${currency}<div class="stock-code">${currencies[currency]?.unit || ""}</div></td>
          <td>${money(stock.latestMarketCapCny, currency)}</td>
          <td class="${Number(c.upside) >= 0 ? "gain" : "loss"}">${percent(c.upside)}</td>
          <td>${c.forwardPE ? trimNumber(c.forwardPE) + "x" : "--"}</td>
          <td class="${Number(c.shareholderReturnRate) >= 0 ? "gain" : "loss"}">${percent(c.shareholderReturnRate)}</td>
          <td>${money(c.expectedMarketCapCny, currency)}</td>
          <td>${money(stock.expectedProfitCny, currency)}</td>
          <td>${stock.expectedPE ? trimNumber(stock.expectedPE) + "x" : "--"}</td>
          <td>${money(stock.netCashCny, currency)}</td>
          <td>${stock.netCashDiscountRate ?? "--"}</td>
          <td>${money(stock.expectedShareholderReturnCny, currency)}</td>
          <td><span class="muted">${escapeHtml(stock.marketCapUpdatedAt || "--")}</span></td>
          <td>
            <div class="actions">
              <button class="icon" title="编辑" data-action="edit" data-id="${stock.id}">✎</button>
              <button class="icon" title="置顶" data-action="pinTop" data-id="${stock.id}">↑</button>
              <button class="icon" title="置底" data-action="pinBottom" data-id="${stock.id}">↓</button>
              <button class="icon danger" title="删除" data-action="delete" data-id="${stock.id}">×</button>
            </div>
          </td>
        </tr>
      `;
    }

    function emptyForm() {
      return {
        id: null,
        name: "",
        code: "",
        market: "HK",
        exchange: "",
        displayCurrency: "CNY",
        latestMarketCapCny: 0,
        marketCapUpdatedAt: "",
        expectedProfitCny: 0,
        expectedPE: 0,
        expectedPERemark: "",
        netCashCny: 0,
        netCashScope: "",
        netCashDiscountRate: 1,
        expectedShareholderReturnCny: 0,
        shareholderReturnRemark: "",
        forecastYear: "2025E",
        investmentNote: ""
      };
    }

      const form = state.form || emptyForm();

        <aside class="drawer ${state.drawerOpen ? "open" : ""}">

              <h2>${form.id ? "编辑股票" : "新增股票"}</h2>

            <div class="drawer-body">
              <div class="valuation-layout">

                    <label>股票名称:</label>
                    <div>
                      <input data-input="stockSearch" value="${escapeHtml(form.name ? `${form.name}（${form.code}）` : "")}" placeholder="输入名称或股票代码搜索">
                      <div class="search-results" id="searchResults"></div>
                    </div>
                    <span></span>

                  <div class="compact-row">

                  <div class="compact-row">
                    <label>货币单位:</label>
                    <select data-field="displayCurrency">
                      ${Object.keys(currencies).map((key) => `<option value="${key}" ${currency === key ? "selected" : ""}>${key}</option>`).join("")}
                    </select>
                    <span></span>
                  </div>
                  <div class="hint">行情来源：东方财富公开行情接口；汇率来源：${escapeHtml(exchangeRateState.source)}，更新时间：${escapeHtml(exchangeRateState.updatedAt)}。</div>

                  <div class="form-divider">前瞻利润&股东回报</div>
                  <div class="compact-row two">
                    <label>前瞻利润:</label>
                    <div><input type="number" step="any" data-amount="expectedProfitCny" value="${escapeHtml(toDisplay(form.expectedProfitCny, currency))}"></div>

                    <span></span>

                  <div class="compact-row two">

                  </div>
                  <div class="compact-row two">
                    <label>利润备注:</label>
                    <input data-field="expectedPERemark" value="${escapeHtml(form.expectedPERemark)}" placeholder="请输入内容">
                    <label class="inline-label">前瞻股东回报:</label>
                    <div><input type="number" step="any" data-amount="expectedShareholderReturnCny" value="${escapeHtml(toDisplay(form.expectedShareholderReturnCny, currency))}" placeholder="请输入"></div>
                  </div>
                  <div class="compact-row two">
                    <span></span>
                    <span></span>
                    <label class="inline-label">股东回报政策</label>
                    <input data-field="shareholderReturnRemark" value="${escapeHtml(form.shareholderReturnRemark)}" placeholder="请输入内容">
                  </div>

                  <div class="form-divider">净现金</div>
                  <div class="compact-row two">
                    <label>净现金盘点:</label>
                    <div><input type="number" step="any" data-amount="netCashCny" value="${escapeHtml(toDisplay(form.netCashCny, currency))}" placeholder="请输入"></div>
                    <span class="amount-suffix">亿 ${currency}</span>
                    <span></span>
                  </div>
                  <div class="compact-row two">
                    <label>净现金口径:</label>
                    <input data-field="netCashScope" value="${escapeHtml(form.netCashScope || "")}" placeholder="请输入">
                    <label class="inline-label">净现金打折系数:</label>
                    <input type="number" min="0" max="1" step="0.01" data-field="netCashDiscountRate" value="${escapeHtml(form.netCashDiscountRate)}" placeholder="输入0-1之间数字">

                  <input type="hidden" data-field="name" value="${escapeHtml(form.name)}">
                  <input type="hidden" data-field="code" value="${escapeHtml(form.code)}">
                  <input type="hidden" data-field="market" value="${escapeHtml(form.market)}">
                  <input type="hidden" data-field="exchange" value="${escapeHtml(form.exchange)}">
                  <input type="hidden" data-field="marketCapUpdatedAt" value="${escapeHtml(form.marketCapUpdatedAt)}">
                </div>
                <div class="result-panel">
                  <h3>测算结果:</h3>
                  <div class="result-grid summary">
                    ${resultItem("前瞻市值", `${money(c.expectedMarketCapCny, currency)}`)}
                    ${resultItem("upside", percent(c.upside))}
                    ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
                    ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
                  </div>
                  <div class="hint" style="margin-top:24px">当前股票匹配仍使用内置样例；市值会按所选货币实时换算，可手动调整估值假设。</div>
                </div>
              </div>
            </div>
            <div class="drawer-foot">
              <button data-action="closeDrawer">取消</button>
              <button class="primary" data-action="saveStock">保存</button>
            </div>
          </div>
        </aside>
      `;

    function field(label, key, value, type = "text") {
      return `<div class="field"><label>${label}</label><input type="${type}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function numberField(label, key, value, min = "", max = "", step = "any") {
      return `<div class="field"><label>${label}</label><input type="number" min="${min}" max="${max}" step="${step}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function amountField(label, key, cny, currency) {
      return `<div class="field"><label>${label}（${currencies[currency].unit}）</label><input type="number" step="any" data-amount="${key}" value="${escapeHtml(toDisplay(cny, currency))}"></div>`;
    }

    function selectField(label, key, value, options) {
      return `
        <div class="field">
          <label>${label}</label>
          <select data-field="${key}">
            ${options.map(([optionValue, optionLabel]) => `<option value="${optionValue}" ${value === optionValue ? "selected" : ""}>${optionLabel}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function textareaField(label, key, value) {
      return `<div class="field"><label>${label}</label><textarea data-field="${key}">${escapeHtml(value)}</textarea></div>`;
    }

    function metric(label, value, cls = "") {
      return `<div class="metric"><span>${label}</span><strong class="${cls}">${value}</strong></div>`;
    }

    function resultItem(label, value) {
      return `<div><strong>${label}:</strong> ${value}</div>`;
    }

    function forecastYearSelect(value) {
      const years = [];
      for (let year = 2025; year <= 2035; year += 1) years.push(`${year}E`);
      return `
        <select data-field="forecastYear">
          ${years.map((year) => `<option value="${year}" ${value === year ? "selected" : ""}>${year}</option>`).join("")}
        </select>
      `;
    }

    function bindEvents() {
      document.getElementById("app").onclick = (event) => {
        const actionEl = event.target.closest("[data-action]");
        if (actionEl) onAction({ currentTarget: actionEl });
      };
      document.querySelectorAll("[data-filter]").forEach((el) => {
        el.addEventListener("click", () => { state.filter = el.dataset.filter; render(); });
      });
      document.querySelectorAll("[data-sort]").forEach((el) => {
        el.addEventListener("click", () => toggleSort(el.dataset.sort));
      });
      document.querySelectorAll("[data-field]").forEach((el) => {
        el.addEventListener("input", () => updateFormField(el.dataset.field, el.value));
        el.addEventListener("change", () => updateFormField(el.dataset.field, el.value));
      });
      document.querySelectorAll("[data-amount]").forEach((el) => {
        el.addEventListener("input", () => updateAmountField(el.dataset.amount, el.value));
      });
      const loginForm = document.querySelector("[data-form='login']");
      if (loginForm) loginForm.addEventListener("submit", onLogin);
      const listSearch = document.querySelector("[data-input='searchList']");
      if (listSearch) listSearch.addEventListener("input", (event) => { state.query = event.target.value; render(); });
      const stockSearch = document.querySelector("[data-input='stockSearch']");
      if (stockSearch) stockSearch.addEventListener("input", onStockSearch);
    }

    async function onAction(event) {
      const action = event.currentTarget.dataset.action;
      const stockId = event.currentTarget.dataset.id;
      if (action === "logout") {
        await supabaseClient.auth.signOut();
      }
      if (action === "newStock") openDrawer();
      if (action === "closeDrawer") closeDrawer();
      if (action === "saveStock") saveStock();
      if (action === "edit") openDrawer(stockId);
      if (action === "pinTop") updatePin(stockId, "top");
      if (action === "pinBottom") updatePin(stockId, "bottom");
      if (action === "delete") deleteStock(stockId);
    }

    async function onLogin(event) {
      event.preventDefault();
      const email = new FormData(event.currentTarget).get("email").trim().toLowerCase();
      if (!email) return;
      state.lastError = "";
      state.loginNotice = "正在发送登录邮件...";
      renderLogin();
      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: AUTH_REDIRECT_URL }
      });
      if (error) {
        state.lastError = error.message;
        state.loginNotice = "";
      } else {
        state.loginNotice = `登录链接已发送到 ${email}，请在邮箱中点击链接完成登录。`;
      }
      renderLogin();
    }

    function openDrawer(stockId = null) {
      const stock = state.stocks.find((item) => item.id === stockId);
      state.editingId = stockId;
      state.form = stock ? { ...stock } : emptyForm();
      state.drawerOpen = true;
      render();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      state.editingId = null;
      state.form = null;
      render();
    }

    function updateFormField(key, value) {
      if (!state.form) return;
      if (["expectedPE", "netCashDiscountRate"].includes(key)) state.form[key] = Number(value);
      else state.form[key] = value;
      if (key === "market") {
        state.form.displayCurrency = defaultCurrencyFor(state.form);
        render();
        return;
      }
      if (key === "displayCurrency") {
        render();
        return;
      }
      if (["expectedPE", "netCashDiscountRate", "expectedPERemark", "shareholderReturnRemark", "forecastYear"].includes(key)) refreshSummary();
    }

    function updateAmountField(key, value) {
      if (!state.form) return;
      state.form[key] = toCny(value, state.form.displayCurrency);
      refreshSummary();
    }

    function refreshSummary() {
      const summary = document.querySelector(".summary");
      if (!summary || !state.form) return;
      const currency = state.form.displayCurrency || "CNY";
      const c = calc(state.form);
      summary.innerHTML = `
        ${resultItem("前瞻市值", money(c.expectedMarketCapCny, currency))}
        ${resultItem("upside", percent(c.upside))}
        ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
        ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
      `;
    }

    async function onStockSearch(event) {
      const query = event.target.value.trim().toLowerCase();
      const box = document.getElementById("searchResults");
      if (!query) {
        box.className = "search-results";
        box.innerHTML = "";
        return;
      }
      box.className = "search-results show";
      box.innerHTML = `<div class="empty" style="padding:18px">正在匹配股票...</div>`;
      const results = await searchStocks(query);
      box.className = `search-results ${results.length ? "show" : "show"}`;
      box.innerHTML = results.length
        ? results.map((stock, index) => `
          <button class="result-item" data-catalog="${index}">
            <span><strong>${escapeHtml(stock.name)}</strong><span>${escapeHtml(stock.code)} · ${marketLabel(stock.market)} · ${escapeHtml(stock.exchange)}</span></span>
            <span>${stock.quoteId ? "点击获取市值" : money(stock.marketCapCny, defaultCurrencyFor(stock))}</span>
          </button>
        `).join("")
        : `<div class="empty" style="padding:18px">没有匹配结果，可以继续手动录入。</div>`;
      box.querySelectorAll("[data-catalog]").forEach((button) => {
        button.addEventListener("click", async () => {
          button.disabled = true;
          button.innerHTML = "正在获取最新市值...";
          const quote = await fetchQuote(results[Number(button.dataset.catalog)]);
          applyCatalog(quote);
        });
      });
    }

    function applyCatalog(stock) {
      if (!state.form || !stock) return;
      state.form.name = stock.name;
      state.form.code = stock.code;
      state.form.market = stock.market;
      state.form.exchange = stock.exchange;
      state.form.displayCurrency = defaultCurrencyFor(stock);
      state.form.quoteId = stock.quoteId || "";
      state.form.marketCapSourceCurrency = stock.marketCapSourceCurrency || stock.currency || marketCurrency(stock.market);
      state.form.latestMarketCapCny = stock.latestMarketCapCny || stock.marketCapCny || 0;
      state.form.marketCapUpdatedAt = stock.marketCapUpdatedAt || stock.updatedAt || todayString();
      state.form.forecastYear = state.form.forecastYear || "2025E";
      render();
    }

    async function saveStock() {
      if (!state.form.name.trim() || !state.form.code.trim()) {
        alert("请填写股票名称和代码。");
        return;
      }
      const now = new Date().toISOString();
      const payload = {
        ...state.form,
        updatedAt: now,
        manualOrder: state.form.manualOrder ?? Date.now()
      };
      if (payload.id) {
        const { error } = await supabaseClient
          .from("stock_records")
          .update({ payload, updated_at: now })
          .eq("id", payload.id);
        if (error) {
          alert(`保存失败：${error.message}`);
          return;
        }
        state.stocks = state.stocks.map((item) => item.id === payload.id ? payload : item);
      } else {
        payload.createdAt = now;
        payload.pin = "normal";
        const { data, error } = await supabaseClient
          .from("stock_records")
          .insert({
            user_id: state.session.user.id,
            payload
          })
          .select("id,payload")
          .single();
        if (error) {
          alert(`保存失败：${error.message}`);
          return;
        }
        payload.id = data.id;
        state.stocks.push(payload);
      }
      closeDrawer();
    }

    async function updatePin(stockId, pin) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock) return;
      const payload = { ...stock, pin, updatedAt: new Date().toISOString() };
      const { error } = await supabaseClient
        .from("stock_records")
        .update({ payload, updated_at: payload.updatedAt })
        .eq("id", stockId);
      if (error) {
        alert(`更新失败：${error.message}`);
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stockId ? payload : item);
      render();
    }

    async function deleteStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || !confirm(`删除 ${stock.name}？`)) return;
      const { error } = await supabaseClient
        .from("stock_records")
        .delete()
        .eq("id", stockId);
      if (error) {
        alert(`删除失败：${error.message}`);
        return;
      }
      state.stocks = state.stocks.filter((item) => item.id !== stockId);
      render();
    }

    function toggleSort(key) {
      if (state.sort.key !== key) state.sort = { key, dir: "desc" };
      else if (state.sort.dir === "desc") state.sort.dir = "asc";
      else state.sort = { key: "manual", dir: "asc" };
      render();
    }

    async function loadStocks() {
      const { data, error } = await supabaseClient
        .from("stock_records")
        .select("id,payload,created_at,updated_at")
        .order("created_at", { ascending: true });
      if (error) {
        state.lastError = error.message;
        state.stocks = [];
        return;
      }
      state.stocks = (data || []).map((row) => ({
        ...row.payload,
        id: row.id
      }));
    }

    async function init() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) state.lastError = error.message;
      state.session = data?.session || null;
      if (state.session) await loadStocks();
      state.loading = false;
      render();
      fetchExchangeRates().then(() => {
        if (!state.drawerOpen) render();
      });

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        state.session = session;
        state.loginNotice = "";
        state.lastError = "";
        state.drawerOpen = false;
        state.form = null;
        if (session) await loadStocks();
        else state.stocks = [];
        state.loading = false;
        if (location.hash) history.replaceState(null, "", AUTH_REDIRECT_URL);
        render();
      });
    }

    init();
  </script>
