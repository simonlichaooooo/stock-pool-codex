          body: JSON.stringify({ [key]: next, updated_at: new Date().toISOString() })
        });
        await logModeration(key === "square_hidden" ? (next ? "hide_from_square" : "restore_to_square") : (next ? "ban_share" : "restore_share"), userId, null);
        state.adminUsers = state.adminUsers.map((item) => item.id === userId ? { ...item, [key]: next } : item);
      } catch (error) {
        alert(`管理操作失败：${error.message || String(error)}`);
      }
      render();
    }

    async function adminSaveNote(userId) {
      const input = document.querySelector("[data-input='adminNote']");
      const note = input?.value || "";
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(userId)}`, {
          method: "PATCH",
          body: JSON.stringify({ admin_note: note, updated_at: new Date().toISOString() })
        });
        await logModeration("admin_note", userId, null, note);
        state.adminUsers = state.adminUsers.map((item) => item.id === userId ? { ...item, admin_note: note } : item);
      } catch (error) {
        alert(`保存管理员备注失败：${error.message || String(error)}`);
      }
      render();
    }

    async function adminToggleStockHidden(stockId) {
      const stock = state.adminStocks.find((item) => item.id === stockId);
      if (!stock || !state.isAdmin) return;
      const next = !stock.adminHidden;
      const payload = { ...stock, adminHidden: next };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({ payload: payloadForStockRecord(payload), admin_hidden: next, updated_at: new Date().toISOString() })
        });
        await logModeration(next ? "hide_stock" : "restore_stock", stock.userId || null, stockId);
        state.adminStocks = state.adminStocks.map((item) => item.id === stockId ? { ...item, adminHidden: next } : item);
      } catch (error) {
        alert(`股票隐藏操作失败：${error.message || String(error)}`);
      }
      render();
    }

    async function logModeration(actionType, userId, stockId, reason = "") {
      const username = state.session.user.user_metadata?.user_name || state.session.user.user_metadata?.preferred_username || state.session.user.user_metadata?.name || "admin";
      try {
        await supabaseRequest("/rest/v1/moderation_actions", {
          method: "POST",
          body: JSON.stringify({
            admin_github_username: username,
            action_type: actionType,
            target_user_id: userId,
            target_stock_id: stockId,
            reason
          })
        });
      } catch (error) {
        console.warn("管理员操作日志记录失败。", error);
      }
    }

    async function loadProfile() {
      const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(state.session.user.id)}&select=id,email,nickname,share_visibility,square_hidden,share_banned,admin_note,created_at&limit=1`);
      state.profile = rows?.[0] || null;
      state.profileRequired = !state.profile;
    }

    async function loadAdminMarker() {
      state.isAdmin = false;
      try {
        const rows = await supabaseRequest("/rest/v1/admin_users?select=github_username&limit=1");
        state.isAdmin = Boolean(rows?.length);
      } catch {
        state.isAdmin = false;
      }
    }

    async function loadFollowedPublishers() {
      const follows = await supabaseRequest(`/rest/v1/follows?follower_id=eq.${encodeURIComponent(state.session.user.id)}&select=publisher_id,created_at`);
      const ids = (follows || []).map((row) => row.publisher_id);
      if (!ids.length) {
        state.followedPublishers = [];
        return;
      }
      const profiles = await supabaseRequest(`/rest/v1/profiles?id=in.(${ids.map(encodeURIComponent).join(",")})&select=id,nickname,email,share_visibility`);
      state.followedPublishers = profiles || [];
    }

    async function loadShareInvite() {
      rememberPendingShareFromUrl();
      const publisherId = localStorage.getItem(PENDING_SHARE_KEY);
      if (!publisherId || publisherId === state.session.user.id) {
        state.shareInviteProfile = null;
        return;
      }
      try {
        const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(publisherId)}&select=id,nickname,email,share_visibility&limit=1`);
        state.shareInviteProfile = rows?.[0] || null;
      } catch (error) {
        state.shareInviteProfile = null;
      }
    }

    async function afterProfileReady() {
      await loadAdminMarker();
      await loadFollowedPublishers();
      await loadShareInvite();
      await loadStocks();
      await refreshMarketCaps({ renderAfter: false });
      startMarketCapAutoRefresh();
      await openFollowedPendingShare();
    }

    async function openFollowedPendingShare() {
      const publisherId = localStorage.getItem(PENDING_SHARE_KEY);
      if (!publisherId || publisherId === state.session.user.id) return;
      const followed = state.followedPublishers.some((item) => item.id === publisherId);
      if (!followed) return;
      state.mainView = "pool";
      state.viewPublisherId = publisherId;
      state.query = "";
      await loadPublisherStocks(publisherId);
      localStorage.removeItem(PENDING_SHARE_KEY);
    }

    async function followPublisher(publisherId) {
      if (!publisherId) return;
      try {
        await supabaseRequest("/rest/v1/follows", {
          method: "POST",
          body: JSON.stringify({
            follower_id: state.session.user.id,
            publisher_id: publisherId
          })
        });
        localStorage.removeItem(PENDING_SHARE_KEY);
        await loadFollowedPublishers();
        state.viewPublisherId = publisherId;
        await loadPublisherStocks(publisherId);
      } catch (error) {
        if (!String(error.message || error).includes("duplicate")) {
          alert(`关注失败：${error.message || String(error)}`);
          return;
        }
        localStorage.removeItem(PENDING_SHARE_KEY);
        await loadFollowedPublishers();
        state.viewPublisherId = publisherId;
        await loadPublisherStocks(publisherId);
      }
      render();
    }

    async function updateShareVisibility(value) {
      const next = value === "public" ? "public" : "private";
      const previous = state.profile?.share_visibility || "private";
      state.profile = { ...state.profile, share_visibility: next };
      render();
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(state.session.user.id)}`, {
          method: "PATCH",
          body: JSON.stringify({ share_visibility: next, updated_at: new Date().toISOString() })
        });
      } catch (error) {
        state.profile = { ...state.profile, share_visibility: previous };
        alert(`公开状态保存失败：${error.message || String(error)}`);
        render();
      }
    }

    async function copyShareLink() {
      const shareUrl = `${AUTH_REDIRECT_URL}?share=${encodeURIComponent(state.profile.id)}`;
      try {
        await navigator.clipboard.writeText(shareUrl);
        alert("1v1分享链接已复制。");
      } catch {
        prompt("复制你的1v1分享链接：", shareUrl);
      }
    }

    async function copySharedStock(stockId, mode = "copied") {
      const source = state.publisherStocks.find((stock) => stock.id === stockId);
      if (!source) return;
      const sourceType = mode === "subscribed" ? "subscribed" : "copied";
      if (sourceType === "subscribed" && state.stocks.some((stock) => stock.sourceType === "subscribed" && stock.sourceStockId === source.id)) {
        alert("你已经订阅过这只股票。");
        return;
      }
      const now = new Date().toISOString();
      const payload = {
        ...source,
        id: null,
        isShared: false,
        lastPublishedAt: "",
        sourceUserId: source.publisherId,
        sourceStockId: source.id,
        sourceNickname: source.publisherNickname,
        sourceType,
        sourceSeenPublishedAt: source.lastPublishedAt || source.updatedAt || now,
        lastSourceUpdatedAt: source.lastPublishedAt || source.updatedAt || now,
        sourceStopped: false,
        hasSourceUpdate: false,
        myNote: "",
        createdAt: now,
        updatedAt: now,
        pin: "normal",
        manualOrder: Date.now()
      };
      try {
        const rows = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            user_id: state.session.user.id,
            payload: payloadForStockRecord(payload),
            source_user_id: payload.sourceUserId,
            source_stock_id: payload.sourceStockId,
            source_nickname: payload.sourceNickname,
            source_type: payload.sourceType,
            last_source_updated_at: payload.lastSourceUpdatedAt,
            source_seen_published_at: payload.sourceSeenPublishedAt,
            is_shared: false
          })
        });
        payload.id = rows?.[0]?.id;
        if (sourceType === "subscribed") {
          await supabaseRequest("/rest/v1/stock_subscriptions", {
            method: "POST",
            body: JSON.stringify({
              subscriber_id: state.session.user.id,
              publisher_id: payload.sourceUserId,
              source_stock_id: payload.sourceStockId,
              target_stock_id: payload.id,
              last_seen_published_at: payload.sourceSeenPublishedAt
            })
          });
        }
        state.stocks.push(payload);
        const shouldOpenOwnPool = confirm(sourceType === "subscribed" ? "已订阅到你的股池。现在去管理吗？" : "已复制到你的股池。现在去管理吗？");
        if (shouldOpenOwnPool) openOwnPool();
      } catch (error) {
        alert(`${sourceType === "subscribed" ? "订阅" : "复制"}失败：${error.message || String(error)}`);
      }
    }

    async function unsubscribeStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || stock.sourceType !== "subscribed") return;
      if (!confirm(`取消订阅 ${stock.name}？取消后可删除或转为你的股票。`)) return;
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        await supabaseRequest(`/rest/v1/stock_subscriptions?target_stock_id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        state.stocks = state.stocks.filter((item) => item.id !== stockId);
        await mergeLatestSourceStocks();
      } catch (error) {
        alert(`取消订阅失败：${error.message || String(error)}`);
      }
      render();
    }

    async function convertToOwnStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || !stock.sourceStockId) return;
      const now = new Date().toISOString();
      const payload = {
        ...stock,
        sourceUserId: "",
        sourceStockId: "",
        sourceNickname: "",
        sourceType: "self",
        sourceSeenPublishedAt: "",
        lastSourceUpdatedAt: "",
        sourceStopped: false,
        hasSourceUpdate: false,
        updatedAt: now
      };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({
            payload: payloadForStockRecord(payload),
            updated_at: now,
            source_user_id: null,
            source_stock_id: null,
            source_nickname: null,
            source_type: "self",
            last_source_updated_at: null,
            source_seen_published_at: null
          })
        });
        await supabaseRequest(`/rest/v1/stock_subscriptions?target_stock_id=eq.${encodeURIComponent(stockId)}`, { method: "DELETE" });
        state.stocks = state.stocks.map((item) => item.id === stockId ? payload : item);
      } catch (error) {
        alert(`转为我的股票失败：${error.message || String(error)}`);
      }
      render();
    }

    async function markSourceUpdatesRead() {
      const updated = state.stocks.filter((stock) => stock.sourceType === "subscribed" && stock.hasSourceUpdate);
      if (!updated.length) return;
      try {
        await Promise.all(updated.map((stock) => {
          const seenAt = stock.lastSourceUpdatedAt || new Date().toISOString();
          const payload = { ...stock, sourceSeenPublishedAt: seenAt, hasSourceUpdate: false };
          return supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stock.id)}`, {
            method: "PATCH",
            body: JSON.stringify({
              payload: payloadForStockRecord(payload),
              source_seen_published_at: seenAt,
              last_source_updated_at: stock.lastSourceUpdatedAt || null
            })
          });
        }));
        await loadStocks();
      } catch (error) {
        alert(`标记已读失败：${error.message || String(error)}`);
      }
      render();
    }

    async function init() {
      rememberPendingShareFromUrl();
      state.session = currentSession();
      if (state.session) {
        try {
          await fetchExchangeRates();
          await loadProfile();
          if (!state.profileRequired) await afterProfileReady();
        } catch (error) {
          state.lastError = error.message || String(error);
        }
      }
      state.loading = false;
      render();
      if (!state.session) fetchExchangeRates();
    }

    init();
  </script>
</body>
</html>
