                <button class="${state.filter === key ? "active" : ""}" data-filter="${key}">
                  ${key === "ALL" ? "全部" : marketLabel(key)}
                </button>
              `).join("")}
            </div>
            ${viewingOwn ? `
              <button class="${state.shareFilter === "SHARED" ? "primary" : "secondary"}" data-action="toggleSharedFilter">已分享</button>
            ` : ""}
          </div>
          <div class="toolbar-actions">
            ${viewingOwn ? `
              <button class="primary" data-action="newStock">+添加股票</button>
            ` : ""}
          </div>
        </div>
      `;
    }

    function renderPublisherSelect() {
      const viewingOwn = state.viewPublisherId === "own";
      return `
        <select class="nav-publisher-select" data-input="viewPublisher" aria-label="股池筛选">
          <option value="own" ${viewingOwn ? "selected" : ""}>我的股池</option>
          ${state.followedPublishers.map((item) => `<option value="${item.id}" ${state.viewPublisherId === item.id ? "selected" : ""}>${escapeHtml(item.nickname)} 的股池</option>`).join("")}
        </select>
      `;
    }

    function userStocks() {
      const query = state.query.trim().toLowerCase();
      const viewingOwn = state.viewPublisherId === "own";
      let rows = viewingOwn ? [...state.stocks] : [...state.publisherStocks];
      if (state.filter !== "ALL") rows = rows.filter((item) => item.market === state.filter);
      if (viewingOwn && state.shareFilter === "SHARED") rows = rows.filter((item) => item.isShared);
      if (query) {
        rows = rows.filter((item) => `${item.name} ${item.code}`.toLowerCase().includes(query));
      }
      rows.sort((a, b) => {
        if (state.sort.key === "manual") return (a.manualOrder || 0) - (b.manualOrder || 0);
        const va = listSortValue(a, state.sort.key);
        const vb = listSortValue(b, state.sort.key);
        return state.sort.dir === "asc" ? va - vb : vb - va;
      });
      return rows;
    }

    function listSortValue(stock, key) {
      const c = calc(stock);
      const latest = Number(stock.latestMarketCapCny) || 0;
      if (key === "shareholderReturnRate") return shareholderReturnRateForList(stock, c) ?? -Infinity;
      if (key === "dividendYield") return latest ? (Number(stock.expectedDividendCny) || 0) / latest : -Infinity;
      if (key === "buybackRate") return latest ? (Number(stock.expectedBuybackCny) || 0) / latest : -Infinity;
      return c[key] ?? -Infinity;
    }

    function renderTable() {
      const rows = userStocks();
      const viewingOwn = state.viewPublisherId === "own";
      if (state.tableLoading) return renderTableSkeleton(viewingOwn);
      if (!rows.length) {
        const title = viewingOwn ? "还没有匹配的股票" : "这个分享股池暂无已发布股票";
        const text = viewingOwn ? "从股票搜索开始录入市值、盈利假设和估值参数，建立你的研究股池。" : "可以切换其他关注人，或回到自己的股池继续维护研究记录。";
        return `
          <section class="table-panel">
            <div class="empty">
              <strong>${title}</strong>
              <p>${text}</p>
              ${viewingOwn ? `<button class="primary" data-action="newStock">+添加股票</button>` : ""}
            </div>
          </section>
        `;
      }
      return `
        <section class="table-panel">
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th class="sticky-col">股票名称</th>
                  <th>版本</th>
                  <th class="num">最新市值<br><span class="stock-code">CNY 亿</span></th>
                  ${sortTh("upside", "Upside", "num")}
                  ${sortTh("forwardPE", "Forward PE", "num")}
                  ${sortTh("shareholderReturnRate", "股东回报率", "num")}
                  ${sortTh("dividendYield", "股息率", "num")}
                  ${sortTh("buybackRate", "回购率", "num")}
                  <th class="num">前瞻市值<br><span class="stock-code">CNY 亿</span></th>
                  <th class="num">前瞻利润<br><span class="stock-code">CNY 亿</span></th>
                  <th class="num">前瞻 PE</th>
                  <th class="num">净现金<br><span class="stock-code">CNY 亿</span></th>
                  <th class="num">现金折扣</th>
                  <th class="num">前瞻股东回报<br><span class="stock-code">CNY 亿</span></th>
                  ${viewingOwn ? "<th class=\"share-head\">分享</th><th>来源</th>" : ""}
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((stock) => renderRow(stock, viewingOwn)).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderTableSkeleton(viewingOwn) {
      const colSpan = viewingOwn ? 17 : 15;
      return `
        <section class="table-panel">
          <div class="table-scroll">
            <table>
              <thead><tr><th colspan="${colSpan}">正在加载股池数据</th></tr></thead>
              <tbody>${Array.from({ length: 6 }).map(() => `<tr><td colspan="${colSpan}"><div class="skeleton-row"></div></td></tr>`).join("")}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    function sortTh(key, label, cls = "") {
      const active = state.sort.key === key;
      const arrow = active ? (state.sort.dir === "asc" ? " ↑" : " ↓") : "";
      return `<th class="sortable ${cls}" data-sort="${key}">${label}${arrow}</th>`;
    }

    function renderRow(stock, viewingOwn) {
      const c = calc(stock);
      const sourceDeleted = Boolean(stock.sourceDeletedAt);
      const shareholderRate = shareholderReturnRateForList(stock, c);
      const latest = Number(stock.latestMarketCapCny) || 0;
      const dividendYield = latest ? (Number(stock.expectedDividendCny) || 0) / latest : null;
      const buybackRate = latest ? (Number(stock.expectedBuybackCny) || 0) / latest : null;
      return `
        <tr>
          <td data-label="股票名称" class="sticky-col">
            <div class="stock-name">${escapeHtml(stock.name || "--")}</div>
            <div class="stock-code">${escapeHtml(stock.code || "--")}</div>
          </td>
          <td data-label="版本" class="version-cell" title="${escapeHtml(normalizeStockVersion(stock.version))}">${escapeHtml(normalizeStockVersion(stock.version))}</td>
          <td data-label="最新市值" class="num">${sourceDeleted ? "--" : moneyYiCny(stock.latestMarketCapCny)}</td>
          <td data-label="Upside" class="kpi plain-kpi ${Number(c.upside) >= 0 ? "gain" : "loss"}">${sourceDeleted ? "--" : percent(c.upside)}</td>
          <td data-label="Forward PE" class="kpi plain-kpi">${sourceDeleted || !c.forwardPE ? "--" : trimNumber(c.forwardPE) + "x"}</td>
          <td data-label="股东回报率" class="kpi ${Number(shareholderRate) >= 0 ? "gain" : "loss"}">${sourceDeleted ? "--" : percent(shareholderRate)}</td>
          <td data-label="股息率" class="kpi">${sourceDeleted ? "--" : percent(dividendYield)}</td>
          <td data-label="回购率" class="kpi">${sourceDeleted ? "--" : percent(buybackRate)}</td>
          <td data-label="前瞻市值" class="num">${sourceDeleted ? "--" : moneyYiCny(c.expectedMarketCapCny)}</td>
          <td data-label="前瞻利润" class="num">${sourceDeleted ? "--" : moneyYiCny(stock.expectedProfitCny)}</td>
          <td data-label="前瞻 PE" class="num">${sourceDeleted || !stock.expectedPE ? "--" : trimNumber(stock.expectedPE) + "x"}</td>
          <td data-label="净现金" class="num">${sourceDeleted ? "--" : moneyYiCny(stock.netCashCny)}</td>
          <td data-label="现金折扣" class="num">${sourceDeleted ? "--" : stock.netCashDiscountRate ?? "--"}</td>
          <td data-label="前瞻股东回报" class="num">${sourceDeleted ? "--" : moneyYiCny(stock.expectedShareholderReturnCny)}</td>
          ${viewingOwn ? `
            <td data-label="分享" class="share-cell">${renderShareState(stock)}</td>
            <td data-label="来源">${renderSourceCell(stock)}</td>
          ` : ""}
          <td data-label="操作">
            <div class="actions">
              ${viewingOwn ? `
                <button class="icon" title="编辑" data-action="edit" data-id="${stock.id}">✎</button>
                <button class="icon" title="上提1位" data-action="moveUp" data-id="${stock.id}">↑</button>
                <button class="icon" title="下提1位" data-action="moveDown" data-id="${stock.id}">↓</button>
                ${stock.sourceType === "subscribed" ? `
                  <button class="text-action" title="取消订阅" data-action="unsubscribeStock" data-id="${stock.id}">取消订阅</button>
                  <button class="text-action" title="转为我的股票" data-action="convertToOwn" data-id="${stock.id}">转为我的</button>
                ` : ""}
                <button class="icon danger" title="删除" data-action="delete" data-id="${stock.id}">×</button>
              ` : `
                <button class="text-action" data-action="copySharedStock" data-id="${stock.id}">一键复制</button>
                <button class="primary text-action" data-action="subscribeStock" data-id="${stock.id}">订阅</button>
                <button class="text-action" data-action="openPublicationHistory" data-id="${stock.id}">历史</button>
              `}
            </div>
          </td>
        </tr>
      `;
    }

    function renderShareState(stock) {
      if (stock.sourceDeletedAt) {
        return `<span class="badge unshared">订阅失效</span>`;
      }
      if (!stock.isShared) {
        const sharing = state.sharingStockId === stock.id;
        return `<button class="text-action share-action" data-action="shareStock" data-id="${stock.id}" ${sharing ? "disabled" : ""}>${sharing ? "分享中..." : "去分享"}</button>`;
      }
      return `
        <div class="share-state">
          <span class="badge shared">已分享</span>
          <button class="text-action share-action" data-action="openPublicationHistory" data-id="${stock.id}">历史</button>
        </div>
      `;
    }

    function renderPublicationHistory() {
      const modal = state.publicationHistory;
      if (!modal.open) return "";
      const stock = modal.stock || {};
      return `
        <div class="history-modal open" data-history-backdrop="true">
          <section class="history-panel">
            <div class="history-head">
              <div>
                <h3>${escapeHtml(stock.name || "发布历史")}</h3>
                <p>${escapeHtml(stock.code || "")}${stock.publisherNickname ? ` · ${escapeHtml(stock.publisherNickname)}` : ""}</p>
              </div>
              <button class="icon" data-action="closePublicationHistory" title="关闭">×</button>
            </div>
            <div class="history-body">
              ${modal.loading ? `<div class="empty">正在加载发布历史...</div>` : ""}
              ${modal.error ? `<div class="form-error">${escapeHtml(modal.error)}</div>` : ""}
              ${!modal.loading && !modal.error ? renderPublicationHistoryRows(modal.rows) : ""}
            </div>
          </section>
        </div>
      `;
    }

    function renderDeleteConfirm() {
      const modal = state.deleteConfirm;
      if (!modal.open) return "";
      return `
        <div class="history-modal open" data-delete-backdrop="true">
          <section class="confirm-panel">
            <div class="confirm-head">
              <h3>删除股票</h3>
              <button class="icon" data-action="closeDeleteConfirm" title="关闭" ${modal.deleting ? "disabled" : ""}>×</button>
            </div>
            <div class="confirm-body">
              <p>确认删除该股票吗？如有分享，也同步一并删除。</p>
              ${modal.stockName ? `<div class="stock-code">${escapeHtml(modal.stockName)}</div>` : ""}
              ${modal.error ? `<div class="form-error">${escapeHtml(modal.error)}</div>` : ""}
              <div class="confirm-actions">
                <button data-action="closeDeleteConfirm" ${modal.deleting ? "disabled" : ""}>取消</button>
                <button class="danger-primary" data-action="confirmDeleteStock" ${modal.deleting ? "disabled" : ""}>${modal.deleting ? "删除中..." : "确认删除"}</button>
              </div>
            </div>
          </section>
        </div>
      `;
    }

    function renderPublicationHistoryRows(rows) {
      if (!rows.length) return `<div class="empty">还没有发布快照。</div>`;
      return `
        <div class="history-list">
          ${rows.map((row, index) => renderPublicationHistoryItem(row, rows[index + 1])).join("")}
        </div>
      `;
    }

    function renderPublicationHistoryItem(row, previousRow) {
      const stock = stockFromPublication(row);
      const previous = previousRow ? stockFromPublication(previousRow) : null;
      const c = row.payload?.computed || calc(stock);
      return `
        <article class="history-item">
          <div class="history-item-head">
            <div>
              <h4>V${Number(row.version_number) || "--"} · ${formatDateTime(row.created_at)}</h4>
              <div class="stock-code">${escapeHtml(stock.forecastYear || "--")} · ${escapeHtml(marketLabel(stock.market))}</div>
            </div>
            <div class="history-delta">${renderPublicationDeltas(stock, previous)}</div>
          </div>
          ${row.change_note ? `<p class="history-note">${escapeHtml(row.change_note)}</p>` : ""}
          <div class="history-grid">
            ${historyMetric("当时市值", moneyYiCny(stock.latestMarketCapCny))}
            ${historyMetric("前瞻市值", moneyYiCny(c.expectedMarketCapCny), { meta: stock.forecastYear ? `@${stock.forecastYear}` : "" })}
            ${historyMetric("Upside", percent(c.upside))}
            ${historyMetric("前瞻利润", moneyYiCny(stock.expectedProfitCny), { meta: stock.expectedPERemark || "", tooltip: stock.expectedPERemark || "" })}
            ${historyMetric("前瞻估值", stock.expectedPE ? `${trimNumber(stock.expectedPE)}x` : "--")}
            ${historyMetric("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)}x` : "--")}
            ${historyMetric("净现金", moneyYiCny(stock.netCashCny))}
            ${historyMetric("现金折扣", percent(stock.netCashDiscountRate))}
            ${historyMetric("净现金口径", stock.netCashScope || "--", { text: true, tooltip: stock.netCashScope || "" })}
            ${historyMetric("前瞻股东回报", moneyYiCny(stock.expectedShareholderReturnCny))}
            ${historyMetric("前瞻股东回报率", percent(c.shareholderReturnRate))}
            ${historyMetric("股东回报政策", stock.shareholderReturnRemark || "--", { text: true, tooltip: stock.shareholderReturnRemark || "" })}
          </div>
        </article>
      `;
    }

    function historyMetric(label, value, options = {}) {
      const tooltip = options.tooltip ? ` data-tooltip="${escapeHtml(options.tooltip)}" title="${escapeHtml(options.tooltip)}"` : "";
      const meta = options.meta ? `<em${tooltip}>${escapeHtml(options.meta)}</em>` : "";
      const valueTooltip = options.text && options.tooltip ? ` data-tooltip="${escapeHtml(options.tooltip)}" title="${escapeHtml(options.tooltip)}"` : "";
      return `
        <div class="history-metric">
          <div class="history-metric-title"><span>${escapeHtml(label)}</span>${meta}</div>
          <strong class="${options.text ? "text-value" : ""}"${valueTooltip}>${escapeHtml(value)}</strong>
        </div>
      `;
    }

    function renderPublicationDeltas(stock, previous) {
      if (!previous) return `<span class="badge soft">首个版本</span>`;
      const items = [
        deltaBadge("市值", previous.latestMarketCapCny, stock.latestMarketCapCny, ""),
        deltaBadge("利润", previous.expectedProfitCny, stock.expectedProfitCny, ""),
        deltaBadge("PE", previous.expectedPE, stock.expectedPE, "x"),
        deltaBadge("净现金", previous.netCashCny, stock.netCashCny, "")
      ].filter(Boolean);
      return items.length ? items.join("") : `<span class="badge soft">核心假设无变化</span>`;
    }

    function deltaBadge(label, before, after, suffix) {
      const a = Number(after);
      const b = Number(before);
      if (!Number.isFinite(a) || !Number.isFinite(b) || a === b) return "";
      return `<span class="badge soft">${escapeHtml(label)} ${trimNumber(b)}${suffix} → ${trimNumber(a)}${suffix}</span>`;
    }

    function renderSourceCell(stock) {
      if (stock.sourceDeletedAt) {
        return `
          <div class="source-cell">
            <div class="source-tags">
              <strong>${escapeHtml(stock.sourceNickname || stock.sourceUserId || "--")}</strong>
              <span class="badge warn">已删除</span>
            </div>
          </div>
        `;
      }
      if (!stock.sourceStockId) return "";
      const typeLabel = stock.sourceType === "subscribed" ? "订阅" : stock.sourceType === "copied" ? "复制" : "来源";
      return `
        <div class="source-cell">
          <div class="source-tags">
            <strong>${escapeHtml(stock.sourceNickname || stock.sourceUserId || "--")}</strong>
            <span class="badge source">${typeLabel}</span>
          </div>
        </div>
      `;
    }

    function emptyForm() {
      return {
        id: null,
        version: "中性",
        name: "",
        code: "",
        market: "HK",
        exchange: "",
        displayCurrency: "CNY",
        latestMarketCapCny: 0,
        marketCapUpdatedAt: "",
        useSegmentValuation: false,
        segmentValuations: [
          emptySegmentValuationRow(1, "2026E"),
          emptySegmentValuationRow(2, "2026E")
        ],
        expectedProfitCny: 0,
        expectedPE: 0,
        expectedPERemark: "",
        netCashCny: 0,
        netCashScope: "",
        netCashDiscountRate: 0.5,
        expectedDividendCny: 0,
        expectedBuybackCny: 0,
        expectedShareholderReturnCny: 0,
        shareholderReturnRemark: "",
        forecastYear: "2026E",
        investmentNote: "",
        publishNote: "",
        isShared: false,
        lastPublishedAt: "",
        sourceUserId: "",
        sourceStockId: "",
        sourceNickname: "",
        sourceType: "self",
        sourceSeenPublishedAt: "",
        lastSourceUpdatedAt: "",
        sourceStopped: false,
        sourceDeletedAt: "",
        hasSourceUpdate: false,
        myNote: ""
      };
    }

    function renderDrawer() {
      const form = state.form || emptyForm();
      const c = calc(form);
      const currency = form.displayCurrency || "CNY";
      const isSubscribed = form.sourceType === "subscribed";
      const locked = isSubscribed ? "disabled" : "";
      const stockError = state.drawerError && (!form.name.trim() || !form.code.trim()) ? state.drawerError : "";
      const generalError = state.drawerError && !stockError ? state.drawerError : "";
      return `
        <aside class="drawer ${state.drawerOpen ? "open" : ""}">
          <div class="drawer-panel">
            <div class="drawer-head">
              <div class="drawer-title">
                <h2>${form.id ? "编辑股票" : "新增股票"}</h2>
              </div>
              <button class="icon" data-action="closeDrawer" title="关闭">×</button>
            </div>
            <div class="drawer-body">
              <div class="valuation-layout">
                <div class="valuation-form">
                  ${isSubscribed ? `<div class="readonly-note">这条股票来自订阅，核心估值会跟随发布者最新版本同步。你只能维护“我的备注”；如需修改估值，请先转为我的股票。</div>` : ""}
                  ${sectionCard("基础信息", "从股票名称或代码搜索匹配标的，市值会自动带入并可按选择币种展示。", `
                    <div class="form-grid three">
                      ${formField("股票名称/代码搜索", `
                        <div class="search-combobox">
                          <input data-input="stockSearch" value="${escapeHtml(form.name ? `${form.name}（${form.code}）` : "")}" placeholder="输入股票名称、代码或拼音，例如：腾讯 / 0700 / AAPL" ${locked}>
                          <div class="search-results" id="searchResults"></div>
                        </div>
                      `, { required: true, error: stockError, className: "input-medium" })}
                      ${formField("货币单位", `
                        <select class="currency-select" data-field="displayCurrency" ${locked}>
                          ${Object.keys(currencies).map((key) => `<option value="${key}" ${currency === key ? "selected" : ""}>${key} · ${currencies[key].label}</option>`).join("")}
                        </select>
                      `)}
                      ${formField("当前市值", `<div class="readonly-value"><span>${metricMoney(form.latestMarketCapCny, currency)}</span></div>`, { className: "input-medium" })}
                    </div>
                  `)}

                  ${sectionCard("盈利与估值假设", "维护前瞻利润、目标 PE 和利润口径说明，用于计算前瞻市值与 Upside。", renderValuationAssumptions(form, currency, locked), {
                    titleExtra: `
                      <label class="section-toggle">
                        <input type="checkbox" data-field="useSegmentValuation" ${form.useSegmentValuation ? "checked" : ""} ${locked}>
                        <span>分部估值法</span>
                      </label>
                    `
                  })}

                  ${sectionCard("股东回报", "记录未来分红、回购或其他股东回报假设。", `
                    <div class="form-grid three">
                      ${formField("前瞻股息", amountInput("expectedDividendCny", form.expectedDividendCny, currency, locked), { className: "input-short" })}
                      ${formField("前瞻回购", amountInput("expectedBuybackCny", form.expectedBuybackCny, currency, locked), { className: "input-short" })}
                      ${formField("前瞻股东回报", amountInput("expectedShareholderReturnCny", form.expectedShareholderReturnCny, currency, locked), { className: "input-short" })}
                    </div>
                    <div class="form-grid single follow-row">
                      ${formField("股东回报政策", `<input data-field="shareholderReturnRemark" value="${escapeHtml(form.shareholderReturnRemark)}" ${locked}>`, { className: "input-wide" })}
                    </div>
                  `)}

                  ${sectionCard("净现金调整", "净现金可按折扣系数计入估值，适合处理现金、投资资产或净负债。", `
                    <div class="form-grid">
                      ${formField("净现金盘点", amountInput("netCashCny", form.netCashCny, currency, locked), { className: "input-short" })}
                      ${formField("现金折扣", percentStepperInput("netCashDiscountRate", form.netCashDiscountRate, locked), { className: "input-short" })}
                    </div>
                    <div class="form-grid single follow-row">
                      ${formField("净现金口径", `<input data-field="netCashScope" value="${escapeHtml(form.netCashScope || "")}" placeholder="例如：现金及短投 - 有息负债" ${locked}>`, { className: "input-wide" })}
                    </div>
                  `)}

                  <input type="hidden" data-field="name" value="${escapeHtml(form.name)}">
                  <input type="hidden" data-field="code" value="${escapeHtml(form.code)}">
                  <input type="hidden" data-field="market" value="${escapeHtml(form.market)}">
                  <input type="hidden" data-field="exchange" value="${escapeHtml(form.exchange)}">
                  ${generalError ? `<div class="form-error">${escapeHtml(generalError)}</div>` : ""}
                </div>
                <div class="result-panel">
                  <div class="side-note-box">
                    <label>个人研究备注</label>
                    <textarea class="markdown-note" data-field="myNote" data-markdown="true" placeholder="支持 Markdown：记录投资假设、风险点、跟踪事项或财报观察。">${escapeHtml(form.myNote || "")}</textarea>
                  </div>
                  <div class="valuation-summary-block">
                    <h3>估值测算</h3>
                    <div class="result-grid summary">
                      ${resultItem("前瞻市值", metricMoney(c.expectedMarketCapCny, currency))}
                      ${resultItem("Upside", percent(c.upside))}
                      ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
                      ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
                    </div>
                    <div class="disclaimer">内容为用户个人记录，不构成投资建议。</div>
                    ${!isSubscribed ? `
                      <div class="publish-box">
                        <label>发布快照说明</label>
                        <textarea data-field="publishNote" placeholder="记录这次发布相对上一版的变化，例如利润假设、PE、股东回报或净现金口径调整。">${escapeHtml(form.publishNote || "")}</textarea>
                        <div class="publish-actions">
                          <button data-action="publishStock" ${state.saving || state.publishing ? "disabled" : ""}>${state.publishing ? "发布中..." : "发布快照"}</button>
                        </div>
                      </div>
                    ` : ""}
                  </div>
                </div>
              </div>
            </div>
            <div class="drawer-foot">
              <div class="foot-left">
                <span class="hint">${state.formDirty ? "有未保存修改" : "所有已保存内容会保留在你的私人股池中"}</span>
                ${form.id ? `<button class="drawer-delete-link" data-action="openDeleteConfirm" data-id="${form.id}" ${state.saving || state.publishing ? "disabled" : ""}>删除股票</button>` : ""}
              </div>
              <div class="foot-actions">
                <button data-action="closeDrawer" ${state.saving || state.publishing ? "disabled" : ""}>取消</button>
                <button class="primary" data-action="saveStock" ${state.saving || state.publishing ? "disabled" : ""}>${state.saving ? "保存中..." : "保存股票"}</button>
              </div>
            </div>
          </div>
        </aside>
      `;
    }

    function renderVersionControl(form, locked = "") {
      const version = normalizeStockVersion(form.version);
      const mode = form.versionCustom ? "自定义" : stockVersionMode(version);
      if (mode === "自定义") {
        return `<input data-field="version" value="${escapeHtml(form.versionCustom ? (form.version || "") : version)}" placeholder="输入版本" ${locked}>`;
      }
      return `
        <select data-field="version" ${locked}>
          ${["乐观", "中性", "悲观", "自定义"].map((option) => `<option value="${option}" ${mode === option ? "selected" : ""}>${option}</option>`).join("")}
        </select>
      `;
    }

    function renderValuationAssumptions(form, currency, locked = "") {
      if (form.useSegmentValuation) return renderSegmentValuation(form, currency, locked);
      return `
        <div class="form-grid three">
          ${formField("前瞻利润", amountInput("expectedProfitCny", form.expectedProfitCny, currency, locked), { required: true, className: "input-short" })}
          ${formField("前瞻 PE", `<input class="numeric-input" type="number" step="any" data-field="expectedPE" value="${escapeHtml(form.expectedPE)}" required ${locked}>`, { required: true, className: "input-short" })}
          ${formField("前瞻年份", forecastYearSelect(form.forecastYear, locked), { className: "input-short" })}
        </div>
        <div class="form-grid three follow-row">
          ${formField("利润备注", `<input data-field="expectedPERemark" value="${escapeHtml(form.expectedPERemark)}" ${locked}>`, { className: "input-wide span-2" })}
          ${formField("版本", renderVersionControl(form, locked), { className: "input-medium" })}
        </div>
      `;
    }

    function renderSegmentValuation(form, currency, locked = "") {
      const segments = Array.isArray(form.segmentValuations) ? form.segmentValuations : [];
      return `
        <div class="segment-valuation">
          <div class="segment-row head">
            <span>分部名</span><span>前瞻利润</span><span>前瞻 PE</span><span>前瞻年份</span><span>利润备注</span><span></span>
          </div>
          ${segments.map((segment, index) => `
            <div class="segment-row">
              <input data-segment-field="segmentName" data-segment-index="${index}" value="${escapeHtml(segment.segmentName || "")}" placeholder="分部${index + 1}" ${locked}>
              ${amountInput(`segmentProfit:${index}`, segment.expectedProfitCny, currency, locked)}
              <input class="numeric-input" type="number" step="any" data-segment-field="expectedPE" data-segment-index="${index}" value="${escapeHtml(segment.expectedPE)}" ${locked}>
              ${segmentForecastYearSelect(segment.forecastYear || form.forecastYear, index, locked)}
              <input data-segment-field="expectedPERemark" data-segment-index="${index}" value="${escapeHtml(segment.expectedPERemark || "")}" ${locked}>
              <button class="icon" type="button" data-action="removeSegment" data-index="${index}" title="删除分部" ${locked || segments.length <= 1 ? "disabled" : ""}>×</button>
            </div>
          `).join("")}
          <div class="segment-actions">
            <button type="button" data-action="addSegment" ${locked}>增加分部</button>
          </div>
          <div class="segment-total">
            ${formField("加总前瞻利润", `<div class="readonly-value"><span data-segment-total="profit">${metricMoney(form.expectedProfitCny, currency)}</span></div>`, { className: "input-short" })}
            ${formField("加总前瞻 PE", `<div class="readonly-value"><span data-segment-total="pe">${form.expectedPE ? `${trimNumber(form.expectedPE)} 倍` : "--"}</span></div>`, { className: "input-short" })}
            ${formField("版本", renderVersionControl(form, locked), { className: "input-medium" })}
          </div>
        </div>
      `;
    }

    function sectionCard(title, description, body, options = {}) {
      return `
        <section class="section-card">
          <div class="section-head">
            <h3>${escapeHtml(title)}</h3>
            ${options.titleExtra || ""}
          </div>
          ${body}
        </section>
      `;
    }

    function formField(label, control, options = {}) {
      return `
        <div class="form-field ${options.className || ""}">
          <label class="${options.required ? "required" : ""}">${escapeHtml(label)}</label>
          ${control}
          ${options.help ? `<div class="field-help">${escapeHtml(options.help)}</div>` : ""}
          ${options.error ? `<div class="inline-error">${escapeHtml(options.error)}</div>` : ""}
        </div>
      `;
    }

    function amountInput(key, cny, currency, attrs = "") {
      return `
        <div class="amount-field">
          <input class="numeric-input" type="number" step="any" data-amount="${key}" value="${escapeHtml(toDisplay(cny, currency))}" placeholder="0.00" ${attrs}>
          <span class="amount-suffix">亿 ${currency}</span>
        </div>
      `;
    }

    function percentStepperInput(key, value, attrs = "") {
      const percent = Math.round((Number(value) || 0) * 100);
      return `
        <div class="percent-stepper">
          <button type="button" data-discount-step="-10" ${attrs}>-</button>
          <input class="numeric-input" type="text" inputmode="decimal" data-percent-field="${key}" value="${escapeHtml(formatPercentInput(percent))}" ${attrs}>
          <button type="button" data-discount-step="10" ${attrs}>+</button>
        </div>
      `;
    }

    function parsePercentInput(value) {
      const parsed = Number(String(value ?? "").replace("%", "").trim());
      return Math.min(100, Math.max(0, Number.isFinite(parsed) ? parsed : 0));
    }

    function formatPercentInput(value) {
      return `${trimNumber(parsePercentInput(value))}%`;
    }

    function field(label, key, value, type = "text") {
      return `<div class="field"><label>${label}</label><input type="${type}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function numberField(label, key, value, min = "", max = "", step = "any") {
      return `<div class="field"><label>${label}</label><input type="number" min="${min}" max="${max}" step="${step}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function amountField(label, key, cny, currency) {
      return `<div class="field"><label>${label}（${currencies[currency].unit}）</label><input type="number" step="any" data-amount="${key}" value="${escapeHtml(toDisplay(cny, currency))}"></div>`;
    }

    function selectField(label, key, value, options) {
      return `
        <div class="field">
          <label>${label}</label>
          <select data-field="${key}">
            ${options.map(([optionValue, optionLabel]) => `<option value="${optionValue}" ${value === optionValue ? "selected" : ""}>${optionLabel}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function textareaField(label, key, value) {
      return `<div class="field"><label>${label}</label><textarea data-field="${key}">${escapeHtml(value)}</textarea></div>`;
    }

    function metric(label, value, cls = "") {
      return `<div class="metric"><span>${label}</span><strong class="${cls}">${value}</strong></div>`;
    }

    function resultItem(label, value) {
      const text = value && value !== "--" ? value : "—";
      const cls = String(text).startsWith("-") ? "loss" : String(text).includes("%") && text !== "—" ? "gain" : "";
      return `<div class="result-metric"><strong>${label}</strong><span class="${cls}">${text}</span></div>`;
    }

    function forecastYearSelect(value, attrs = "") {
      const years = ["2025A"];
      for (let year = 2026; year <= 2035; year += 1) years.push(`${year}E`);
      if (value && !years.includes(value)) years.unshift(value);
      return `
        <select data-field="forecastYear" ${attrs}>
          ${years.map((year) => `<option value="${year}" ${value === year ? "selected" : ""}>${year}</option>`).join("")}
        </select>
      `;
    }

    function segmentForecastYearSelect(value, index, attrs = "") {
      const years = ["2025A"];
      for (let year = 2026; year <= 2035; year += 1) years.push(`${year}E`);
      if (value && !years.includes(value)) years.unshift(value);
      return `
        <select data-segment-field="forecastYear" data-segment-index="${index}" ${attrs}>
          ${years.map((year) => `<option value="${year}" ${value === year ? "selected" : ""}>${year}</option>`).join("")}
        </select>
      `;
    }

    function bindEvents() {
      document.getElementById("app").onclick = (event) => {
        const actionEl = event.target.closest("[data-action]");
        if (actionEl) onAction({ currentTarget: actionEl });
      };
      document.querySelectorAll("[data-filter]").forEach((el) => {
        el.addEventListener("click", () => { state.filter = el.dataset.filter; render(); });
      });
      document.querySelectorAll("[data-sort]").forEach((el) => {
        el.addEventListener("click", () => toggleSort(el.dataset.sort));
      });
      const stockConnectTax = document.querySelector("[data-input='stockConnectTax']");
      if (stockConnectTax) {
        stockConnectTax.addEventListener("click", (event) => event.stopPropagation());
        stockConnectTax.addEventListener("change", (event) => {
          state.stockConnectDividendTax = event.target.checked;
          render();
        });
      }
      document.querySelectorAll("[data-field]").forEach((el) => {
        el.addEventListener("input", () => updateFormField(el.dataset.field, el.type === "checkbox" ? el.checked : el.value));
        el.addEventListener("change", () => updateFormField(el.dataset.field, el.type === "checkbox" ? el.checked : el.value));
      });
      document.querySelectorAll("[data-amount]").forEach((el) => {
        el.addEventListener("input", () => updateAmountField(el.dataset.amount, el.value));
      });
      document.querySelectorAll("[data-segment-field]").forEach((el) => {
        el.addEventListener("input", () => updateSegmentField(Number(el.dataset.segmentIndex), el.dataset.segmentField, el.value));
        el.addEventListener("change", () => updateSegmentField(Number(el.dataset.segmentIndex), el.dataset.segmentField, el.value));
      });
      document.querySelectorAll("[data-percent-field]").forEach((el) => {
        el.addEventListener("input", () => updatePercentField(el.dataset.percentField, el.value));
        el.addEventListener("change", () => {
          updatePercentField(el.dataset.percentField, el.value);
          el.value = formatPercentInput((Number(state.form?.[el.dataset.percentField]) || 0) * 100);
        });
      });
      document.querySelectorAll("[data-discount-step]").forEach((el) => {
        el.addEventListener("click", () => stepDiscountField(Number(el.dataset.discountStep)));
      });
      const loginForm = document.querySelector("[data-form='login']");
      if (loginForm) loginForm.addEventListener("submit", onLogin);
      const profileForm = document.querySelector("[data-form='profile']");
      if (profileForm) profileForm.addEventListener("submit", onProfileSubmit);
      const listSearch = document.querySelector("[data-input='searchList']");
      if (listSearch) listSearch.addEventListener("input", (event) => { state.query = event.target.value; render(); });
      const viewPublisher = document.querySelector("[data-input='viewPublisher']");
      if (viewPublisher) viewPublisher.addEventListener("change", async (event) => {
        state.viewPublisherId = event.target.value;
        state.query = "";
        if (state.viewPublisherId === "own") {
          openOwnPool();
          return;
        } else {
          state.tableLoading = true;
          render();
          await loadPublisherStocks(state.viewPublisherId);
          state.tableLoading = false;
        }
        render();
      });
      const shareVisibilityToggle = document.querySelector("[data-input='shareVisibilityToggle']");
      if (shareVisibilityToggle) {
        shareVisibilityToggle.addEventListener("change", (event) => {
          updateShareVisibility(event.target.checked ? "public" : "private");
        });
      }
      const squareSort = document.querySelector("[data-input='squareSort']");
      if (squareSort) squareSort.addEventListener("change", (event) => { state.squareSort = event.target.value; render(); });
      const stockSearch = document.querySelector("[data-input='stockSearch']");
      if (stockSearch) stockSearch.addEventListener("input", onStockSearch);
      const historyBackdrop = document.querySelector("[data-history-backdrop]");
      if (historyBackdrop) {
        historyBackdrop.addEventListener("click", (event) => {
          if (event.target === historyBackdrop) closePublicationHistory();
        });
      }
      const deleteBackdrop = document.querySelector("[data-delete-backdrop]");
      if (deleteBackdrop) {
        deleteBackdrop.addEventListener("click", (event) => {
          if (event.target === deleteBackdrop) closeDeleteConfirm();
        });
      }
    }

    async function onAction(event) {
      const action = event.currentTarget.dataset.action;
      const stockId = event.currentTarget.dataset.id;
      if (action === "logout") {
        stopMarketCapAutoRefresh();
        writeJson(AUTH_STORAGE_KEY, null);
        state.session = null;
        state.profile = null;
        state.profileRequired = false;
        state.stocks = [];
        state.publisherStocks = [];
        state.publisherProfile = null;
        state.followedPublishers = [];
        render();
      }
      if (action === "githubLogin") loginWithGithub();
      if (action === "switchMainView") switchMainView(event.currentTarget.dataset.view);
      if (action === "newStock") openDrawer();
      if (action === "closeDrawer") closeDrawer();
      if (action === "saveStock") saveStock();
      if (action === "publishStock") publishStock();
      if (action === "shareStock") shareStockFromList(stockId);
      if (action === "openPublicationHistory") openPublicationHistory(stockId);
      if (action === "closePublicationHistory") closePublicationHistory();
      if (action === "openDeleteConfirm") openDeleteConfirm(stockId);
      if (action === "closeDeleteConfirm") closeDeleteConfirm();
      if (action === "confirmDeleteStock") confirmDeleteStock();
      if (action === "toggleSharedFilter") {
        state.shareFilter = state.shareFilter === "SHARED" ? "ALL" : "SHARED";
        render();
      }
      if (action === "copyShareLink") copyShareLink();
      if (action === "followPublisher") followPublisher(stockId);
      if (action === "openOwnPool") openOwnPool();
      if (action === "copySharedStock") copySharedStock(stockId, "copied");
      if (action === "subscribeStock") copySharedStock(stockId, "subscribed");
      if (action === "unsubscribeStock") unsubscribeStock(stockId);
      if (action === "convertToOwn") convertToOwnStock(stockId);
      if (action === "addSegment") addSegmentValuation();
      if (action === "removeSegment") removeSegmentValuation(Number(event.currentTarget.dataset.index));
      if (action === "markSourceUpdatesRead") markSourceUpdatesRead();
      if (action === "openPublisherFromSquare") openPublisherFromSquare(stockId);
      if (action === "selectAdminUser") selectAdminUser(stockId);
      if (action === "adminToggleSquare") adminToggleUser(stockId, "square_hidden");
      if (action === "adminToggleShareBan") adminToggleUser(stockId, "share_banned");
      if (action === "adminSaveNote") adminSaveNote(stockId);
      if (action === "adminToggleStockHidden") adminToggleStockHidden(stockId);
      if (action === "edit") openDrawer(stockId);
      if (action === "moveUp") moveStockOneStep(stockId, -1);
      if (action === "moveDown") moveStockOneStep(stockId, 1);
      if (action === "delete") openDeleteConfirm(stockId);
    }

    async function switchMainView(view) {
      state.mainView = view || "pool";
      state.query = "";
      if (state.mainView === "square") await loadSquare();
      if (state.mainView === "admin" && state.isAdmin) await loadAdmin();
      if (state.mainView === "pool") await refreshMarketCaps({ renderAfter: false });
      render();
    }

    function openOwnPool() {
      state.mainView = "pool";
      state.viewPublisherId = "own";
      state.shareInviteProfile = null;
      state.publisherStocks = [];
      state.publisherProfile = null;
      state.query = "";
      localStorage.removeItem(PENDING_SHARE_KEY);
      render();
      refreshMarketCaps();
    }

    async function openPublicationHistory(stockId) {
      const stock = [...state.stocks, ...state.publisherStocks, ...state.adminStocks].find((item) => item.id === stockId);
      if (!stockId || !stock) return;
      state.publicationHistory = {
        open: true,
        loading: true,
        stock,
        rows: [],
        error: ""
      };
      render();
      try {
        const rows = await loadPublicationRows(stockId);
        state.publicationHistory = {
          ...state.publicationHistory,
          loading: false,
          rows,
          error: ""
        };
      } catch (error) {
        state.publicationHistory = {
          ...state.publicationHistory,
          loading: false,
          error: `读取发布历史失败：${error.message || String(error)}`
        };
      }
      render();
    }

    function closePublicationHistory() {
      state.publicationHistory = {
        open: false,
        loading: false,
        stock: null,
        rows: [],
        error: ""
      };
      render();
    }

    function openDeleteConfirm(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId) || (state.form?.id === stockId ? state.form : null);
      if (!stockId || !stock) return;
      state.deleteConfirm = {
        open: true,
        stockId,
        stockName: `${stock.name || "该股票"}${stock.code ? `（${stock.code}）` : ""}`,
        deleting: false,
        error: ""
      };
      render();
    }

    function closeDeleteConfirm() {
      if (state.deleteConfirm.deleting) return;
      state.deleteConfirm = {
        open: false,
        stockId: "",
        stockName: "",
        deleting: false,
        error: ""
      };
      render();
    }

    async function confirmDeleteStock() {
      const stockId = state.deleteConfirm.stockId;
      if (!stockId || state.deleteConfirm.deleting) return;
      state.deleteConfirm = { ...state.deleteConfirm, deleting: true, error: "" };
      render();
      const ok = await deleteStock(stockId);
      if (!ok) return;
      state.deleteConfirm = {
        open: false,
        stockId: "",
        stockName: "",
        deleting: false,
        error: ""
      };
      render();
    }

    async function onLogin(event) {
      event.preventDefault();
      const email = new FormData(event.currentTarget).get("email").trim().toLowerCase();
      if (!email) return;
      state.lastError = "";
      state.loginNotice = "正在发送登录邮件...";
      renderLogin();
      try {
        await sendMagicLink(email);
        state.loginNotice = `登录链接已发送到 ${email}，请在邮箱中点击链接完成登录。`;
      } catch (error) {
        state.lastError = error.message || String(error);
        state.loginNotice = "";
      }
      renderLogin();
    }

    async function onProfileSubmit(event) {
      event.preventDefault();
      const nickname = new FormData(event.currentTarget).get("nickname").trim();
      if (!nickname) return;
      state.nicknameNotice = "正在创建昵称...";
      renderProfileSetup();
      try {
        const rows = await supabaseRequest("/rest/v1/profiles?select=id,email,nickname,share_visibility,created_at", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            id: state.session.user.id,
            email: state.session.user.email,
            nickname,
            share_visibility: "private"
          })
        });
        state.profile = rows?.[0] || { id: state.session.user.id, email: state.session.user.email, nickname, share_visibility: "private" };
        state.profileRequired = false;
        state.nicknameNotice = "";
        await afterProfileReady();
      } catch (error) {
        state.nicknameNotice = String(error.message || error).includes("duplicate")
          ? "这个昵称已经被占用，请换一个。"
          : `昵称保存失败：${error.message || String(error)}`;
      }
      render();
    }

    function openDrawer(stockId = null) {
      const stock = state.stocks.find((item) => item.id === stockId);
      state.editingId = stockId;
      state.form = normalizeShareholderReturnFields(stock ? { ...stock } : emptyForm());
      state.formInitialSnapshot = formSnapshot(state.form);
      state.formDirty = false;
      state.drawerError = "";
      state.drawerOpen = true;
      render();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      state.editingId = null;
      state.form = null;
      state.formInitialSnapshot = "";
      state.formDirty = false;
      state.drawerError = "";
      render();
    }

    function formSnapshot(form) {
      if (!form) return "";
      const copy = { ...stripRuntimeMarketCapFields(form), publishNote: form.publishNote || "" };
      return JSON.stringify(copy);
    }

    function markFormDirty() {
      state.formDirty = Boolean(state.form && formSnapshot(state.form) !== state.formInitialSnapshot);
    }

    function updateFormField(key, value) {
      if (!state.form) return;
      if (key === "version") {
        if (value === "自定义") {
          state.form.versionCustom = true;
          state.form.version = "";
          markFormDirty();
          render();
          return;
        }
        state.form.versionCustom = Boolean(state.form.versionCustom && !["乐观", "中性", "悲观"].includes(value));
        state.form.version = value;
        markFormDirty();
        return;
      }
      if (key === "useSegmentValuation") {
        state.form.useSegmentValuation = Boolean(value);
        if (state.form.useSegmentValuation) {
          state.form = normalizeSegmentValuationFields(state.form);
        }
        markFormDirty();
        render();
        return;
      }
      if (["expectedPE", "netCashDiscountRate"].includes(key)) state.form[key] = Number(value);
      else state.form[key] = value;
      markFormDirty();
      if (key === "market") {
        state.form.displayCurrency = defaultCurrencyFor(state.form);
        render();
        return;
      }
      if (key === "displayCurrency") {
        render();
        return;
      }
      if (["expectedPE", "netCashDiscountRate", "expectedPERemark", "shareholderReturnRemark", "forecastYear"].includes(key)) refreshSummary();
    }

    function updateSegmentField(index, key, value) {
      if (!state.form || !Array.isArray(state.form.segmentValuations) || !state.form.segmentValuations[index]) return;
      state.form.segmentValuations[index] = {
        ...state.form.segmentValuations[index],
        [key]: key === "expectedPE" ? Number(value) : value
      };
      applySegmentValuationTotals(state.form);
      markFormDirty();
      if (["expectedPE", "forecastYear", "expectedPERemark"].includes(key)) refreshSummary();
    }

    function addSegmentValuation() {
      if (!state.form || state.form.sourceType === "subscribed") return;
      if (!Array.isArray(state.form.segmentValuations)) state.form.segmentValuations = [];
      state.form.segmentValuations.push(emptySegmentValuationRow(state.form.segmentValuations.length + 1, state.form.forecastYear || "2026E"));
      applySegmentValuationTotals(state.form);
      markFormDirty();
      render();
    }

    function removeSegmentValuation(index) {
      if (!state.form || state.form.sourceType === "subscribed" || !Array.isArray(state.form.segmentValuations)) return;
      if (state.form.segmentValuations.length <= 1 || !state.form.segmentValuations[index]) return;
      state.form.segmentValuations.splice(index, 1);
      applySegmentValuationTotals(state.form);
      markFormDirty();
      render();
    }

    function updatePercentField(key, value) {
      if (!state.form) return;
      const percent = parsePercentInput(value);
      state.form[key] = percent / 100;
      markFormDirty();
      refreshSummary();
    }

    function stepDiscountField(step) {
      if (!state.form) return;
      const input = document.querySelector("[data-percent-field='netCashDiscountRate']");
      const current = input ? parsePercentInput(input.value) : (Number(state.form.netCashDiscountRate) || 0) * 100;
      const next = Math.min(100, Math.max(0, current + step));
      if (input) input.value = formatPercentInput(next);
      updatePercentField("netCashDiscountRate", next);
    }

    function updateAmountField(key, value) {
      if (!state.form) return;
      if (key.startsWith("segmentProfit:")) {
        const index = Number(key.split(":")[1]);
        if (!Array.isArray(state.form.segmentValuations) || !state.form.segmentValuations[index]) return;
        state.form.segmentValuations[index] = {
          ...state.form.segmentValuations[index],
          expectedProfitCny: toCny(value, state.form.displayCurrency)
        };
        applySegmentValuationTotals(state.form);
        markFormDirty();
        refreshSummary();
        return;
      }
      state.form[key] = toCny(value, state.form.displayCurrency);
      if (["expectedDividendCny", "expectedBuybackCny"].includes(key)) {
        state.form.expectedDividendCny = Number(state.form.expectedDividendCny) || 0;
        state.form.expectedBuybackCny = Number(state.form.expectedBuybackCny) || 0;
        state.form.expectedShareholderReturnCny = state.form.expectedDividendCny + state.form.expectedBuybackCny;
        const total = document.querySelector("[data-amount='expectedShareholderReturnCny']");
        if (total) total.value = toDisplay(state.form.expectedShareholderReturnCny, state.form.displayCurrency);
      }
      markFormDirty();
      refreshSummary();
    }

    function refreshSummary() {
      const summary = document.querySelector(".summary");
      if (!summary || !state.form) return;
      const currency = state.form.displayCurrency || "CNY";
      const c = calc(state.form);
      const segmentProfit = document.querySelector("[data-segment-total='profit']");
      const segmentPE = document.querySelector("[data-segment-total='pe']");
      if (segmentProfit) segmentProfit.textContent = metricMoney(state.form.expectedProfitCny, currency);
      if (segmentPE) segmentPE.textContent = state.form.expectedPE ? `${trimNumber(state.form.expectedPE)} 倍` : "--";
      summary.innerHTML = `
        ${resultItem("前瞻市值", metricMoney(c.expectedMarketCapCny, currency))}
        ${resultItem("Upside", percent(c.upside))}
        ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
        ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
      `;
    }

    async function onStockSearch(event) {
      const query = event.target.value.trim().toLowerCase();
      const box = document.getElementById("searchResults");
      if (!query) {
        box.className = "search-results";
        box.innerHTML = "";
        return;
      }
      box.className = "search-results show";
      box.innerHTML = `<div class="empty" style="padding:18px">正在匹配股票...</div>`;
      const results = await searchStocks(query);
      box.className = `search-results ${results.length ? "show" : "show"}`;
      box.innerHTML = results.length
        ? results.map((stock, index) => `
          <button class="result-item" data-catalog="${index}">
            <span><strong>${escapeHtml(stock.name)}</strong><span>${escapeHtml(stock.code)} · ${marketLabel(stock.market)}</span></span>
            ${stock.quoteId ? "" : `<span>${money(stock.marketCapCny, defaultCurrencyFor(stock))}</span>`}
          </button>
        `).join("")
        : `<div class="empty" style="padding:18px">没有匹配结果，可以继续手动录入。</div>`;

          button.innerHTML = "正在获取最新市值...";

    async function saveStock({ keepOpen = false, fromPublish = false } = {}) {
      if (state.saving || (state.publishing && !fromPublish)) return null;
      state.form = normalizeShareholderReturnFields(state.form);
      if (!state.form.name.trim() || !state.form.code.trim()) {
        state.drawerError = "请填写股票名称和代码。";
        render();
        return null;
      }
      if (state.form.useSegmentValuation && !Number(state.form.expectedProfitCny)) {
        state.drawerError = "请至少填写一个分部的前瞻利润。";
        render();
        return null;
      }
      if (!Number(state.form.expectedPE)) {
        state.drawerError = "请填写前瞻 PE。";
        render();
        return null;
      }
      state.saving = true;
      state.drawerError = "";
      render();
      const now = new Date().toISOString();
      const payload = {
        ...normalizeShareholderReturnFields(state.form),
        publishNote: "",
        updatedAt: now,
        manualOrder: state.form.manualOrder ?? Date.now()
      };
      const persistedPayload = payloadForStockRecord(payload);
      const rowPatch = {
        payload: persistedPayload,
        updated_at: now,
        source_user_id: payload.sourceUserId || null,
        source_stock_id: payload.sourceStockId || null,
        source_nickname: payload.sourceNickname || null,
        source_type: payload.sourceType || "self",
        last_source_updated_at: payload.lastSourceUpdatedAt || null,
        source_seen_published_at: payload.sourceSeenPublishedAt || null,
        is_shared: Boolean(payload.isShared),
        last_published_at: payload.lastPublishedAt || null
      };
      if (payload.id) {
        try {
          await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(payload.id)}`, {
            method: "PATCH",
            body: JSON.stringify(rowPatch)
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          state.saving = false;
          render();
          return null;
        }
        state.stocks = state.stocks.map((item) => item.id === payload.id ? payload : item);
      } else {
        payload.createdAt = now;
        payload.pin = "normal";
        let data;
        try {
          data = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
            method: "POST",
            prefer: "return=representation",
            body: JSON.stringify({
              user_id: state.session.user.id,
              ...rowPatch
            })
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          state.saving = false;
          render();
          return null;
        }
        payload.id = data?.[0]?.id;
        state.stocks.push(payload);
      }
      state.form = { ...payload };
      state.formInitialSnapshot = formSnapshot(state.form);
      state.formDirty = false;
      state.saving = false;
      if (!keepOpen) {
        state.drawerOpen = false;
        state.editingId = null;
        state.form = null;
        state.formInitialSnapshot = "";
      }
      render();
      return payload;
    }

    async function publishStock() {
      if (state.publishing || state.saving) return;
      if (state.form?.sourceType === "subscribed") {
        state.drawerError = "订阅来的股票不能发布。如需发布自己的观点，请先转为我的股票。";
        render();
        return;
      }
      if (state.profile?.share_banned) {
        state.drawerError = "你的分享能力当前已被管理员禁用，暂时不能发布。";
        render();
        return;
      }
      if (!confirm("发布会保存当前内容并生成一个可分享快照，确定发布吗？")) return;
      state.publishing = true;
      const note = state.form?.publishNote?.trim() || "";
      const stock = await saveStock({ keepOpen: true, fromPublish: true });
      if (!stock?.id) {
        state.publishing = false;
        render();
        return;
      }
      const now = new Date().toISOString();
      const payload = {
        ...stock,
        isShared: true,
        lastPublishedAt: now,
        updatedAt: now,
        publishNote: ""
      };
      try {
        const latest = await supabaseRequest(`/rest/v1/stock_publications?stock_id=eq.${encodeURIComponent(stock.id)}&select=version_number&order=version_number.desc&limit=1`);
        const versionNumber = Number(latest?.[0]?.version_number || 0) + 1;
        const publicationPayload = buildPublicationSnapshot(payload, note);
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stock.id)}`, {
          method: "PATCH",
          body: JSON.stringify({
            payload: payloadForStockRecord(payload),
            updated_at: now,
            is_shared: true,
            last_published_at: now
          })
        });
        await supabaseRequest("/rest/v1/stock_publications", {
          method: "POST",
          body: JSON.stringify({
            stock_id: stock.id,
            publisher_id: state.session.user.id,
            version_number: versionNumber,
            change_note: note,
            payload: publicationPayload
          })
        });
      } catch (error) {
        state.drawerError = `发布失败：${error.message || String(error)}`;
        state.publishing = false;
        render();
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stock.id ? payload : item);
      state.form = { ...payload };
      state.formInitialSnapshot = formSnapshot(state.form);
      state.formDirty = false;
      state.publishing = false;
      state.drawerOpen = false;
      state.editingId = null;
      state.form = null;
      state.formInitialSnapshot = "";
      render();
    }

    async function moveStockOneStep(stockId, direction) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock) return;
      const rows = [...state.stocks].sort((a, b) => (Number(a.manualOrder) || 0) - (Number(b.manualOrder) || 0));
      const index = rows.findIndex((item) => item.id === stockId);
      const targetIndex = index + direction;
      if (index < 0 || targetIndex < 0 || targetIndex >= rows.length) return;
      const neighbor = rows[targetIndex];
      const currentOrder = Number(stock.manualOrder) || (index + 1) * 1000;
      const neighborOrder = Number(neighbor.manualOrder) || (targetIndex + 1) * 1000;
      const fallbackCurrentOrder = (targetIndex + 1) * 1000;
      const fallbackNeighborOrder = (index + 1) * 1000;
      const now = new Date().toISOString();
      const currentPayload = {
        ...stock,
        pin: "normal",
        manualOrder: currentOrder === neighborOrder ? fallbackCurrentOrder : neighborOrder,
        updatedAt: now
      };
      const neighborPayload = {
        ...neighbor,
        pin: "normal",
        manualOrder: currentOrder === neighborOrder ? fallbackNeighborOrder : currentOrder,
        updatedAt: now
      };
      try {
        await Promise.all([currentPayload, neighborPayload].map((payload) => {
          return supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(payload.id)}`, {
            method: "PATCH",
            body: JSON.stringify({ payload: payloadForStockRecord(payload), updated_at: payload.updatedAt })
          });
        }));
      } catch (error) {
        alert(`更新失败：${error.message || String(error)}`);
        return;
      }
      state.stocks = state.stocks.map((item) => {
        if (item.id === currentPayload.id) return currentPayload;
        if (item.id === neighborPayload.id) return neighborPayload;
        return item;
      });
      state.sort = { key: "manual", dir: "asc" };
      render();
    }

    async function deleteStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock) return false;
      try {
        await markSubscribedCopiesSourceDeleted(stockId);
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "DELETE"
        });
      } catch (error) {
        state.deleteConfirm = {
          ...state.deleteConfirm,
          deleting: false,
          error: `删除失败：${error.message || String(error)}`
        };
        render();
        return false;
      }
      state.stocks = state.stocks.filter((item) => item.id !== stockId);
      if (state.editingId === stockId) {
        state.drawerOpen = false;
        state.editingId = null;
        state.form = null;
        state.formInitialSnapshot = "";
        state.formDirty = false;
        state.drawerError = "";
      }
      render();
      return true;
    }

    function toggleSort(key) {

    async function loadStocks() {
      let data;
      try {
        data = await supabaseRequest(`/rest/v1/stock_records?user_id=eq.${encodeURIComponent(state.session.user.id)}&select=id,user_id,payload,source_user_id,source_stock_id,source_nickname,source_type,last_source_updated_at,source_seen_published_at,is_shared,last_published_at,created_at,updated_at&order=created_at.asc`);
      } catch (error) {
        state.lastError = error.message || String(error);
        state.stocks = [];
        return;
      }
      state.stocks = (data || [])
        .filter((row) => row.user_id === state.session.user.id)
        .map((row) => normalizeStockRow(row));
      await mergeLatestSourceStocks();
    }

    function normalizeStockRow(row) {
      return normalizeShareholderReturnFields({
        ...row.payload,
        id: row.id,
        userId: row.user_id || row.payload?.userId || "",
        sourceUserId: row.source_user_id || row.payload?.sourceUserId || "",
        sourceStockId: row.source_stock_id || row.payload?.sourceStockId || "",
        sourceNickname: row.source_nickname || row.payload?.sourceNickname || "",
        sourceType: row.source_type || row.payload?.sourceType || (row.source_stock_id || row.payload?.sourceStockId ? "copied" : "self"),
        lastSourceUpdatedAt: row.last_source_updated_at || row.payload?.lastSourceUpdatedAt || "",
        sourceSeenPublishedAt: row.source_seen_published_at || row.payload?.sourceSeenPublishedAt || "",
        isShared: Boolean(row.is_shared || row.payload?.isShared),
        lastPublishedAt: row.last_published_at || row.payload?.lastPublishedAt || "",
        adminHidden: Boolean(row.admin_hidden || row.payload?.adminHidden),
        sourceStopped: Boolean(row.payload?.sourceStopped),
        sourceDeletedAt: row.payload?.sourceDeletedAt || "",
        hasSourceUpdate: Boolean(row.payload?.hasSourceUpdate),
        myNote: row.payload?.myNote || ""
      });
    }

    async function loadLatestPublications(stockIds) {
      const ids = [...new Set((stockIds || []).filter(Boolean))];
      if (!ids.length) return new Map();
      const rows = await supabaseRequest(`/rest/v1/stock_publications?stock_id=in.(${ids.map(encodeURIComponent).join(",")})&select=id,stock_id,version_number,change_note,payload,created_at&order=version_number.desc`);
      const latest = new Map();
      (rows || []).forEach((row) => {
        if (!latest.has(row.stock_id)) latest.set(row.stock_id, row);
      });
      return latest;
    }

    async function loadPublicationRows(stockId) {
      return await supabaseRequest(`/rest/v1/stock_publications?stock_id=eq.${encodeURIComponent(stockId)}&select=id,stock_id,publisher_id,version_number,change_note,payload,created_at&order=version_number.desc`) || [];
    }

    async function mergeLatestSourceStocks() {
      state.sourceUpdateCount = 0;
      const sourceIds = [...new Set(state.stocks.filter((stock) => stock.sourceType === "subscribed").map((stock) => stock.sourceStockId).filter(Boolean))];
      if (!sourceIds.length) return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?id=in.(${sourceIds.map(encodeURIComponent).join(",")})&is_shared=eq.true&select=id,payload,source_nickname,last_published_at,updated_at`);
        const latestPublications = await loadLatestPublications(sourceIds);
        const sourceMap = new Map((rows || []).map((row) => {
          const source = normalizeStockRow(row);
          return [row.id, stockWithPublication(source, latestPublications.get(row.id))];
        }));
        state.stocks = state.stocks.map((stock) => {
          const source = sourceMap.get(stock.sourceStockId);
          if (!source) return { ...stock, sourceStopped: true, hasSourceUpdate: false };
          const sourcePublishedAt = source.lastPublishedAt || source.updatedAt || "";
          const hasSourceUpdate = Boolean(sourcePublishedAt && stock.sourceSeenPublishedAt && sourcePublishedAt > stock.sourceSeenPublishedAt);
          if (hasSourceUpdate) state.sourceUpdateCount += 1;
          return {
            ...source,
            id: stock.id,
            createdAt: stock.createdAt,
            manualOrder: stock.manualOrder,
            pin: stock.pin,
            isShared: stock.isShared,
            lastPublishedAt: stock.lastPublishedAt,
            sourceUserId: stock.sourceUserId,
            sourceStockId: stock.sourceStockId,
            sourceNickname: stock.sourceNickname,
            sourceType: stock.sourceType,
            sourceSeenPublishedAt: stock.sourceSeenPublishedAt,
            lastSourceUpdatedAt: sourcePublishedAt || stock.lastSourceUpdatedAt,
            updatedAt: source.updatedAt || stock.updatedAt,
            sourceStopped: false,
            hasSourceUpdate,
            myNote: stock.myNote || ""
          };
        });
      } catch (error) {
        console.warn("同步来源股池失败。", error);
      }
    }

    async function loadPublisherStocks(publisherId) {
      state.publisherStocks = [];
      state.publisherProfile = null;
      if (!publisherId || publisherId === "own") return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?user_id=eq.${encodeURIComponent(publisherId)}&is_shared=eq.true&admin_hidden=eq.false&select=id,user_id,payload,is_shared,last_published_at,updated_at&order=last_published_at.desc`);
        const latestPublications = await loadLatestPublications((rows || []).map((row) => row.id));
        const profile = state.followedPublishers.find((item) => item.id === publisherId) || state.shareInviteProfile || state.publisherProfile;
        state.publisherProfile = profile || null;
        state.publisherStocks = (rows || []).map((row) => ({
          ...stockWithPublication(normalizeStockRow(row), latestPublications.get(row.id)),
          publisherId: row.user_id,
          publisherNickname: profile?.nickname || row.user_id
        }));
        await refreshMarketCaps({ renderAfter: false });
      } catch (error) {
        alert(`读取分享股池失败：${error.message || String(error)}`);
      }
    }

    async function loadSquare() {
      try {
        const profiles = await supabaseRequest("/rest/v1/profiles?share_visibility=eq.public&square_hidden=eq.false&share_banned=eq.false&select=id,email,nickname,share_visibility,created_at");
        const rows = await supabaseRequest("/rest/v1/stock_records?is_shared=eq.true&admin_hidden=eq.false&select=id,user_id,payload,last_published_at,updated_at&order=last_published_at.desc");
        const latestPublications = await loadLatestPublications((rows || []).map((row) => row.id));
        const byUser = new Map();
        (rows || []).forEach((row) => {
          const stock = stockWithPublication(normalizeStockRow(row), latestPublications.get(row.id));
          const list = byUser.get(row.user_id) || [];
          list.push({ ...stock, userId: row.user_id });
          byUser.set(row.user_id, list);
        });
        state.squareProfiles = (profiles || [])
          .map((profile) => {
            const stocks = byUser.get(profile.id) || [];
            const latestPublishedAt = stocks.map((stock) => stock.lastPublishedAt).filter(Boolean).sort().at(-1);
            return { ...profile, stocks, stockCount: stocks.length, latestPublishedAt };
          })
          .filter((profile) => profile.stockCount > 0);
      } catch (error) {
        alert(`读取广场失败：${error.message || String(error)}`);
      }
    }

    async function adminToggleUser(userId, key) {

      const next = !Boolean(user[key]);
      try {
        await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(userId)}`, {
