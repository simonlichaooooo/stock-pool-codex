<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股池管理</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --soft: #eef2f7;
      --brand: #2454a6;
      --brand-strong: #173f82;
      --gain: #c83232;
      --loss: #16835b;
      --warn: #9a6700;
      --shadow: 0 10px 30px rgba(24, 36, 66, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { border-color: #aab5c8; }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    button.primary:hover { background: var(--brand-strong); }
    button.icon { width: 36px; padding: 0; }
    button.danger { color: #b42318; }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: white;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(36, 84, 166, 0.12);
    }
    textarea { min-height: 84px; resize: vertical; }

    .shell { min-height: 100vh; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
    }
    .brand span { color: var(--muted); font-size: 13px; }
    .userbar { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }

    .workspace {
      width: min(1480px, calc(100vw - 40px));
      margin: 24px auto 48px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
      min-width: 58px;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active {
      background: #e9f0fb;
      color: var(--brand-strong);
      font-weight: 700;
    }

    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1320px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 11px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      color: #344054;
      font-weight: 700;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--brand); }
    tbody tr:hover { background: #fbfcff; }
    .stock-name { font-weight: 700; }
    .stock-code { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }
    .gain { color: var(--gain); font-weight: 700; }
    .loss { color: var(--loss); font-weight: 700; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 6px; align-items: center; }
    .tax-header {
      display: grid;
      gap: 6px;
    }
    .tax-header label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .tax-header input {
      width: 14px;
      height: 14px;
      padding: 0;
      box-shadow: none;
    }
    .empty {
      padding: 54px 24px;
      text-align: center;
      color: var(--muted);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-panel {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .login-panel h1 { margin: 0 0 8px; font-size: 24px; }
    .login-panel p { margin: 0 0 22px; color: var(--muted); line-height: 1.6; }
    .login-actions { display: grid; gap: 12px; }
    .oauth-button {
      width: 100%;
      min-height: 44px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 4px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 13px; color: #344054; font-weight: 700; }
    .form-row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; align-items: end; }
    .notice {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 6px;
      line-height: 1.6;
      font-size: 14px;
    }
    .share-banner {
      margin-bottom: 16px;
      padding: 14px 16px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .share-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .share-state, .source-cell {
      display: grid;
      gap: 4px;
    }
    .share-state strong, .source-cell strong { font-size: 13px; }
    .publish-box {
      margin-top: 22px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }
    .publish-box label {
      display: block;
      font-weight: 700;
      color: #344054;
      margin-bottom: 8px;
    }
    .publish-box textarea { min-height: 112px; }
    .publish-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .publish-actions button { min-width: 96px; }
    .form-error {
      margin-top: 18px;
      padding: 12px 14px;
      border: 1px solid #f6c0b7;
      background: #fff3f0;
      color: #912018;
      border-radius: 6px;
      line-height: 1.5;
      text-align: left;
      font-size: 13px;
    }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.34);
      display: none;
      z-index: 20;
    }
    .drawer.open { display: block; }
    .drawer-panel {
      width: min(1120px, 100vw);
      height: 100%;
      margin-left: auto;
      background: var(--panel);
      box-shadow: -20px 0 50px rgba(15, 23, 42, 0.2);
      display: flex;
      flex-direction: column;
    }
    .drawer-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .drawer-head h2 { margin: 0; font-size: 18px; }
    .drawer-body {
      padding: 18px 22px 24px;
      overflow: auto;
      background: #f8fafc;
    }
    .drawer-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 14px;
      background: #f8fafc;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .section-body { padding: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .valuation-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .valuation-form {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .compact-row {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .compact-row.two {
      grid-template-columns: 108px minmax(0, 1fr) 112px minmax(0, 1fr);
    }
    .compact-row label,
    .inline-label {
      font-weight: 700;
      color: #1f2937;
    }
    .amount-suffix {
      color: #111827;
      white-space: nowrap;
    }
    .form-divider {
      margin: 18px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid #98a2b3;
      font-weight: 700;
    }
    .result-panel {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      position: sticky;
      top: 82px;
    }
    .result-panel h3 {
      margin: 0 0 22px;
      font-size: 16px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      font-size: 15px;
    }
    .result-grid strong {
      font-weight: 700;
      display: block;
      margin-bottom: 6px;
      color: #344054;
    }
    .search-results {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
      display: none;
    }
    .search-results.show { display: block; }
    .result-item {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      padding: 10px 12px;
    }
    .result-item:last-child { border-bottom: 0; }
    .result-item strong { display: block; }
    .result-item span { color: var(--muted); font-size: 13px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcff;
      min-height: 78px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 8px; font-size: 18px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; }

    @media (max-width: 860px) {
      .topbar { padding: 0 16px; height: auto; min-height: 64px; flex-wrap: wrap; }
      .workspace { width: calc(100vw - 24px); margin-top: 16px; }
      .toolbar { grid-template-columns: 1fr; }
      .share-banner { align-items: flex-start; flex-direction: column; }
      .form-row, .grid-2, .grid-3, .summary { grid-template-columns: 1fr; }
      .valuation-layout { grid-template-columns: 1fr; }
      .valuation-form { padding: 14px; }
      .result-panel { position: static; }
      .compact-row,
      .compact-row.two { grid-template-columns: 1fr; }
      .brand span { display: none; }
      .drawer-panel { width: 100vw; }
    }
  </style>
</head>

    let currencies = {
      CNY: { label: "人民币", unit: "亿人民币", rateToCny: 1 },
      HKD: { label: "港币", unit: "亿港币", rateToCny: 0.92 },

    };

    const stockCatalog = [
      { name: "美团-W", aliases: "美团 meituan mt", code: "3690.HK", quoteId: "116.03690", market: "HK", exchange: "HKEX", currency: "HKD", marketCapCny: 4800, updatedAt: "2026-05-16" },

      { name: "阿里巴巴-W", aliases: "阿里 alibaba baba", code: "9988.HK", quoteId: "116.09988", market: "HK", exchange: "HKEX", currency: "HKD", marketCapCny: 16500, updatedAt: "2026-05-15" },
      { name: "贵州茅台", aliases: "茅台 guizhoumaotai maotai", code: "600519.SH", quoteId: "1.600519", market: "CN", exchange: "SSE", currency: "CNY", marketCapCny: 19300, updatedAt: "2026-05-15" },
      { name: "宁德时代", aliases: "宁德时代 catl ningdeshidai", code: "300750.SZ", quoteId: "0.300750", market: "CN", exchange: "SZSE", currency: "CNY", marketCapCny: 9100, updatedAt: "2026-05-15" },

    ];

    const state = {
      loading: true,
      session: null,
      profile: null,
      profileRequired: false,
      nicknameNotice: "",
      shareInviteProfile: null,
      followedPublishers: [],
      stocks: [],
      publisherStocks: [],
      viewPublisherId: "own",
      shareFilter: "ALL",
      route: location.hash || "#/",
      filter: "ALL",
      query: "",
      sort: { key: "manual", dir: "asc" },
      stockConnectDividendTax: false,
      drawerOpen: false,
      editingId: null,
      form: null,
      drawerError: "",
      loginNotice: "",
      lastError: ""
    };

    window.addEventListener("hashchange", () => {
      state.route = location.hash || "#/";
      render();
    });

    function id(prefix) {
      return prefix + "-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function readJson(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
      catch { return fallback; }
    }

    function writeJson(key, value) {
      if (value === null) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(value));
    }

    function decodeJwt(token) {
      try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(decodeURIComponent(Array.from(atob(payload)).map((char) => `%${char.charCodeAt(0).toString(16).padStart(2, "0")}`).join("")));
      } catch {
        return {};
      }
    }

    function sessionFromHash() {
      if (!location.hash.includes("access_token=")) return null;
      const params = new URLSearchParams(location.hash.slice(1));
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");
      const expiresAt = Number(params.get("expires_at")) || Math.floor(Date.now() / 1000) + Number(params.get("expires_in") || 3600);
      if (!accessToken) return null;
      const claims = decodeJwt(accessToken);
      const session = {
        access_token: accessToken,
        refresh_token: refreshToken,
        expires_at: expiresAt,
        user: {
          id: claims.sub,
          email: claims.email || claims.user_metadata?.email || ""
        }
      };
      writeJson(AUTH_STORAGE_KEY, session);
      history.replaceState(null, "", AUTH_REDIRECT_URL);
      return session;
    }

    function currentSession() {
      const hashSession = sessionFromHash();
      if (hashSession) return hashSession;
      const saved = readJson(AUTH_STORAGE_KEY, null);
      if (!saved?.access_token) return null;
      return saved;
    }

    async function sendMagicLink(email) {
      const response = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          create_user: true,
          email_redirect_to: AUTH_REDIRECT_URL,
          data: {},
          options: {
            email_redirect_to: AUTH_REDIRECT_URL
          }
        })
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `发送登录邮件失败：HTTP ${response.status}`);
      }
    }

    function loginWithGithub() {
      const url = new URL(`${SUPABASE_URL}/auth/v1/authorize`);
      url.searchParams.set("provider", "github");
      url.searchParams.set("redirect_to", AUTH_REDIRECT_URL);
      location.href = url.toString();
    }

    async function supabaseRequest(path, options = {}) {
      if (!state.session?.access_token) throw new Error("请先登录。");
      const response = await fetch(`${SUPABASE_URL}${path}`, {
        ...options,
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${state.session.access_token}`,
          "Content-Type": "application/json",
          Prefer: options.prefer || "",
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Supabase 请求失败：HTTP ${response.status}`);
      }
      if (response.status === 204) return null;
      const text = await response.text();
      return text ? JSON.parse(text) : null;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function defaultCurrencyFor(stock) {
      if (!stock) return "CNY";
      if (stock.market === "CN" || stock.market === "HK") return "CNY";
      if (stock.market === "US") return "USD";
      return stock.currency || "CNY";
    }

    function toDisplay(cny, currency) {
      const rate = currencies[currency]?.rateToCny || 1;
      return Number(cny || 0) / rate;
    }

    function toCny(value, currency) {
      const rate = currencies[currency]?.rateToCny || 1;
      return Number(value || 0) * rate;
    }

    function money(cny, currency) {
      if (cny === null || cny === undefined || Number.isNaN(Number(cny))) return "--";
      const value = toDisplay(cny, currency);
      return `${trimNumber(value)} ${currency}`;
    }

    function moneyYiCny(cny) {
      if (cny === null || cny === undefined || Number.isNaN(Number(cny))) return "--";
      return trimNumber(cny);
    }

    function trimNumber(value) {
      const abs = Math.abs(Number(value));
      const digits = abs >= 100 ? 0 : abs >= 10 ? 1 : 2;
      return Number(value).toLocaleString("zh-CN", { maximumFractionDigits: digits, minimumFractionDigits: 0 });
    }

    function percent(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "--";
      return `${(Number(value) * 100).toFixed(1)}%`;
    }

    function marketLabel(market) {
      return ({ CN: "A股", HK: "H股", US: "美股" })[market] || market || "--";
    }

    function todayString() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDateTime(value) {
      if (!value) return "--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function marketCurrency(market) {
      return ({ CN: "CNY", HK: "HKD", US: "USD" })[market] || "CNY";
    }

    function normalizeCode(code, market) {
      if (market === "HK") return `${String(code).padStart(5, "0")}.HK`;
      if (market === "CN") {
        const suffix = String(code).startsWith("6") ? ".SH" : ".SZ";
        return `${code}${suffix}`;
      }
      return code;
    }

    function normalizeSearchItem(item) {
      const quoteId = item.QuoteID || `${item.MktNum}.${item.Code}`;
      const classify = item.Classify;
      const securityType = String(item.SecurityType || "");
      const securityName = item.SecurityTypeName || "";
      let market = "";
      let exchange = item.JYS || "";
      if (classify === "AStock") {
        market = "CN";
        exchange = item.MktNum === "1" ? "SSE" : "SZSE";
      } else if (classify === "HK" && item.TypeUS === "3") {
        market = "HK";
        exchange = "HKEX";
      } else if (classify === "UsStock" && securityType === "20") {
        market = "US";
      } else {
        return null;
      }
      return {
        name: item.Name,
        code: normalizeCode(item.Code, market),
        rawCode: item.Code,
        quoteId,
        market,
        exchange,
        currency: marketCurrency(market),
        securityName
      };
    }

    async function fetchExchangeRates() {
      try {
        const response = await fetchWithTimeout("https://open.er-api.com/v6/latest/CNY", 3000);
        if (!response.ok) throw new Error(`汇率接口 HTTP ${response.status}`);
        const json = await response.json();
        if (json.result !== "success" || !json.rates) throw new Error("汇率接口返回异常");
        currencies = {
          CNY: { label: "人民币", unit: "亿人民币", rateToCny: 1 },
          HKD: { label: "港币", unit: "亿港币", rateToCny: 1 / Number(json.rates.HKD) },
          USD: { label: "美元", unit: "亿美元", rateToCny: 1 / Number(json.rates.USD) }
        };
        exchangeRateState.updatedAt = json.time_last_update_utc || todayString();
        exchangeRateState.source = "open.er-api.com";
      } catch (error) {
        console.warn("汇率接口不可用，使用固定备用汇率。", error);
      }
    }

    function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { signal: controller.signal }).finally(() => window.clearTimeout(timeout));
    }

    function jsonp(url, callbackParam = "cb") {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("JSONP 请求超时"));
        }, 8000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP 请求失败"));
        };
        script.src = `${url}${separator}${callbackParam}=${callbackName}`;
        document.head.appendChild(script);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          script.remove();
          reject(new Error("脚本请求超时"));
        }, 8000);
        script.onload = () => {
          window.clearTimeout(timeout);
          script.remove();
          resolve();
        };
        script.onerror = () => {
          window.clearTimeout(timeout);
          script.remove();
          reject(new Error("脚本请求失败"));
        };
        script.src = url;
        document.head.appendChild(script);
      });
    }

    async function searchStocks(query) {
      const url = `https://searchapi.eastmoney.com/api/suggest/get?input=${encodeURIComponent(query)}&type=14&token=D43BF722C8E33BD95256D2E364145C90&count=8`;
      try {
        const json = await jsonp(url);
        const rows = json?.QuotationCodeTable?.Data || [];
        const normalized = rows.map(normalizeSearchItem).filter(Boolean);
        return normalized.length ? normalized : fallbackStockSearch(query);
      } catch (error) {
        console.warn("股票搜索接口不可用，使用内置备用样例。", error);
        return fallbackStockSearch(query);
      }
    }

      const lower = query.toLowerCase();
      return stockCatalog

    async function fetchQuote(stock) {
      if (!stock.quoteId) return stock;
      try {
        return await fetchTencentQuote(stock);
      } catch (error) {
        console.warn("腾讯行情接口不可用，尝试东方财富备用行情。", error);
      }
      const fields = "f57,f58,f116";
      const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${encodeURIComponent(stock.quoteId)}&fields=${fields}`;
      try {
        const json = await jsonp(url);
        const data = json?.data;
        const marketCap = Number(data?.f116);
        if (!marketCap || Number.isNaN(marketCap)) throw new Error("行情接口没有返回总市值");
        const sourceCurrency = marketCurrency(stock.market);
        const marketCapCny = marketCap * (currencies[sourceCurrency]?.rateToCny || 1) / 100000000;
        return {
          ...stock,
          name: data.f58 || stock.name,
          rawCode: data.f57 || stock.rawCode,
          latestMarketCapCny: marketCapCny,
          marketCapSourceCurrency: sourceCurrency,
          marketCapUpdatedAt: todayString()
        };
      } catch (error) {
        console.warn("行情接口不可用，使用备用市值。", error);
        return {
          ...stock,
          latestMarketCapCny: stock.marketCapCny || 0,
          marketCapSourceCurrency: stock.currency || marketCurrency(stock.market),
          marketCapUpdatedAt: stock.updatedAt || todayString()
        };
      }
    }

    function tencentSymbol(stock) {
      const raw = String(stock.rawCode || stock.code || "").replace(/\.(HK|SH|SZ)$/i, "");
      if (stock.market === "HK") return `hk${raw.padStart(5, "0")}`;
      if (stock.market === "CN") return `${raw.startsWith("6") ? "sh" : "sz"}${raw}`;
      if (stock.market === "US") return `us${raw.toUpperCase()}`;
      return "";
    }

    async function fetchTencentQuote(stock) {
      const symbol = tencentSymbol(stock);
      if (!symbol) throw new Error("无法识别腾讯行情代码");
      const variableName = `v_${symbol}`;
      delete window[variableName];
      await loadScript(`https://qt.gtimg.cn/q=${symbol}`);
      const text = window[variableName];
      delete window[variableName];
      if (!text) throw new Error("腾讯行情没有返回数据");
      const parts = text.split("~");
      const marketCapYi = Number(parts[45] || parts[44]);
      if (!marketCapYi || Number.isNaN(marketCapYi)) throw new Error("腾讯行情没有返回总市值");
      const sourceCurrency = marketCurrency(stock.market);
      return {
        ...stock,
        latestMarketCapCny: marketCapYi * (currencies[sourceCurrency]?.rateToCny || 1),
        marketCapSourceCurrency: sourceCurrency,
        marketCapUpdatedAt: todayString()
      };
    }

    function calc(stock) {
      const latest = Number(stock.latestMarketCapCny) || 0;
      const profit = Number(stock.expectedProfitCny) || 0;
      const pe = Number(stock.expectedPE) || 0;
      const cash = Number(stock.netCashCny) || 0;
      const discount = Number(stock.netCashDiscountRate) || 0;
      const shareholder = Number(stock.expectedShareholderReturnCny) || 0;
      const expectedMarketCapCny = profit * pe + cash * discount;
      return {
        expectedMarketCapCny,
        upside: latest ? expectedMarketCapCny / latest - 1 : null,
        forwardPE: profit ? (latest - cash * discount) / profit : null,
        shareholderReturnRate: latest ? shareholder / latest : null
      };
    }

    function shareholderReturnRateForList(stock, computed) {
      const rate = computed.shareholderReturnRate;
      if (rate === null || rate === undefined) return rate;
      if (!state.stockConnectDividendTax || stock.market !== "HK") return rate;
      return rate * 0.8;
    }

        if (groupDiff) return groupDiff;

        return state.sort.dir === "asc" ? va - vb : vb - va;

                    <div><input type="number" step="any" data-amount="netCashCny" value="${escapeHtml(toDisplay(form.netCashCny, currency))}" placeholder="请输入"></div>
                    <span class="amount-suffix">亿 ${currency}</span>
                    <span></span>
                  </div>
                  <div class="compact-row two">
                    <label>净现金口径:</label>
                    <input data-field="netCashScope" value="${escapeHtml(form.netCashScope || "")}" placeholder="请输入">
                    <label class="inline-label">净现金打折系数:</label>
                    <input type="number" min="0" max="1" step="0.01" data-field="netCashDiscountRate" value="${escapeHtml(form.netCashDiscountRate)}" placeholder="输入0-1之间数字">
                  </div>

                  <input type="hidden" data-field="name" value="${escapeHtml(form.name)}">
                  <input type="hidden" data-field="code" value="${escapeHtml(form.code)}">
                  <input type="hidden" data-field="market" value="${escapeHtml(form.market)}">
                  <input type="hidden" data-field="exchange" value="${escapeHtml(form.exchange)}">
                  <input type="hidden" data-field="marketCapUpdatedAt" value="${escapeHtml(form.marketCapUpdatedAt)}">
                  ${state.drawerError ? `<div class="form-error">${escapeHtml(state.drawerError)}</div>` : ""}
                </div>
                <div class="result-panel">
                  <h3>测算结果:</h3>
                  <div class="result-grid summary">
                    ${resultItem("前瞻市值", `${money(c.expectedMarketCapCny, currency)}`)}
                    ${resultItem("upside", percent(c.upside))}
                    ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
                    ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
                  </div>
                  <div class="hint" style="margin-top:24px">股票匹配优先使用公开行情接口；市值会按所选货币实时换算，可手动调整估值假设。</div>
                  <div class="publish-box">
                    <label>发布变更说明</label>
                    <textarea data-field="publishNote" placeholder="记录这次为什么发布或更新观点，例如盈利假设变化、估值口径变化等。">${escapeHtml(form.publishNote || "")}</textarea>
                    <div class="hint">点击“发布”才会进入分享列表并记录版本；只点“保存”不会记录版本。</div>
                    <div class="publish-actions">
                      <button data-action="publishStock">发布</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="drawer-foot">
              <button data-action="closeDrawer">取消</button>
              <button class="primary" data-action="saveStock">保存</button>
            </div>
          </div>
        </aside>
      `;
    }

    function field(label, key, value, type = "text") {
      return `<div class="field"><label>${label}</label><input type="${type}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function numberField(label, key, value, min = "", max = "", step = "any") {
      return `<div class="field"><label>${label}</label><input type="number" min="${min}" max="${max}" step="${step}" data-field="${key}" value="${escapeHtml(value)}"></div>`;
    }

    function amountField(label, key, cny, currency) {
      return `<div class="field"><label>${label}（${currencies[currency].unit}）</label><input type="number" step="any" data-amount="${key}" value="${escapeHtml(toDisplay(cny, currency))}"></div>`;
    }

    function selectField(label, key, value, options) {
      return `
        <div class="field">
          <label>${label}</label>
          <select data-field="${key}">
            ${options.map(([optionValue, optionLabel]) => `<option value="${optionValue}" ${value === optionValue ? "selected" : ""}>${optionLabel}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function textareaField(label, key, value) {
      return `<div class="field"><label>${label}</label><textarea data-field="${key}">${escapeHtml(value)}</textarea></div>`;
    }

    function metric(label, value, cls = "") {
      return `<div class="metric"><span>${label}</span><strong class="${cls}">${value}</strong></div>`;
    }

    function resultItem(label, value) {
      return `<div><strong>${label}:</strong> ${value}</div>`;
    }

    function forecastYearSelect(value) {
      const years = [];
      for (let year = 2025; year <= 2035; year += 1) years.push(`${year}E`);
      return `
        <select data-field="forecastYear">
          ${years.map((year) => `<option value="${year}" ${value === year ? "selected" : ""}>${year}</option>`).join("")}
        </select>
      `;
    }

    function bindEvents() {
      document.getElementById("app").onclick = (event) => {
        const actionEl = event.target.closest("[data-action]");
        if (actionEl) onAction({ currentTarget: actionEl });
      };
      document.querySelectorAll("[data-filter]").forEach((el) => {
        el.addEventListener("click", () => { state.filter = el.dataset.filter; render(); });
      });
      document.querySelectorAll("[data-sort]").forEach((el) => {
        el.addEventListener("click", () => toggleSort(el.dataset.sort));
      });
      const stockConnectTax = document.querySelector("[data-input='stockConnectTax']");
      if (stockConnectTax) {
        stockConnectTax.addEventListener("click", (event) => event.stopPropagation());
        stockConnectTax.addEventListener("change", (event) => {
          state.stockConnectDividendTax = event.target.checked;
          render();
        });
      }
      document.querySelectorAll("[data-field]").forEach((el) => {
        el.addEventListener("input", () => updateFormField(el.dataset.field, el.value));
        el.addEventListener("change", () => updateFormField(el.dataset.field, el.value));
      });
      document.querySelectorAll("[data-amount]").forEach((el) => {
        el.addEventListener("input", () => updateAmountField(el.dataset.amount, el.value));
      });
      const loginForm = document.querySelector("[data-form='login']");
      if (loginForm) loginForm.addEventListener("submit", onLogin);
      const profileForm = document.querySelector("[data-form='profile']");
      if (profileForm) profileForm.addEventListener("submit", onProfileSubmit);
      const listSearch = document.querySelector("[data-input='searchList']");
      if (listSearch) listSearch.addEventListener("input", (event) => { state.query = event.target.value; render(); });
      const viewPublisher = document.querySelector("[data-input='viewPublisher']");
      if (viewPublisher) viewPublisher.addEventListener("change", async (event) => {
        state.viewPublisherId = event.target.value;
        state.query = "";
        if (state.viewPublisherId !== "own") await loadPublisherStocks(state.viewPublisherId);
        render();
      });
      const stockSearch = document.querySelector("[data-input='stockSearch']");
      if (stockSearch) stockSearch.addEventListener("input", onStockSearch);
    }

    async function onAction(event) {
      const action = event.currentTarget.dataset.action;
      const stockId = event.currentTarget.dataset.id;
      if (action === "logout") {
        writeJson(AUTH_STORAGE_KEY, null);
        state.session = null;
        state.profile = null;
        state.profileRequired = false;
        state.stocks = [];
        state.publisherStocks = [];
        state.followedPublishers = [];
        render();
      }
      if (action === "githubLogin") loginWithGithub();
      if (action === "newStock") openDrawer();
      if (action === "closeDrawer") closeDrawer();
      if (action === "saveStock") saveStock();
      if (action === "publishStock") publishStock();
      if (action === "toggleSharedFilter") {
        state.shareFilter = state.shareFilter === "SHARED" ? "ALL" : "SHARED";
        render();
      }
      if (action === "copyShareLink") copyShareLink();
      if (action === "followPublisher") followPublisher(stockId);
      if (action === "copySharedStock") copySharedStock(stockId);
      if (action === "edit") openDrawer(stockId);
      if (action === "pinTop") updatePin(stockId, "top");
      if (action === "pinBottom") updatePin(stockId, "bottom");
      if (action === "delete") deleteStock(stockId);
    }

    async function onLogin(event) {
      event.preventDefault();
      const email = new FormData(event.currentTarget).get("email").trim().toLowerCase();
      if (!email) return;
      state.lastError = "";
      state.loginNotice = "正在发送登录邮件...";
      renderLogin();
      try {
        await sendMagicLink(email);
        state.loginNotice = `登录链接已发送到 ${email}，请在邮箱中点击链接完成登录。`;
      } catch (error) {
        state.lastError = error.message || String(error);
        state.loginNotice = "";
      }
      renderLogin();
    }

    async function onProfileSubmit(event) {
      event.preventDefault();
      const nickname = new FormData(event.currentTarget).get("nickname").trim();
      if (!nickname) return;
      state.nicknameNotice = "正在创建昵称...";
      renderProfileSetup();
      try {
        const rows = await supabaseRequest("/rest/v1/profiles?select=id,email,nickname,created_at", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            id: state.session.user.id,
            email: state.session.user.email,
            nickname
          })
        });
        state.profile = rows?.[0] || { id: state.session.user.id, email: state.session.user.email, nickname };
        state.profileRequired = false;
        state.nicknameNotice = "";
        await afterProfileReady();
      } catch (error) {
        state.nicknameNotice = String(error.message || error).includes("duplicate")
          ? "这个昵称已经被占用，请换一个。"
          : `昵称保存失败：${error.message || String(error)}`;
      }
      render();
    }

    function openDrawer(stockId = null) {
      const stock = state.stocks.find((item) => item.id === stockId);
      state.editingId = stockId;
      state.form = stock ? { ...stock } : emptyForm();
      state.drawerError = "";
      state.drawerOpen = true;
      render();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      state.editingId = null;
      state.form = null;
      state.drawerError = "";
      render();
    }

    function updateFormField(key, value) {
      if (!state.form) return;
      if (["expectedPE", "netCashDiscountRate"].includes(key)) state.form[key] = Number(value);
      else state.form[key] = value;
      if (key === "market") {
        state.form.displayCurrency = defaultCurrencyFor(state.form);
        render();
        return;
      }
      if (key === "displayCurrency") {
        render();
        return;
      }
      if (["expectedPE", "netCashDiscountRate", "expectedPERemark", "shareholderReturnRemark", "forecastYear"].includes(key)) refreshSummary();
    }

    function updateAmountField(key, value) {
      if (!state.form) return;
      state.form[key] = toCny(value, state.form.displayCurrency);
      refreshSummary();
    }

    function refreshSummary() {
      const summary = document.querySelector(".summary");
      if (!summary || !state.form) return;
      const currency = state.form.displayCurrency || "CNY";
      const c = calc(state.form);
      summary.innerHTML = `
        ${resultItem("前瞻市值", money(c.expectedMarketCapCny, currency))}
        ${resultItem("upside", percent(c.upside))}
        ${resultItem("Forward PE", c.forwardPE ? `${trimNumber(c.forwardPE)} 倍` : "--")}
        ${resultItem("前瞻股东回报率", percent(c.shareholderReturnRate))}
      `;
    }

    async function onStockSearch(event) {
      const query = event.target.value.trim().toLowerCase();
      const box = document.getElementById("searchResults");
      if (!query) {
        box.className = "search-results";
        box.innerHTML = "";
        return;
      }
      box.className = "search-results show";
      box.innerHTML = `<div class="empty" style="padding:18px">正在匹配股票...</div>`;
      const results = await searchStocks(query);
      box.className = `search-results ${results.length ? "show" : "show"}`;
      box.innerHTML = results.length
        ? results.map((stock, index) => `
          <button class="result-item" data-catalog="${index}">
            <span><strong>${escapeHtml(stock.name)}</strong><span>${escapeHtml(stock.code)} · ${marketLabel(stock.market)} · ${escapeHtml(stock.exchange)}</span></span>
            <span>${stock.quoteId ? "点击获取市值" : money(stock.marketCapCny, defaultCurrencyFor(stock))}</span>
          </button>
        `).join("")
        : `<div class="empty" style="padding:18px">没有匹配结果，可以继续手动录入。</div>`;
      box.querySelectorAll("[data-catalog]").forEach((button) => {
        button.addEventListener("click", async () => {
          button.disabled = true;
          button.innerHTML = "正在获取最新市值...";
          const quote = await fetchQuote(results[Number(button.dataset.catalog)]);
          applyCatalog(quote);
        });
      });
    }

    function applyCatalog(stock) {
      if (!state.form || !stock) return;
      state.form.name = stock.name;
      state.form.code = stock.code;
      state.form.market = stock.market;
      state.form.exchange = stock.exchange;
      state.form.displayCurrency = defaultCurrencyFor(stock);
      state.form.quoteId = stock.quoteId || "";
      state.form.marketCapSourceCurrency = stock.marketCapSourceCurrency || stock.currency || marketCurrency(stock.market);
      state.form.latestMarketCapCny = stock.latestMarketCapCny || stock.marketCapCny || 0;
      state.form.marketCapUpdatedAt = stock.marketCapUpdatedAt || stock.updatedAt || todayString();
      state.form.forecastYear = state.form.forecastYear || "2025E";
      render();
    }

    async function saveStock({ keepOpen = false } = {}) {
      if (!state.form.name.trim() || !state.form.code.trim()) {
        state.drawerError = "请填写股票名称和代码。";
        render();
        return null;
      }
      state.drawerError = "";
      const now = new Date().toISOString();
      const payload = {
        ...state.form,
        publishNote: "",
        updatedAt: now,
        manualOrder: state.form.manualOrder ?? Date.now()
      };
      const rowPatch = {
        payload,
        updated_at: now,
        source_user_id: payload.sourceUserId || null,
        source_stock_id: payload.sourceStockId || null,
        source_nickname: payload.sourceNickname || null,
        last_source_updated_at: payload.lastSourceUpdatedAt || null,
        is_shared: Boolean(payload.isShared),
        last_published_at: payload.lastPublishedAt || null
      };
      if (payload.id) {
        try {
          await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(payload.id)}`, {
            method: "PATCH",
            body: JSON.stringify(rowPatch)
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          render();
          return null;
        }
        state.stocks = state.stocks.map((item) => item.id === payload.id ? payload : item);
      } else {
        payload.createdAt = now;
        payload.pin = "normal";
        let data;
        try {
          data = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
            method: "POST",
            prefer: "return=representation",
            body: JSON.stringify({
              user_id: state.session.user.id,
              ...rowPatch
            })
          });
        } catch (error) {
          state.drawerError = `保存失败：${error.message || String(error)}`;
          render();
          return null;
        }
        payload.id = data?.[0]?.id;
        state.stocks.push(payload);
      }
      state.form = { ...payload };
      if (!keepOpen) closeDrawer();
      return payload;
    }

    async function publishStock() {
      const note = state.form?.publishNote?.trim() || "";
      const stock = await saveStock({ keepOpen: true });
      if (!stock?.id) return;
      const now = new Date().toISOString();
      const payload = {
        ...stock,
        isShared: true,
        lastPublishedAt: now,
        updatedAt: now,
        publishNote: ""
      };
      try {
        const latest = await supabaseRequest(`/rest/v1/stock_publications?stock_id=eq.${encodeURIComponent(stock.id)}&select=version_number&order=version_number.desc&limit=1`);
        const versionNumber = Number(latest?.[0]?.version_number || 0) + 1;
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stock.id)}`, {
          method: "PATCH",
          body: JSON.stringify({
            payload,
            updated_at: now,
            is_shared: true,
            last_published_at: now
          })
        });
        await supabaseRequest("/rest/v1/stock_publications", {
          method: "POST",
          body: JSON.stringify({
            stock_id: stock.id,
            publisher_id: state.session.user.id,
            version_number: versionNumber,
            change_note: note,
            payload
          })
        });
      } catch (error) {
        state.drawerError = `发布失败：${error.message || String(error)}`;
        render();
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stock.id ? payload : item);
      state.form = { ...payload };
      closeDrawer();
    }

    async function updatePin(stockId, pin) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock) return;
      const payload = { ...stock, pin, updatedAt: new Date().toISOString() };
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "PATCH",
          body: JSON.stringify({ payload, updated_at: payload.updatedAt })
        });
      } catch (error) {
        alert(`更新失败：${error.message || String(error)}`);
        return;
      }
      state.stocks = state.stocks.map((item) => item.id === stockId ? payload : item);
      render();
    }

    async function deleteStock(stockId) {
      const stock = state.stocks.find((item) => item.id === stockId);
      if (!stock || !confirm(`删除 ${stock.name}？`)) return;
      try {
        await supabaseRequest(`/rest/v1/stock_records?id=eq.${encodeURIComponent(stockId)}`, {
          method: "DELETE"
        });
      } catch (error) {
        alert(`删除失败：${error.message || String(error)}`);
        return;
      }
      state.stocks = state.stocks.filter((item) => item.id !== stockId);
      render();
    }

    function toggleSort(key) {
      if (state.sort.key !== key) state.sort = { key, dir: "desc" };
      else if (state.sort.dir === "desc") state.sort.dir = "asc";
      else state.sort = { key: "manual", dir: "asc" };
      render();
    }

    async function loadStocks() {
      let data;
      try {
        data = await supabaseRequest("/rest/v1/stock_records?select=id,payload,source_user_id,source_stock_id,source_nickname,last_source_updated_at,is_shared,last_published_at,created_at,updated_at&order=created_at.asc");
      } catch (error) {
        state.lastError = error.message || String(error);
        state.stocks = [];
        return;
      }
      state.stocks = (data || []).map((row) => normalizeStockRow(row));
      await mergeLatestSourceStocks();
    }

    function normalizeStockRow(row) {
      return {
        ...row.payload,
        id: row.id,
        sourceUserId: row.source_user_id || row.payload?.sourceUserId || "",
        sourceStockId: row.source_stock_id || row.payload?.sourceStockId || "",
        sourceNickname: row.source_nickname || row.payload?.sourceNickname || "",
        lastSourceUpdatedAt: row.last_source_updated_at || row.payload?.lastSourceUpdatedAt || "",
        isShared: Boolean(row.is_shared || row.payload?.isShared),
        lastPublishedAt: row.last_published_at || row.payload?.lastPublishedAt || ""
      };
    }

    async function mergeLatestSourceStocks() {
      const sourceIds = [...new Set(state.stocks.map((stock) => stock.sourceStockId).filter(Boolean))];
      if (!sourceIds.length) return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?id=in.(${sourceIds.map(encodeURIComponent).join(",")})&select=id,payload,source_nickname,last_published_at,updated_at`);
        const sourceMap = new Map((rows || []).map((row) => [row.id, normalizeStockRow(row)]));
        state.stocks = state.stocks.map((stock) => {
          const source = sourceMap.get(stock.sourceStockId);
          if (!source) return stock;
          return {
            ...source,
            id: stock.id,
            createdAt: stock.createdAt,
            manualOrder: stock.manualOrder,
            pin: stock.pin,
            isShared: stock.isShared,
            lastPublishedAt: stock.lastPublishedAt,
            sourceUserId: stock.sourceUserId,
            sourceStockId: stock.sourceStockId,
            sourceNickname: stock.sourceNickname,
            lastSourceUpdatedAt: source.lastPublishedAt || source.updatedAt || stock.lastSourceUpdatedAt,
            updatedAt: source.updatedAt || stock.updatedAt
          };
        });
      } catch (error) {
        console.warn("同步来源股池失败。", error);
      }
    }

    async function loadPublisherStocks(publisherId) {
      state.publisherStocks = [];
      if (!publisherId || publisherId === "own") return;
      try {
        const rows = await supabaseRequest(`/rest/v1/stock_records?user_id=eq.${encodeURIComponent(publisherId)}&is_shared=eq.true&select=id,user_id,payload,is_shared,last_published_at,updated_at&order=last_published_at.desc`);
        const profile = state.followedPublishers.find((item) => item.id === publisherId) || state.shareInviteProfile;
        state.publisherStocks = (rows || []).map((row) => ({
          ...normalizeStockRow(row),
          publisherId: row.user_id,
          publisherNickname: profile?.nickname || row.user_id
        }));
      } catch (error) {
        alert(`读取分享股池失败：${error.message || String(error)}`);
      }
    }

    async function loadProfile() {
      const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(state.session.user.id)}&select=id,email,nickname,created_at&limit=1`);
      state.profile = rows?.[0] || null;
      state.profileRequired = !state.profile;
    }

    async function loadFollowedPublishers() {
      const follows = await supabaseRequest(`/rest/v1/follows?follower_id=eq.${encodeURIComponent(state.session.user.id)}&select=publisher_id,created_at`);
      const ids = (follows || []).map((row) => row.publisher_id);
      if (!ids.length) {
        state.followedPublishers = [];
        return;
      }
      const profiles = await supabaseRequest(`/rest/v1/profiles?id=in.(${ids.map(encodeURIComponent).join(",")})&select=id,nickname,email`);
      state.followedPublishers = profiles || [];
    }

    async function loadShareInvite() {
      const urlPublisher = new URLSearchParams(location.search).get("share");
      if (urlPublisher) localStorage.setItem(PENDING_SHARE_KEY, urlPublisher);
      const publisherId = localStorage.getItem(PENDING_SHARE_KEY);
      if (!publisherId || publisherId === state.session.user.id) {
        state.shareInviteProfile = null;
        return;
      }
      try {
        const rows = await supabaseRequest(`/rest/v1/profiles?id=eq.${encodeURIComponent(publisherId)}&select=id,nickname,email&limit=1`);
        state.shareInviteProfile = rows?.[0] || null;
      } catch (error) {
        state.shareInviteProfile = null;
      }
    }

    async function afterProfileReady() {
      await loadFollowedPublishers();
      await loadShareInvite();
      await loadStocks();
    }

    async function followPublisher(publisherId) {
      if (!publisherId) return;
      try {
        await supabaseRequest("/rest/v1/follows", {
          method: "POST",
          body: JSON.stringify({
            follower_id: state.session.user.id,
            publisher_id: publisherId
          })
        });
        localStorage.removeItem(PENDING_SHARE_KEY);
        await loadFollowedPublishers();
        state.viewPublisherId = publisherId;
        await loadPublisherStocks(publisherId);
      } catch (error) {
        if (!String(error.message || error).includes("duplicate")) alert(`关注失败：${error.message || String(error)}`);
      }
      render();
    }

    async function copyShareLink() {
      const base = `${location.origin}${location.pathname}`;
      const shareUrl = `${base}?share=${encodeURIComponent(state.profile.id)}`;
      try {
        await navigator.clipboard.writeText(shareUrl);
        alert("分享链接已复制。");
      } catch {
        prompt("复制你的分享链接：", shareUrl);
      }
    }

    async function copySharedStock(stockId) {
      const source = state.publisherStocks.find((stock) => stock.id === stockId);
      if (!source) return;
      const now = new Date().toISOString();
      const payload = {
        ...source,
        id: null,
        isShared: false,
        lastPublishedAt: "",
        sourceUserId: source.publisherId,
        sourceStockId: source.id,
        sourceNickname: source.publisherNickname,
        lastSourceUpdatedAt: source.lastPublishedAt || source.updatedAt || now,
        createdAt: now,
        updatedAt: now,
        pin: "normal",
        manualOrder: Date.now()
      };
      try {
        const rows = await supabaseRequest("/rest/v1/stock_records?select=id,payload", {
          method: "POST",
          prefer: "return=representation",
          body: JSON.stringify({
            user_id: state.session.user.id,
            payload,
            source_user_id: payload.sourceUserId,
            source_stock_id: payload.sourceStockId,
            source_nickname: payload.sourceNickname,
            last_source_updated_at: payload.lastSourceUpdatedAt,
            is_shared: false
          })
        });
        payload.id = rows?.[0]?.id;
        state.stocks.push(payload);
        alert("已复制到你的股池。");
      } catch (error) {
        alert(`复制失败：${error.message || String(error)}`);
      }
    }

    async function init() {
      state.session = currentSession();
      if (state.session) {
        try {
          await loadProfile();
          if (!state.profileRequired) await afterProfileReady();
        } catch (error) {
          state.lastError = error.message || String(error);
        }
      }
      state.loading = false;
      render();
      fetchExchangeRates().then(() => {
        if (!state.drawerOpen) render();
      });
    }

    init();
  </script>
</body>
</html>
