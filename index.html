<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>钞·作业</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --panel-2: #f7f9fb;
      --text: #101828;
      --muted: #667085;
      --line: #d9e1ea;
      --soft: #edf1f5;
      --brand: #0f5f55;
      --brand-strong: #0b4f47;
      --brand-soft: #e6f1ef;
      --accent: #2f5f98;
      --gain: #b42318;
      --loss: #067647;
      --warn: #9a6700;
      --shadow: 0 12px 28px rgba(16, 24, 40, 0.06);
      --shadow-soft: 0 4px 14px rgba(16, 24, 40, 0.045);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 32px;
      padding: 0 11px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    button:hover { border-color: #98a6b8; background: #f8fafc; }
    button:active { transform: translateY(1px); }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    button.primary:hover { background: var(--brand-strong); }
    button.icon { width: 32px; padding: 0; }
    button.danger { color: #b42318; }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 9px;
      background: white;
      color: var(--text);
      outline: none;
      min-height: 34px;
      font-size: 13px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(15, 95, 85, 0.12);
    }
    textarea { min-height: 76px; resize: vertical; }

    .shell { min-height: 100vh; }
    .topbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 0;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .topbar-inner {
      width: min(1480px, calc(100vw - 48px));
      min-height: 56px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }
    .brand-logo {
      display: block;
      width: 154px;
      height: 44px;
      object-fit: contain;
      object-position: left center;
      flex: 0 0 auto;
    }
    .brand h1 {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .brand span { color: var(--muted); font-size: 12px; }
    .userbar { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; flex-wrap: wrap; justify-content: flex-end; }

    .workspace {
      width: min(1500px, calc(100vw - 48px));
      margin: 18px auto 44px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) repeat(6, auto);
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      box-shadow: var(--shadow-soft);
    }
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      width: 100%;
    }
    .nav-primary {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px;
      width: fit-content;
      box-shadow: var(--shadow-soft);
    }
    .nav-tabs button {
      border: 0;
      background: transparent;
      min-width: 72px;
      min-height: 30px;
      font-weight: 700;
    }
    .nav-tabs button.active {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
      box-shadow: none;
    }
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      background: var(--panel);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
      min-width: 58px;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active {
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-weight: 700;
    }

    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-scroll { overflow: auto; max-height: calc(100vh - 164px); }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1320px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 11px;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
      white-space: nowrap;
    }
    th {
      background: var(--panel-2);
      color: #344054;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--brand); }
    tbody tr:hover { background: #f8fbfb; }
    .stock-name { font-weight: 760; }
    .stock-code { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .version-cell {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 760;
      color: #344054;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 6px;
      border-radius: 4px;
      background: var(--soft);
      color: #344054;
      font-size: 12px;
      font-weight: 650;
    }
    .gain { color: var(--gain); font-weight: 700; }
    .loss { color: var(--loss); font-weight: 700; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 5px; align-items: center; }
    .tax-header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tax-header label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .tax-header input {
      width: 14px;
      height: 14px;
      padding: 0;
      box-shadow: none;
      order: 2;
    }
    .empty {
      padding: 42px 22px;
      text-align: center;
      color: var(--muted);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }
    .login-panel {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .login-panel h1 { margin: 0 0 7px; font-size: 22px; }
    .login-panel p { margin: 0 0 18px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .login-actions { display: grid; gap: 10px; }
    .oauth-button {
      width: 100%;
      min-height: 38px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 2px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; color: #344054; font-weight: 700; }
    .form-row { display: grid; grid-template-columns: 1fr 104px; gap: 8px; align-items: end; }
    .notice {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 5px;
      line-height: 1.55;
      font-size: 13px;
    }
    .share-banner {
      margin-bottom: 12px;
      padding: 11px 12px;
      border: 1px solid #b8d3ff;
      background: #eef5ff;
      color: #163b76;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .update-banner {
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid #f1d28a;
      background: #fff8e5;
      color: #7a4b00;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .publisher-panel {
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      box-shadow: var(--shadow-soft);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .publisher-panel h2 {
      margin: 0 0 6px;
      font-size: 16px;
    }
    .publisher-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }
    .share-settings {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: #344054;
      font-size: 13px;
      font-weight: 600;
    }
    .share-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: #344054;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .share-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .share-switch-track {
      position: relative;
      width: 38px;
      height: 22px;
      border-radius: 999px;
      background: #d0d7e2;
      transition: background .16s ease, box-shadow .16s ease;
      flex: 0 0 auto;
    }
    .share-switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.24);
      transition: transform .16s ease;
    }
    .share-switch input:checked + .share-switch-track {
      background: var(--brand);
    }
    .share-switch input:checked + .share-switch-track::after {
      transform: translateX(16px);
    }
    .share-switch input:focus-visible + .share-switch-track {
      box-shadow: 0 0 0 3px rgba(15, 95, 85, 0.14);
    }
    .share-switch input:disabled + .share-switch-track,
    .share-switch input:disabled ~ span {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .page-header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .nav-pool-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      flex: 0 1 auto;
      min-width: 0;
      margin-left: auto;
    }
    .nav-publisher-select {
      width: 130px;
      min-width: 130px;
      max-width: 130px;
      flex: 0 0 130px;
      border-color: rgba(15, 95, 85, 0.38);
      background-color: var(--brand-soft);
      color: var(--brand-strong);
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(15, 95, 85, 0.08);
    }
    .share-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .share-state, .source-cell {
      display: grid;
      gap: 4px;
    }
    .share-cell { text-align: center; }
    .share-cell .share-state { justify-items: center; }
    .share-cell button { margin: 0 auto; }
    .share-head { text-align: center; }
    .share-action {
      min-height: 20px;
      padding: 0 6px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.2;
    }
    .share-state strong, .source-cell strong { font-size: 13px; }
    .source-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .badge.soft { font-weight: 500; color: var(--muted); background: #f4f6fa; }
    .badge.warn { background: #fff4cc; color: #805400; }
    .publish-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .publish-box label {
      display: block;
      font-weight: 700;
      color: #344054;
      margin-bottom: 7px;
      font-size: 13px;
    }
    .publish-box textarea { min-height: 82px; }
    .publish-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .publish-actions button {
      min-width: 112px;
      border-color: #c2410c;
      background: #c2410c;
      color: white;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(194, 65, 12, 0.16);
    }
    .publish-actions button:hover:not(:disabled) {
      border-color: #9a3412;
      background: #9a3412;
    }
    .history-modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 30;
      background: rgba(15, 23, 42, 0.36);
      padding: 32px;
      overflow: auto;
    }
    .history-modal.open { display: grid; place-items: start center; }
    .history-panel {
      width: min(1040px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.2);
      overflow: hidden;
    }
    .history-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .history-head h3 { margin: 0; font-size: 18px; }
    .history-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .history-body {
      padding: 16px 18px 18px;
      background: #f6f8fa;
      max-height: min(760px, calc(100vh - 150px));
      overflow: auto;
    }
    .history-list {
      display: grid;
      gap: 12px;
    }
    .history-item {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px;
      display: grid;
      gap: 12px;
    }
    .history-item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .history-item h4 { margin: 0; font-size: 15px; }
    .history-note {
      margin: 0;
      color: #344054;
      line-height: 1.55;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .history-metric {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #f8fafc;
      padding: 8px;
      min-height: 58px;
      min-width: 0;
    }
    .history-metric-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
      min-width: 0;
    }
    .history-metric-title span,
    .history-metric-title em {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-style: normal;
    }
    .history-metric-title em {
      max-width: 58%;
      color: #667085;
      text-align: right;
    }
    .history-metric strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      overflow-wrap: anywhere;
    }
    .history-metric strong.text-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow-wrap: normal;
    }
    .history-metric [data-tooltip] { cursor: help; }
    .history-metric [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 8px;
      right: 8px;
      top: calc(100% - 4px);
      z-index: 4;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #111827;
      color: white;
      font-size: 12px;
      line-height: 1.5;
      white-space: normal;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.22);
    }
    .history-delta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .form-error {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #f6c0b7;
      background: #fff3f0;
      color: #912018;
      border-radius: 6px;
      line-height: 1.5;
      text-align: left;
      font-size: 13px;
    }
    .readonly-note {
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid #d7e3f8;
      background: #f2f6ff;
      color: #24436f;
      border-radius: 6px;
      line-height: 1.5;
      font-size: 13px;
    }
    .disclaimer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .square-card, .admin-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }
    .square-card h3, .admin-card h3 { margin: 0; font-size: 16px; }
    .mini-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .mini-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--soft);
      padding-top: 7px;
    }
    .admin-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .admin-list {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .admin-user-row {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      min-height: 62px;
      text-align: left;
      padding: 10px;
      display: grid;
      gap: 4px;
    }
    .admin-user-row.active { background: #e9f0fb; }
    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .admin-actions input { width: min(360px, 100%); }
    .private-row { background: #fffdf6; }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.36);
      display: none;
      z-index: 20;
    }
    .drawer.open { display: block; }
    .drawer-panel {
      width: min(1320px, 100vw);
      height: 100%;
      margin-left: auto;
      background: var(--panel);
      box-shadow: -12px 0 34px rgba(15, 23, 42, 0.16);
      display: flex;
      flex-direction: column;
    }
    .drawer-head {
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .drawer-head h2 { margin: 0; font-size: 17px; }
    .drawer-body {
      padding: 14px 20px 20px;
      overflow: auto;
      background: #f6f8fa;
    }
    .drawer-foot {
      padding: 10px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-start;
      gap: 10px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 5px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-title {
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .section-body { padding: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    function decodeJwt(token) {
      try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(decodeURIComponent(Array.from(atob(payload)).map((char) => `%${char.charCodeAt(0).toString(16).padStart(2, "0")}`).join("")));
      } catch {
        return {};
      }
    }

    function sessionFromHash() {
      if (!hasAuthTokensInHash()) return null;
      const params = new URLSearchParams(location.hash.slice(1));
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");
      const expiresAt = Number(params.get("expires_at")) || Math.floor(Date.now() / 1000) + Number(params.get("expires_in") || 3600);
      if (!accessToken) return null;
      const claims = decodeJwt(accessToken);
      const session = {
        access_token: accessToken,
        refresh_token: refreshToken,
        expires_at: expiresAt,
        user: {
          id: claims.sub,
          email: claims.email || claims.user_metadata?.email || "",
          user_metadata: claims.user_metadata || {},
          app_metadata: claims.app_metadata || {}
        },
        claims
      };
      writeJson(AUTH_STORAGE_KEY, session);
      history.replaceState(null, "", AUTH_REDIRECT_URL);
      return session;
    }

    function currentSession() {
      const hashSession = sessionFromHash();
      if (hashSession) return hashSession;
      const saved = readJson(AUTH_STORAGE_KEY, null);
      if (!saved?.access_token) return null;
      const claims = decodeJwt(saved.access_token);
      saved.claims = saved.claims || claims;
      saved.user = {
        ...(saved.user || {}),
        id: saved.user?.id || claims.sub,
        email: saved.user?.email || claims.email || claims.user_metadata?.email || "",
        user_metadata: saved.user?.user_metadata || claims.user_metadata || {},
        app_metadata: saved.user?.app_metadata || claims.app_metadata || {}
      };
      return saved;
    }

    function persistSession(session) {
      if (!session?.access_token) return null;
      const claims = decodeJwt(session.access_token);
      const normalized = {
        ...session,
        expires_at: session.expires_at || Math.floor(Date.now() / 1000) + Number(session.expires_in || 3600),
        user: {
          ...(session.user || {}),

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({

      })[char]);

    function trimNumber(value) {
      const abs = Math.abs(Number(value));
      const digits = abs >= 100 ? 0 : abs >= 10 ? 1 : 2;
      return Number(value).toLocaleString("zh-CN", { maximumFractionDigits: digits, minimumFractionDigits: 0 });
    }

    function percent(value) {

      if (!value) return "--";

      return date.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function formatDate(value) {

    function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { signal: controller.signal }).finally(() => window.clearTimeout(timeout));
    }

    function jsonp(url, callbackParam = "cb") {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("JSONP 请求超时"));
        }, 8000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP 请求失败"));
        };
        script.src = `${url}${separator}${callbackParam}=${callbackName}`;
        document.head.appendChild(script);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          script.remove();
          reject(new Error("脚本请求超时"));
        }, 8000);
        script.onload = () => {
          window.clearTimeout(timeout);
          script.remove();
          resolve();
        };
        script.onerror = () => {
          window.clearTimeout(timeout);
          script.remove();
          reject(new Error("脚本请求失败"));
        };
        script.src = url;
        document.head.appendChild(script);
      });
    }

        ...stock,
        latestMarketCapCny: Number(quote.latestMarketCapCny) || Number(stock.latestMarketCapCny) || 0,
        marketCapSourceCurrency: quote.marketCapSourceCurrency || stock.marketCapSourceCurrency || marketCurrency(stock.market),
        marketCapUpdatedAt: quote.marketCapUpdatedAt || stock.marketCapUpdatedAt || todayString()
      };
    }

    async function refreshMarketCaps({ renderAfter = true } = {}) {
      if (marketCapRefreshInFlight || !state.session) return;
      const ownTargets = state.stocks.filter((stock) => stock.quoteId && !stock.sourceDeletedAt);
      const publisherTargets = state.publisherStocks.filter((stock) => stock.quoteId && !stock.sourceDeletedAt);
      const targets = [
        ...ownTargets.map((stock) => ({ scope: "own", stock })),
        ...publisherTargets.map((stock) => ({ scope: "publisher", stock }))
      ];
      if (!targets.length) return;
      marketCapRefreshInFlight = true;
      try {
        const quotes = await Promise.all(targets.map(async (item) => {
          try {
            return { ...item, quote: await fetchQuote(item.stock) };
          } catch (error) {
            console.warn("刷新市值失败。", item.stock?.code, error);
            return null;
          }
        }));
        quotes.filter(Boolean).forEach(({ scope, stock, quote }) => {
          if (scope === "own") {
            state.stocks = state.stocks.map((item) => item.id === stock.id ? mergeRuntimeMarketCap(item, quote) : item);
          } else {
            state.publisherStocks = state.publisherStocks.map((item) => item.id === stock.id ? mergeRuntimeMarketCap(item, quote) : item);
          }
          if (state.form?.id === stock.id) {
            state.form = mergeRuntimeMarketCap(state.form, quote);
          }
        });
      } finally {
        marketCapRefreshInFlight = false;
      }
      if (renderAfter) render();
    }

    function startMarketCapAutoRefresh() {
      stopMarketCapAutoRefresh();
      marketCapRefreshTimer = window.setInterval(() => {
        if (state.mainView === "pool") refreshMarketCaps();
      }, MARKET_CAP_REFRESH_MS);
    }

    function stopMarketCapAutoRefresh() {
      if (!marketCapRefreshTimer) return;
      window.clearInterval(marketCapRefreshTimer);
      marketCapRefreshTimer = null;
    }

    function tencentSymbol(stock) {
      const raw = String(stock.rawCode || stock.code || "").replace(/\.(HK|SH|SZ)$/i, "");
      if (stock.market === "HK") return `hk${raw.padStart(5, "0")}`;
      if (stock.market === "CN") return `${raw.startsWith("6") ? "sh" : "sz"}${raw}`;
      if (stock.market === "US") return `us${raw.toUpperCase()}`;
      return "";
    }

    async function fetchTencentQuote(stock) {
      const symbol = tencentSymbol(stock);
      if (!symbol) throw new Error("无法识别腾讯行情代码");
      const variableName = `v_${symbol}`;
      delete window[variableName];
      await loadScript(`https://qt.gtimg.cn/q=${symbol}`);
      const text = window[variableName];
      delete window[variableName];
      if (!text) throw new Error("腾讯行情没有返回数据");
      const parts = text.split("~");
      const marketCapYi = Number(parts[45] || parts[44]);
      if (!marketCapYi || Number.isNaN(marketCapYi)) throw new Error("腾讯行情没有返回总市值");
      const sourceCurrency = marketCurrency(stock.market);
      return {
        ...stock,
        latestMarketCapCny: marketCapYi * (currencies[sourceCurrency]?.rateToCny || 1),
        marketCapSourceCurrency: sourceCurrency,
        marketCapUpdatedAt: todayString()
      };
    }

    function calc(stock) {
      const latest = Number(stock.latestMarketCapCny) || 0;
      const profit = Number(stock.expectedProfitCny) || 0;
      const pe = Number(stock.expectedPE) || 0;
      const cash = Number(stock.netCashCny) || 0;
      const discount = Number(stock.netCashDiscountRate) || 0;
      const shareholder = shareholderReturnTotal(stock);
      const expectedMarketCapCny = profit * pe + cash * discount;
      return {
        expectedMarketCapCny,
        upside: latest ? expectedMarketCapCny / latest - 1 : null,
        forwardPE: profit ? (latest - cash * discount) / profit : null,
        shareholderReturnRate: latest ? shareholder / latest : null
      };
    }

    function shareholderReturnRateForList(stock, computed) {
      const rate = computed.shareholderReturnRate;
      if (rate === null || rate === undefined) return rate;
      if (!state.stockConnectDividendTax || stock.market !== "HK") return rate;
      const latest = Number(stock.latestMarketCapCny) || 0;
      if (!latest) return rate;
      return ((Number(stock.expectedDividendCny) || 0) * 0.8 + (Number(stock.expectedBuybackCny) || 0)) / latest;
    }

    function shareholderReturnTotal(stock) {
      return Number(stock?.expectedShareholderReturnCny) || 0;
    }

    function emptySegmentValuationRow(index = 0, forecastYear = "2026E") {
      return {
        segmentName: index ? `分部${index}` : "",
        expectedProfitCny: 0,
        expectedPE: 0,
        forecastYear,
        expectedPERemark: ""
      };
    }

    function normalizeSegmentValuationFields(stock) {
      const next = { ...stock };
      next.useSegmentValuation = Boolean(next.useSegmentValuation);
      const rawSegments = Array.isArray(next.segmentValuations) ? next.segmentValuations : [];
      next.segmentValuations = rawSegments.map((segment, index) => ({
        segmentName: segment?.segmentName || segment?.name || `分部${index + 1}`,
        expectedProfitCny: Number(segment?.expectedProfitCny) || 0,
        expectedPE: Number(segment?.expectedPE) || 0,
        forecastYear: segment?.forecastYear || next.forecastYear || "2026E",
        expectedPERemark: segment?.expectedPERemark || ""
      }));
      if (next.useSegmentValuation) {
        while (next.segmentValuations.length < 2) {
          next.segmentValuations.push(emptySegmentValuationRow(next.segmentValuations.length + 1, next.forecastYear || "2026E"));
        }
        applySegmentValuationTotals(next);
      }
      return next;
    }

    function applySegmentValuationTotals(stock) {
      if (!stock?.useSegmentValuation) return stock;
      const segments = Array.isArray(stock.segmentValuations) ? stock.segmentValuations : [];
      const totalProfit = segments.reduce((sum, segment) => sum + (Number(segment.expectedProfitCny) || 0), 0);
      const totalMarketCap = segments.reduce((sum, segment) => {
        return sum + (Number(segment.expectedProfitCny) || 0) * (Number(segment.expectedPE) || 0);
      }, 0);
      stock.expectedProfitCny = totalProfit;
      stock.expectedPE = totalProfit ? totalMarketCap / totalProfit : 0;
      return stock;
    }

    function normalizeShareholderReturnFields(stock) {
      const next = normalizeSegmentValuationFields(stock);
      next.version = normalizeStockVersion(next.version);
      if (next.expectedDividendCny === undefined && next.expectedBuybackCny === undefined) {
        next.expectedDividendCny = Number(next.expectedShareholderReturnCny) || 0;
        next.expectedBuybackCny = 0;
      } else {
        next.expectedDividendCny = Number(next.expectedDividendCny) || 0;
        next.expectedBuybackCny = Number(next.expectedBuybackCny) || 0;
      }
      if (next.expectedShareholderReturnCny === undefined || next.expectedShareholderReturnCny === "") {
        next.expectedShareholderReturnCny = next.expectedDividendCny + next.expectedBuybackCny;
      } else {
        next.expectedShareholderReturnCny = Number(next.expectedShareholderReturnCny) || 0;
      }
      return next;
    }

    function normalizeStockVersion(value) {
      const text = String(value || "").trim();
      return text || "中性";
    }

    function stockVersionMode(value) {
      return ["乐观", "中性", "悲观"].includes(normalizeStockVersion(value)) ? normalizeStockVersion(value) : "自定义";
    }

    function buildPublicationSnapshot(stock, changeNote = "") {
      const normalized = normalizeShareholderReturnFields(stock);
      const computed = calc(normalized);
      return {
        schemaVersion: 2,
        stock: {
          id: normalized.id || null,
          name: normalized.name || "",
          code: normalized.code || "",
          market: normalized.market || "",
          exchange: normalized.exchange || "",
          version: normalizeStockVersion(normalized.version),
          displayCurrency: normalized.displayCurrency || defaultCurrencyFor(normalized)
        },
        assumptions: {
          latestMarketCapCny: Number(normalized.latestMarketCapCny) || 0,
          marketCapUpdatedAt: normalized.marketCapUpdatedAt || "",
          useSegmentValuation: Boolean(normalized.useSegmentValuation),
          segmentValuations: Array.isArray(normalized.segmentValuations) ? normalized.segmentValuations : [],
          expectedProfitCny: Number(normalized.expectedProfitCny) || 0,
          expectedPE: Number(normalized.expectedPE) || 0,
          forecastYear: normalized.forecastYear || "",
          expectedPERemark: normalized.expectedPERemark || "",
          netCashCny: Number(normalized.netCashCny) || 0,
          netCashScope: normalized.netCashScope || "",
          netCashDiscountRate: Number(normalized.netCashDiscountRate) || 0,
          expectedDividendCny: Number(normalized.expectedDividendCny) || 0,
          expectedBuybackCny: Number(normalized.expectedBuybackCny) || 0,
          expectedShareholderReturnCny: Number(normalized.expectedShareholderReturnCny) || 0,
          shareholderReturnRemark: normalized.shareholderReturnRemark || ""
        },
        computed,
        note: {
          investmentNote: normalized.investmentNote || "",
          myNote: normalized.myNote || "",
          changeNote
        }
      };
    }

    function stockFromPublication(publication) {
      const payload = publication?.payload || {};
      if (!payload.schemaVersion) return normalizeShareholderReturnFields(payload);
      return normalizeShareholderReturnFields({
        ...(payload.stock || {}),
        ...(payload.assumptions || {}),
        investmentNote: payload.note?.investmentNote || "",
        myNote: payload.note?.myNote || "",
        isShared: true,
        lastPublishedAt: publication.created_at || payload.lastPublishedAt || "",
        updatedAt: publication.created_at || payload.updatedAt || ""
      });
    }

    function stockWithPublication(stock, publication) {
      if (!publication) return stock;
      return {

        id: stock.id,
